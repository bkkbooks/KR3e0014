一錢右將此五味用龍膽草及黃連二件浸過的水通將五味和均濕過􅀈碗內研得如泥至膩方可晒乾再研方入别藥又入六味黃連二錢五分淨末細辛末二錢去葉草烏末二錢薄荷葉八分乳香製過錢半沒藥製過一錢合乳香製法在後右將此六味研至極細膩方入别諸藥後藥味朋砂明者一錢五分膽礬三分雄黃七分要黃明者輕粉七分黃丹五分以水淘去硝砂沉丹用晒乾硃砂五分牙硝五分海螵蛸七分火煆味淡白色者不煆血竭五分白丁香五分即小雀屎立歆者明礬一錢火枯薑粉七分薑汁沉濾細晒乾片腦少許麝香少許除片腦及麝香隨時加減外其餘藥二十三味通共一處併研至細膩細絹篩過貯作一罐謂之捲雲丹即隂丹也惟此一料捲雲丹以隂陽動靜用之或可加可減斟酌膜之厚薄翳之逺近假如年久翳膜厚者加以隂丹減陽丹若使翳膜薄者或乍發不久者又加以陽丹減以隂丹外障諸症不出此藥百試百驗無不效真乃濟世之靈寶也珍珠散治一切膜障眼乳香製過沒藥製過珍珠製過以上各一錢五分朋砂枯過各一錢輕粉一分半麝香七釐牙硝二分半銅青五分硃砂一錢五分片腦二分血竭五分膽礬二分半明礬枯二分半白丁香二分𬎼仁二錢新竹筒盛了文武火煨去壳油筒兩頭亦要紙封固取出去白皮方去油研用琥珀八分買時以一點研將簮腳點放火上燒化為清煙者氣做松香其色蠧紅乃為真也右精製為極細末配童子小便浸三黃水煮甘石為陽丹聽用怕日羞明多淚並皆治之却將黃連末熊膽牛黃𬎼仁四件用長流水一大碗於磁器內熬至半碗用重綿布濾去渣量意入蜜二兩文武火熬至紫色蘸起牽絲為度不可太過不及方將朋砂龍腦收貯在磁器封固土埋七日出火毒用時將銅簪蘸點於眼內少許日點三涎忌動風之物靈妙應痛膏此膏治眼疼痛暴發不可忍者𬎼仁一百粒去皮油硃砂飛一錢片腦一乳香如棗核大朋砂一錢右將前藥俱為細末用蜂蜜為膏子以銅簪點之一二涎其痛即止神仙碧霞丹銅緑一兩當歸二錢沒藥二分製過馬牙硝五分麝香二分乳香五分製過黃連末二錢片腦二分白丁香二分一方加此三味右將前藥俱研為末熬黃連膏子為丸如龍圎核大用時將一丸涼水化開日點二涎六涎效吹雲丹治目中淚及迎風並羞明怕日常欲閉目在暗室塞其户牖翳成嵗久遮睛此藥多點神效細辛升麻𬎼仁各二分青皮連翹防風各四兩柴胡五分甘草當歸各六錢荆芥蕙一錢絞取濃汁揀黃連三錢生地黃一錢五分右將㕮咀隂連翹外用淨水二碗先熬餘藥僅半碗入連翹同熬至大盞許去渣入銀石器內文武火熬至滴水內成珠不散為度煉熟蜜少許熬用之搐鼻散三黃黃柏黃芩黃連煉煮罐內三黃同便以乾為度取出又以龍膽草水洗浸一宿晒乾甘石即三黃丹聽用以前珍珠散藥末為極細末再不必用製配合三黃聽用珍珠散此能退翳翳厚者點之合此藥朋砂要枯過用一倍三黃丹一倍珍珠散腦麝朋砂臨時放量度下如要輕些一倍三黃丹一倍珍珠散腦麝朋砂如前再要輕些陽丹一倍三黃丹一倍珍珠散一倍上三樣共合腦麝朋砂亦要合丹功要法其合丹之日要天晴日朗更擂諸藥要細篩而又篩方妙九一丹九匙陽丹一匙隂丹二八丹八匙陽丹二匙隂丹三七丹七匙陽丹三匙隂丹四六丹六匙陽丹四匙隂丹已上丹藥俱腦麝朋砂枯煆過臨時量度加減放假如二八丹陽丹八匙隂丹二匙用片腦三釐枯過朋砂四釐麝香二釐九一丹陽丹九匙隂丹一匙枯過朋砂五釐片腦三釐麝香一釐能止淚去翳清涼散即陽丹十匙朋砂六釐生用片腦三四釐麝香三釐其腦麝朋砂點時合丹量度下碧雲丹即清涼散加銅録亦要腦麝或加枯礬少許能去翳膜用捲雲丹即隂丹如遇眼勾煎大小眥頭暈可將藥調液點退血又有一丹點能退翳捲雲丹一匙陽丹半匙薑粉三分飛礬半分燒過鹽一分半共合點之七寶散琥珀珍珠各三錢朋砂五分珊瑚一錢半硃砂碙砂各五分𬎼仁三十粒片腦麝香各一分玉屑一錢右將前藥俱細研􅀈如塵埃方入麝香片腦𬎼仁三件再研熟官絹篩過於罐內夜間臨臥以銅簪挑一米大許點於有翳膜處撥雲散蘆甘石煉過各二兩黃丹製過二兩川烏一兩五錢犀角一兩乳香沒藥碙砂青鹽各二錢五分朋砂血竭輕粉鷹屎各二錢片腦五分麝香五分𬎼仁去壳一錢半右將前藥如法精製共研和均極膩以羊角罐收貯但有翳膜者以銅簪每夜臨臥點二涎極厚者亦能去也治諸眼一切點貼膏藥千金勝極膏蘆甘石煉過各一兩黃連末六錢川烏炮去皮六錢銅青好的二錢川薑煨去皮六錢鷹屎二錢沒藥製過黃丹各一錢乳香製過一錢血竭一錢朋砂五分龍腦五分麝香二分𬎼仁去皮油淨六錢右將前藥俱為末冬蜜一斤砂鍋內溶開生絹濾過去蠟煎熬用棍棒不住手攪熬至紫色滴水不散將前藥末入內攪勻取出於青石上鐵鎚可打千餘下或為錠子或為丸子不拘作法逺年近日疼痛風濕難開諸症將一丸溫水化開或點眼或作錠子磨水點之極效又或為膏於紙上貼兩太陽穴散血尤妙熊膽膏熊膽一錢真者其色如砂糖樣帶潤濕色喫在口內味苦又涼即真者牛黃一錢龍腦五分即蘇州薄荷其葉三四指大如羊葉相𬎼仁去油一錢硼砂一錢黃連為末二兩此膏治男女逺年近日內外障膜赤爛天行時氣暴發赤腫治眼腫紅痛澀難開若用􅡏洗之後可吹鼻中先含水一口然後吹之以通其氣散其風邪鵝不吃草二兩川芎白芷石菖蒲蔓荆子各三錢細辛牙皂全蝎各錢鬱金三錢右為細末罐內收貯勿令泄氣以備後用五黃膏治目腫澀痛欲以冷洗應驗好黃連黃芩黃柏大黃黃丹右為末以芙蓉葉用冷水或煎茶調貼兩太陽穴白斂膏好白芨小白芷白斂右為末牛脂熬成膏如前敷貼四生散治眼目被物刺傷或摸損生地黃生薄荷生艾葉生當歸朴硝右共搗爛貼眼眶并患處神仙散治頭目昏眩偏風痛極甜瓜蒂焰硝雄黃蒼耳子川芎薄荷藜蘆鬱金右將前為末口含水吹一字入鼻中令患者含水一口方吹藥入患者鼻中碧天丹專治逺年近日爛弦風眼銅青五錢明礬四錢五倍子一錢白墡土一錢海螵蛸一錢薄荷葉五分右將此六味俱為末用老薑汁攪和為丸如圓眼核大要用時將一丸淡薑湯一盞泡散洗眼弦涎日再洗依此洗三四涎即愈八仙丹治爛眼弦風有蟲癢甚效當歸七分銅緑一錢薄荷七分白礬一錢黃連五倍焰硝各五分輕粉一分右為末極細以絹篩用絹包約龍眼核大泡洗日三五涎藥性論當歸味甘性溫入心肝二經尾能破血頭養血全用活血熱者不可用製用酒洗川芎味辛性溫入肝經上行頭角助陽氣止痛下行血海能養血如氣旺者不可用赤芍藥味苦辛性寒入肝經能破血行血去赤膚止痛白芍藥味苦酸性寒入肝經能補脾損肝氣能養肝血㵼肝火如肝虛火衰者不可用熟地黃味甘性溫入心經肝經補血如熱者不可用用酒蒸杵爛為餅晒乾研為末作丸如不作丸勿蒸黃柏味苦寒入腎經補腎降相火如火衰不可用龍膽草味苦性涼入肝經益肝膽氣治目赤腫除胃家伏熱半夏除濕化痰和胃氣利胸膈治太隂頭痛製用薑汁炒羌活入膀胱經治頭痛去風邪降肝氣肝虛不用防風味甘辛性熱入膀胱經以體用通療諸風以氣味能瀉肺經黃連味苦寒入心經能瀉心火涼血去中焦熱厚腸胃大黃味苦寒入胃經有推牆倒壁之功能消腫去其皮膚之熱實者生用虛者酒蒸久患虛腫者勿用生地黃入心經治血熱生新血散瘀血涼心血寒者勿用麻黃入肺經去風寒退邪熱開九竅發表白芷味辛性熱入大腸經去風止痛泊足陽明頭痛去肺肝二經發熱細辛味辛性熱入心經能去風止淚頭痛益肝膽通竅去葉用山梔子味苦入肺經瀉肺火除五臟熱目熱赤腫宜用要炒木賊味甘入肺經去目翳益肝膽明目去風通竅止淚蒼术味辛性溫入胃經平胃氣去風邪去濕止淚發散用米泔水浸一日一換水浸炒乾用瞿麥味苦入小腸經去膀胱熱養腎氣明目利小便黃連味甘性溫入脾經行氣固表虛血滯不行宜用蜜浸火炙研為末作丸如不做丸勿如此滑石入小腸經能降上炎之火通九竅利小便車前子味甘鹹性寒入小腸經清利小便去肝經風熱石決明入肝經去目障明目有沉墜之功肝虛者不用火煆極紅為度青箱子性微寒入肝經瀉熱上衝去赤障肝虛不用製用酒洗草烏明入肝經治肝熱熱痛淚出明目肝虛不用白蒺藜不入湯藥宜丸入肝經明目去風止癢炒杵去刺用牡丹皮味苦寒入腎經瀉隂火陽火能涼心血能行滯血止痛地骨皮味苦寒入腎經退熱除蒸瀉肺熱宜用桑白皮味甘入肺經除肺熱瀉肺氣肺寒不用麥門冬味甘寒入肺經治肺熱去肺腑火又清心竅蜜蒙花味甘入肝經去目中赤脈眵淚能明目烏藥入肝經能順氣行氣去風胡黃連味苦寒入肝經退骨熱潮熱補肝膽明目能治小兒疳傷不下食霍亂熱痢疾小兒藥多用之蔓荆子味苦寒入三焦治頭疼眼睛痛能明目開鬱降火枸杞子味甘入腎經補腎明目去目中赤膜遮睛酒洗用何首烏味苦入心經袪風寒治陽明頭疼蟬退入肝經去風解毒脫目翳止淚散寒邪白术味苦溫入脾胃經能健脾胃生津液去胞臉濕熱氣喘者勿用又能助氣香附米味苦辛能行氣助胃氣止淚去濕用之炒去毛杵淨夏枯草稟純陽之氣得隂氣則枯能止淚去風以陽補隂之理千里光入心經去風解毒熱明目亦能行氣即夜明砂水淘去屎留砂一種草藥名千里光採其嫩葉淨洗槝汁熬成膏單用點眼退翳明目恐即此也前注恐非逺志味苦氣溫入心經定心益志利竅安魂魄犀角入心經涼血解心熱清頭目鐵銼銼碎用或水磨服羚羊角入肝經清肺肝火清心明目肝虛不用石膏入胃經瀉胃火伏熱有鎮之功胃虛不用乾葛味甘平入胃經解肌發表退熱升提胃氣藁本味辛入膀胱經去顛頭痛引藥上行史君子味甘入胃經殺疳蟲利小便薄荷味辛寒入肝經去賊風發表利關節止痛菊花味苦甘微寒入肝經明目清頭風去目翳發表茺蔚子味辛甘入眼經除血熱明目去風甘草味甘生寒熟溫入脾經生用能瀉火解毒炙者能助胃和平桑螵蛸補腎去風通五淋利小便明目散翳槐花味苦寒入心經去心赤瀉血瀉大腸熱鬱金味苦寒入心經治血鬱於目能涼能破心下氣開鬱黑參味苦醎入腎經補腎氣明目得黃芩瀉肝火除肝熱知母味苦寒入腎經補腎水瀉腎火三焦火桔梗味苦溫入肺經治肺熱為諸藥之舟楫乃肺部之引經芒硝治積聚熱疾利大便不通漢防己味辛苦寒通行諸經去風寒有走逹之功蒲黃味甘性平入心經能消瘀血破血消腫炒用連翹瀉心火解脾胃濕熱除心經客熱五味子味酸性溫入腎經肺經補腎滋肺益肝獨活味苦溫走諸經去外受賊風無分新舊楮實子味苦寒入肺經升陽上行能去風治頭痛肉蓯蓉味酸醎性溫入腎經補腎生精用酒洗相火旺不用川椒味辛熱用之於上退六腑之沉寒用之於下去目中障肓去目炒去汗用人參味甘氣溫無毒入肺經補氣不足安魂魄生精開心竅通血肺寒可用肺熱傷肺白茯苓味甘溫入肺經安魂定魄補心虛養神利小便旋覆花味甘入肺經清痰明目治頭風兔絲子味辛甘入腎經補腎明目能去目黑花酒洗蒸餅晒乾為丸不做丸勿製澤瀉味甘寒入膀胱利水通淋補隂不足明目黑附子味辛大熱入三焦主陽散風去寒邪火旺者不用即大附子去粗皮木香味苦性溫入心經主治心痛泄胞腹中滯寒冷氣不必過火磨入藥中服牛膝能引諸藥下行丸用土牛膝春夏用葉冬用根惟葉之效尤速能益精又治竹木刺入肉敷之即出石斛味甘性溫入腎經去胃熱補隂血益精壯筋骨紅花味甘苦入心經能破血行滯血少用養血天門冬味苦氣寒入肺經瀉肺火定肺氣利小便涼血去心杵為餅晒乾為丸如不做分研石菖蒲味辛性熱入腎經補腎能開心竅明目柴胡味苦寒入肝經能除往來結熱積於胸中除肝熱又得黃芩能瀉肝火黃芩味苦寒入肺經枯者瀉肝火實者退膀胱熱巴戟能補腎益精療隂痿引氣上行陳皮去白者消痰利氣留白者補胃和中葶藶味苦寒入肺經瀉肝喘利水下肺氣炒用芎藭入腦治頭痛血虛者去頭風養血白附子一名兩頭尖去風痰止頭痛去粗皮用天麻主頭風去風疾利四肢濕痺枳殼寬腸下氣袪風化痰治風邪作痛瓜蔞根即天花粉入肺經去痰火解熱毒又能除酒毒肺寒者不用冷痰者不可過用有熱藥此宜可亦用之匾蓄利小腸經熱閉小茴香味辛氣平開胃行氣止嘔吐膀胱冷氣腫痛入藥妙南星去風痰消腫毒用薑汁煮過草烏走筋骨敗血去風止痛薑汁煮用川烏去風寒作痛助陽荆芥去皮風邪發雄黃解熱毒散血止痛乳香調血氣利諸經之痛製用厚箬三片夾藥在中尉斗火尉去油研末用沒藥破血止痛去目翳暈同前製法血竭破積血止痛去赤膚木通利小腸經結熱降心火牛旁子去風明目行血蛤粉能消痰火涼血解肌表極熱蛇退即蛇皮去風毒止淚癢痛全蝎消風毒破風痰尾更佳去四足藿香開胃氣結痰利之蠶退去風消痰明目去翳膜即晚蠶砂龍腦即薄荷性熱能通利寒熱去風消目赤甘松味甘性溫去風下氣治心腹痛辟惡氣硃砂鎮心安魂魄涼血肉桂引太陽經止頭痛去寒邪利肝膽氣白斂散結氣除目赤熱藜蘆吐氣風痰快膈去蘆用根有大毒用宜斟酌白芨去賊風解中風熱閉豬牙皂角去風痰解表利氣炙去皮弦香白芷去皮膚風熱瘡癢杏仁潤肺氣去痰行血紫蘇消痰解表利氣夜明砂明目去風山茱茰入腎經除頭暈補虛生精去核天麻子去風補腎明目研碎入煎藥熊膽退熱降火去目赤熱試真假用水一碗撒灰在內將熊膽放水中分灰水各開兩邊為真者其色潤黑山藥補腎不足生精牛黃去熱痰能安魂魄涼血清心石燕通血利小便治淋𬎼仁去目中赤痛風癢去翳製法去殼用仁以竹筒盛在內於紅火煨藥紙乾取出打去油聽用珍珠清心明目去目翳製法用豆腐一塊入珠於腐內蒸過取出用洗淨無漿白綿布二三重包珠石上杵爛用細末玄精石安魂魄有壯氣之功沙魚皮解風毒止淚威靈仙去風邪青皮能下氣快膈消痰濁氣升於至高者而能下氣虛者不用青鹽補腎引至下部水磨化銅鍋熬成鹽聽用川練子明目退熱補腎去核用沉香補右尺命門脈壯元陽散滯血一方點藥撥翳膏𬎼仁去皮殼麝香四分另研琥珀一錢另研珍珠一錢放豆腐上蒸過石蟹一錢煨片腦五分另研硼砂一錢另研青鹽八分另研白丁香五分水燉紅珊瑚石燕煆滴乳香灸辰砂熊膽略灸乾血竭金精石滚水泡銀精石滚水泡各一錢蘆甘石火煆黃連水淬淬次用五錢或七錢碙砂一錢明者將紙七重包煨另研包起遇有翳厚者加入無翳者不用右為細末和勻用磁器罐秉起一半乾點一半入後藥內為膏子點當歸尾生地黃赤芍藥蔓荆子防風羌活連翹黃芩薄荷各用五錢銼細用雪水或臘月水兩大盞石器內煮藥至一盞去渣用真正好白蜜三兩再用文武熬三四沸以新綿濾出收入磁罐內却將前藥末共作一處攪勻用清油紙縳住常常旋取點用此藥收八九年亦好不壞此仙傳方也銀海精微卷下
