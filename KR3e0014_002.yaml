body:
  text: 銀海精微卷下問曰人之患眼赤澀腫痛年深有紅翳於烏睛上濃淚如紅霞映日者何也答曰此乃三焦積熱肝膈風熱上攻致然也治之須用去風散血清涼之藥修肝散治肝氣不順防風羌活當歸生地黃黃芩梔子赤芍藥甘草藁本大黃白蒺藜右各等分水煎服撥雲散黃芩甘草藁本梔子防風菊花密蒙花連翹桔梗薄荷赤芍藥白蒺藜右水煎食後服加味修肝散方在小兒眼生翳內問曰早晨痛至午者何也答曰早晨至午皆陽旺是虛陽攻上頭風攻注為諸陽之首早晨人動則血運赤陽轉於首與風氣相攻早晨疼痛兩眥宜服川芎散白蒺藜散川芎散石膏二兩川芎五錢白附子一兩甘草羌活菊花地骨皮右等分水煎服白蒺藜散方在肝風目暗症內問曰人之患眼午後至夜漸加疼痛者何也腦虛陽毒勝也人身之血午後行於隂道至夜歸於肝之司況腦虛隂毒勝故午後漸疼痛昏花也治之須用回陽湯涎以夜光栁紅丸宜服回陽湯治眼珠淡紅羞澀難開宜服附子人參當歸川芎赤芍藥茯苓五味子細辛車前子甘草右每服棗子一枚薑三片水煎半飢服夜光栁紅丸方在風牽出臉症內治風濕傷肝問曰人之患眼痛而增寒者何也答曰此乃氣衰血盛經曰血榮氣衛足厥隂主血榮隂也衛為陽今氣衰血旺乃陽不盛隂故痛極而惡寒也宜服附子豬苓湯白术湯附子豬苓湯白芍藥甘草羌活各一兩附子豬苓加黃芩柴胡右每服五錢水煎服之白术湯白术川芎蔓荆子沒藥白蒺藜去刺黃芩防風五味子菊花甘草右各等分水煎服問曰人之患眼痛而體熱者何也答曰衛屬陽而發熱榮屬隂而發寒榮衛為隂陽之道也在上屬心肺在下屬肝腎今乃氣旺而血衰是陽多隂少故痛而體熱是熱邪歸于心也宜服洗心散解明散洗心散大黃赤芍藥荆芥黃連當歸連翹薄荷甘草解明散當歸赤芍藥黃芩菊花柴胡地骨皮車前子桔梗生地黃梔子連翹各一兩右各等分水煎服問曰人之患眼臉停瘀血者何也答曰此乃肝氣凝滯脾胃停風濕也或因天行赤眼之後起之太早不能調養則使血凝於胞臉之間名曰瘀血治之須番上下胞臉􅡏洗瘀血至盡宜服退赤散當歸散退赤散大黃黃芩黃連白芷當歸赤芍藥梔子桑白皮右各等分水煎服當歸散當歸生地黃赤芍藥川芎甘草菊花木賊黃芩大黃蒺藜木通梔子右各等分水煎服問曰人之患眼不癢不赤而痛者何也答曰氣腦虛也榮衛不和血氣凝滯亦有也七情鬱結肝風沖上腦中風氣相攻故不癢不赤而痛初患急服藥恐變為五風內障難治宜服透紅勻氣散川芎散助陽和血湯透紅勻氣散當歸細辛白芷沒藥澤蘭甘草茴香天仙藤厚朴乳香肉桂黑牽牛生地黃羌活各一兩右為末每服三錢熱酒調下川芎散川芎菊花細辛鼠粘子石膏薑蠶蒺藜各一兩右為末每服二錢米湯下助陽和血湯方在傷寒熱病後症內問曰人之患眼赤而不痛者何也答曰肝熱也膀胱澀而不利心火炎也人身之血若河澤之流比若川澤疏通以歸於海若膀胱壅塞則洪水妄流人之血順則經絡流利上下相接周而復始逆則散漫妄行上注於目故赤而不痛也今膀胱不利心火上炎肝經實熱豈不若川澤之壅塞也治之須用八正散𨗳赤散順肝丸服之八正散𨗳赤散二方俱在大眥赤脈條下順肝丸黃連黃芩當歸𬎼仁三十粒右共為末煉密為丸問曰左赤傳右何也答曰此隂經火熱也陽中行隂也肝也隂中行陽心也邪熱攻積於肝也肝邪交於心傳於目也左目屬太陽右目屬太隂故左赤傳右太陽經旺也宜服三黃丸洗心散三黃丸方在大眥赤脈症內熱甚加黃柏洗心散大黃當歸赤芍藥甘草荆芥麻黃梔子各一兩右各等分水煎服問曰右赤傳左何也答曰此隂經火旺脈有隂經及陽絡皆屬於肺氣者肺之精也故右赤傳左乃肺經邪熱隂絡火旺宜服瀉肺散一曰隂虛命門火旺也㵼肺散方在膜入水輪症內桑白散治肺氣壅塞邪熱上攻眼目白睛腫脹日夜痛心煩悶桑白皮玄參升麻杏仁旋覆花赤芍藥菊花葶􅐗防風黃芩枳殼甘草灸各一兩右每服水一鍾半薑三片煎至八分食逺溫服問曰人之患眼胞臉壅腫如桃者何也答曰此乃脾肺之壅熱邪客於腠理致上下胞腫如桃痛澀淚出不絶之注桃目治之用桃葉烘熱尉其腫處宜服此散清涼散羌活除風湯蟬花散主之此散清涼散升麻赤芍藥川芎柴胡各三兩玄參黃芩荆芥甘草白术梔子赤茯苓乾葛草決明右為末每服六錢水煎服羌活除風湯羌活獨活川芎桔梗大黃地骨皮黃芩各一兩麻黃蒼术甘草菊花木賊右水煎服蟬花散方在花翳白陷症內問曰人之患眼視物不明如紗遮睛何也答曰此血衰氣旺血為榮氣為衛衛為陽而氣清榮為隂而氣濁素問曰清氣為天濁氣為地清陽發腠理濁隂走五臟者心肝脾肺腎也眼有五輪內五臟腎屬於木輪為瞳人腎水衰不能濟於肝木使肝木血衰不榮於眼目故睛少短不能久視腎衰不為心火交濟故心火上炎眼目必熱則看物不凖今腎水衰乃虛陽攻上肝血衰故目不得血豈非血衰而氣旺也服駐景丸補腎四順涼肝散駐景丸川椒一兩去目楮實子五味子枸杞子乳香人參各一兩兔絲子肉蓯蓉各五錢右煉蜜為丸鹽湯下四順涼肝散荆芥川芎當歸防風赤芍藥甘草漢防己右各等分水煎溫服問曰人之患眼女子逆經血灌瞳人滿眼赤澀者何也答曰此乃室女或肥壯婦人血熱經閉過期不行則血逆行於上注於目灌於睛外皆紅色或烏睛上起如努肉治之切不可鈎割只用下氣破血通經之藥其血翳自退宜服調經散破血紅花散順經湯𨗳赤散調經散香附米當歸尾各一兩大黃五錢蒸黃芩二兩黃連生地黃赤芍藥川芎羌活梔子薄荷木賊蘇木紅花甘草以上各一兩破血紅花散方在血翳包睛症內治室女逆經眼疼痛生血翳包睛順經湯能通經行血止痛當歸尾川芎枳殼小茴香柴胡陳皮玄胡索白芍藥青皮香附子桃仁紅花肉桂熱甚加黃連黃芩右各等分水煎食後溫服𨗳赤散方在大眥赤脈症內沒藥散方在胞肉生瘡症內問曰婦人遇行經之際眼目澀痛者何也答曰肝虛也凡婦人稟受虛者眼中原有病根若遇行經之際去血過多肝經愈加虛損故使眼目轉加疼痛腫澀難開頭痛眩暈生翳於黑睛上或如粟米或如花翳白陷皆因肝衰虛也宜服當歸補血散點以九一丹當歸補血散當歸川芎白芍藥防風細辛菊花甘草車前子蒺藜白术羌活茺蔚子薄荷各一兩大黃五錢右每服八錢水煎入酒三盞溫服八物湯治虛損血枯上攻眼目黃茋茯苓熟地黃川芎當歸人參菊花白芍藥右每服半飢溫服問曰白睛漸漸黃赤者何也答曰酒毒也酒能發陽過飲無度脾經受濕傷肝膽助火火傷於肺經白仁屬肺故白仁黃赤者酒之過也引血傷於肝肝受其血熱自上朝於目目受其酒之熱毒灌注睛輪黃赤宜服黃連解毒散服數貼之後點以清涼散黃連解毒散黃連黃芩黑參龍膽草荆芥天花粉梔子茵蔯生地黃桔梗車前子連翹右每服水煎加童便三盞溫服清金涼肝散黃連黃芩梔子連翹葶􅐗桑白皮麥門冬天花粉赤芍藥乾葛荆芥杏仁青皮甘草右水煎加蜜一盞入內煎一沸食後溫服問曰人之患眼偏正頭痛者何也答曰風毒甚也頭風在右者屬痰屬熱用蒼术半夏熱用酒製黃芩在左屬風及血虛風用荆芥薄荷血虛者用芎歸芍藥酒製黃柏此三症看而用之有驗治法痛甚者酒調散表之熱痛者石膏散清空散川芎茶調散冷痛者酒調散川芎散神清散主之風毒作痛菊花散如神散主之不必點丹酒調散下桑螵蛸的方在暴風客熱症內灸穴百會一穴神窗四穴臨泣二穴聽會二穴耳尖二穴風池二穴光明二穴太陽二穴率骨二穴定髮際并點各穴法則南筠參入偏則灸一邊痛處前眉心平以墨點記以草比同身寸三寸自眉心比至草盡處是前髮際亦以墨點記又大抒骨上一點以前草三寸盡處亦點記是後髮際又將草自前髮際比至後髮際平摺摘去一節又將草均分作六摺摘一摺止存五摺以此草自前髮際比至草盡處是百會穴又以百會穴為中四邊各開二寸半乃神窗穴也灸耳尖穴即率骨穴將耳摺轉尖上比寸半盡是率骨穴考過同臨泣穴以童人對眉尖上點為記以草自點比上三寸半是臨泣穴光明穴對童人上眉中是光明穴攢竹穴眉頭兩陷中是攢竹穴睛明穴在目內大眥外畔肉上陷宛中頰車穴在耳下曲頰端陷中風池穴在後髮際陷中肝腧穴在第九骨下各開寸半天府穴在胸兩腋下三寸宛宛中聽會穴在耳下前陷中開口取之耳門穴在上耳前起肉當耳缺魚尾穴在小眥橫紋盡處太陽穴在外眥五分是石膏散石膏五錢麻黃一兩何首烏五錢乾葛八錢右用水煎食後服清空散川芎五錢柴胡七錢黃連炒防風去蘆甘草炙羌活各一兩梔子兩半黃芩三兩半炒一半酒製一半右為細末每服一錢熱酒內入茶少許調如膏臨臥抹口內少用白湯下如頭疼每服加細辛二錢如太隂脈緩有疾名痰厥頭疼加羌活防風川芎甘草半夏一兩五錢如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡寒熱兩渴此陽明頭痛只服白虎湯加香白芷白虎湯知母石膏甘草加吳白芷右各等分入粳米三十粒水煎服川芎茶調散治諸風上攻頭目偏正頭痛熱頭風薄荷八錢防風一兩五錢細辛一兩羌活白芷甘草各二兩川芎荆芥各四兩右為末每服三錢蔥白茶調湯溫服常服清頭目芎藭散治冷頭風石膏二錢五分草烏一分五釐芎藭二分薄荷二分甘草一分白附子二分白芷三分細辛一分仙靈脾二分清神散方在兩臉粘睛症內治冷頭風枳殼白芷石膏甘草細辛麻黃菊花散方在迎風灑淚症內如聖散白芷川烏防風各一兩細辛二分半雄黃二分草烏炮過去皮兩頭尖右為末溫酒調下二日服一涎通頂散治一切頭風川芎白芷谷精草藜蘆防風薄荷牙皂蔓荆子細辛蒲黃右為末口含水嗅之吹入鼻內亦可雄黃丸治偏正頭風全蝎雄黃各二錢盆硝一錢五分乳香沒藥各二錢薄荷川芎各一錢片腦一分右為末口噙水搐吹鼻內日二涎貼諸般疼痛眼方赤芍蒲黃與鬱金芙蓉研末拌均勻硃缺土螺緊薑汁若然常痛只擦睛痛甚加白芷南星無名異血見熱久不開加生川烏等分為末熱水調搽眼眶四圍乾了再換羌活除風湯方在前問曰能逺視不能近視者何也答曰氣旺血衰也經云近視不明是無水也治宜六味地黃丸加補腎丸諸補隂藥皆可主之六味地黃丸治腎虛眼不奈視神光不足熟地黃白茯苓牡丹皮澤㵼山茱茰山藥一方加川芎當歸蔓荆子右為末煉蜜為丸如梧桐子大每服三十丸空心服不必點丹問曰能近視不能逺視者何也答曰血虛氣不足也經云逺視不明是無火也治宜初起者服地芝丸千里光散菊花散隨人氣血虛實加減諸補藥皆可用地芝丸甘菊花枳殼各一兩生地黃四兩天門冬四兩又加麥門冬亦可用右為末煉蜜為丸每服三十丸空心鹽湯下千里光散菊花千里光甘草各等分右為末每服三錢夜後臨臥用茶清調下菊花散菊花四兩甘草五錢生地黃四兩白蒺藜二兩炒去刺右為末每服二錢食後米泔水下小兒疳傷問曰小兒三五嵗身加癆瘵面色痿黃眼內紅腫或突者何也答曰脾胃受傷五臟火旺名曰疳傷也治宜退熱用寒涼劑潮熱用胡宣二連湯有蟲史君子湯收功用五疳丸點用清涼散若至胃氣下陷泄瀉頻頻無治法眼珠或突起變白者廢人耳二連湯胡黃連五分宣黃連一錢成童子者焙之右為末用蜜水調服或成貼服亦妙熱甚加銀柴胡史君子湯能殺疳蟲史君子三箇輕粉一分蔥珠幾顆右史君子輕粉二味為細末入雞蛋一箇攪均用濕紙包七重煨熟蛋息火氣空心與吃連吃四五箇蛋止不可多用五疳丸方在小兒疳傷症內豬肝散方在小兒疹痘症內駐景補腎明目丸治肝腎俱虛瞳人內有淡白色昏暗漸成內障服能安魂定魄補血氣虛散五味子熟地黃酒蒸妙枸杞子楮實子酒浸肉蓯蓉酒蒸焙車前子酒洗石斛去根各一兩青鹽另研一兩沉香另研五錢磁石火煨醋水飛過兔絲子酒浸另研各一兩右為細末煉蜜為丸如梧子大每服七十丸空心鹽湯下救苦湯治熱症用裹不得能退熱亦赤桔梗連翹紅花細莘甘草灸當歸身蒼术龍膽草羌活升麻柴胡防風藁本黃連黃芩生地黃知母川芎赤芍藥右薑三片蔥三根食後溫服決明子散黃芩甘菊木賊草決明石膏赤芍藥川芎羌活蔓荆子甘草石決明右各等分為末每服三錢水一盞薑三片煎至七分食後服貼諸般赤眼治眼赤腫不開者黃柏薑黃南星草烏黃連右等分為末薑自然汁調貼兩太陽穴一二涎痛止如有赤障起亦可貼打傷赤腫不開如芙蓉葉菉豆粉調貼同蔥搗貼亦妙清涼消毒膏敷諸熱眼薄荷葉芒硝大黃細辛雄黃黃柏右等分為末水調塗之效經驗洗眼散洗時眼熱眼大黃山梔子防風薄荷川芎羌活甘草右等分用水煎薰洗洗眼湯泡散當歸稍赤芍藥黃連杏仁右為細末每日二次用水湯泡洗酒煎散治眼有風熱赤澀痛宜服防風防己甘草荆芥當歸赤芍藥牛旁子右等分用好酒煎食後服酒調散治白仁腫痛可服槐花梔子牛旁子防風蛤粉右等分為末水煎食後入酒少調服大黃當歸散治眼壅腫瘀血凝滯不散攻沖生翳宜服歸尾酒浸川芎各一兩菊花三兩大黃酒炒五錢黃芩蘇木梔子酒炒各一兩紅花五錢右等分照加減用水煎食後服加味湯泡散洗眼方歸尾赤芍藥黃連杏仁加防風各一兩銅青二錢薄荷葉三錢三淚一曰冷淚二曰熱淚三曰眵淚一冷淚不赤不痛無翳無膜凡早出迎風有淚或至秋迎風有淚其淚自出病在肝也二熱淚如糊粘下與上臉皮有紅有腫眼罔不見日夜見燈火淚湧出病在心也三眵淚如糊粘兩眼弦赤腫生努肉病在肺也冷淚用肝經止淚方當歸青鹽地黃木賊熱淚用此方荆芥梔子黃芩黃連木賊地黃夏枯草眵淚方桑白皮夏枯草川芎木賊葶􅐗麥門冬梔子治上實下虛血貫瞳睛防風二錢羌活白芍藥各兩半荆芥二錢生熟地黃各兩半粉草五錢當歸二錢川芎四錢菊花二錢加茯苓右為末水一鍾入當土地黃同煎溫服忌一切毒物川芎丸治頭風冷淚川芎細辛白术甘菊白芷右為細末蠟丸如黍米大夜臥一丸日中一時辰換一丸荀收仲嘗謂豫曰有人視一物作兩物醫者作所氣有餘故見一為二教服補肝氣藥皆不驗此何疾也豫曰孫真人云目之絲上屬腦後出於頂中邪中於頭逢身之虛其人沉則隨目絲入於腦轉轉則目絲急急則目眩以轉邪中其睛所中不相比則睛散睛散則岐故見一物為兩物也後令服驅風入腦藥則愈加減駐景丸治肝腎氣虛視物昏昏血少氣多車前子略炒二兩當歸去尾熟地黃洗各五錢枸杞子川椒楮實子無翳不用五味子各一兩兔絲子酒煮焙半斤右為細末蜜水煮糊丸如梧桐子大每服三十丸空心或酒或鹽湯下撥雲散能散風毒退翳障及赤爛弦者羌活防風川芎白蒺藜荆芥蟬退甘菊花各一兩右為細末每服二錢食後桑白皮煎湯調服瀉膽散治瞳人乾缺內障玄參黃芩地骨皮麥門冬知母各一兩黃茋茺蔚子右每服水煎食後溫服天門冬飲子治轆轤轉則外障天門冬茺尉子知母各二兩五味子防風各一兩人參茯苓羌活各兩半右每服水煎食後溫服補言方所著法最奇云眼淚癢或生翳或赤痛並皆治之右用宣州黃連稿碎末𬎼核仁去皮研為膏等分和合取無所病乾棗頭三枚割頭少許留之却去核以二物滿模於中却將割下棗頭依前合定以少綿裹之惟薄羔則以茶甌量水半碗於銀罐器內文武火煎取一雞子大以綿濾待冷點眼前後試數人皆應食翳家用赤多得效故附之萬不失其驗補陽湯治陽不盛其隂乃隂盛陽虛則九竅不通今青白翳見於大背及足太陽少隂經中鬱遏足厥隂肝經氣不得上通故目青白翳內阻也當於太陽少隂經中九原之下以監府中陽氣衝天上行此乃先補其陽後於太陽標中標者頭也㵼足厥隂肝經火也上下伏於陽中乃隂治也內經云隂盛陽虛則當先補其陽後瀉其隂此法是也每日清晨以腹中無宿食服補陽湯臨臥服益隂丸若天色變大寒大熱并勞役預日飲食不調精神不足乃先補其陽氣上升通於肝經之末利矣人參熟地黃黃茋白术甘草白芍藥羌活獨活各一兩澤瀉陳皮陳風各五錢知母炒當歸身去蘆酒製白茯苓去皮生地黃炒各三錢柴胡去苗三兩肉桂右同為粗末每服半兩水三盞煎至一盞去渣空心宿食盡消服知母飲子治花翳多年不退知母茺蔚子各三兩防風細辛桔梗茯苓大黃芒硝各一兩右每服水一碗煎至五分食後溫服開明丸治逺年近日翳障昏盲寂無所見一切目疾熟地黃一兩半酒浸兔絲子車前子𬎼仁去皮麥門冬決明子地膚子茺蔚子黃芩枸杞子去心五味子防風去蘆澤瀉細辛杏仁炒去皮尖青箱子葶􅐗官桂羊肝需用白羊者肝薄切片焙乾作末或只以肝煮研爛為末作丸或少則以蜜漬之右為細末糊丸如梧桐子大每服三十丸熱水下日三服仍忌生薑糟酒炙􅏼等物磨光散治諸風攻眼磨翳障除昏暗防風羌活菊花草決明蟬退去足蛇退剪碎和麻油炒甘草灸沙苑蒺藜形如羊腎者漫火略炒石決明揚碎研細以水飛過各五錢右為細末每服一錢半食後麥門冬煎湯調服蜜蒙花散治冷淚昏暗蜜蒙花菊花蒺藜石決明木賊去節白芍藥甘草各五錢右為細末每服一錢清茶調下服半月加至二錢決明散治眼見黑花不散決明子甘菊花各一兩防風去蘆芎藭車前子細辛梔子仁蔓荆子玄參白茯苓山茱茰各一兩半生地黃各三兩右為末每服二錢食後鹽湯調下羌活散治風氣攻眼昏澀多淚羌活川芎天麻旋覆花藁本防風蛇退甘菊花細辛杏仁去皮各一兩甘草炙五錢右為末水煎食後服草龍膽散治上焦風熱毒氣攻沖眼目暴赤磣痛羞明多眵迎風有淚翳膜攀睛努肉隱痛病皆治之龍膽草木賊去節草決明微炒甘草灸各二兩附米炒去毛川芎各四兩右為末每服二錢麥門冬熱水入沙糖少許同煎食後調服或米泔汁調亦好地黃散治黑睛或白睛先赤而後癢迎風有淚隱澀不開生地黃一兩芍藥五錢當歸甘草各五錢右每服五錢食後服嗅鼻散治目風熱腫赤難開雄黃辰砂各三兩細辛五錢麝香片腦各一分右為細末口含少許嗅鼻中瀉肝散治天行赤眼外障知母桔梗茺蔚子大黃玄參羌活細辛車前飲治肝經積熱上攻眼目逆順生翳血灌瞳人羞明怕日多淚宜服之車前子炒蒙花去枝草決明羌活白蒺藜炒去角龍膽草菊花粉草還睛補肝丸治肝虛兩目昏睛衝下淚白术細辛川芎人參羌活去蘆決明子微炒當歸切焙白茯苓去皮苦參防風去蘆官桂去粗皮地骨皮玄參黃芩菊花五味子車前子炒青箱子甘草灸右為細末煉蜜糊丸每服三十丸加四十丸不拘時米飲下鎮肝丸治肝經不足內受風熱上攻眼目昏暗癢澀難開多眵灑淚怕日羞明時發腫赤或生翳障澀並皆治之逺志去心三兩地膚子二兩青箱子少下白茯苓防風決明子蔓荆子人參各二兩山藥甘草甘菊花柏子仁細辛玄參車前子地骨皮右蜜糊丸每服三十丸食後米湯下日三服羌活散鎮肝明目暴赤眼一切內外障翳羌活川芎防風旋覆花各五錢楮葉楮實蒼术米泔浸去皮蟬退木賊菊花桑葉甘草各二兩右為細末每服二錢清茶下早晚食後臨臥時各一服合藥時不得犯鐵器及不見火忌麵及酒諸毒物青箱子丸治肝虛積熱外障箱子二兩車前子兔絲子熟地黃茺蔚子五味子細辛防風人參澤瀉茯苓各一兩右每服三十丸空心茶清下地黃丸治用力勞心肝虛風熱攻眼赤腫羞明漸生翳膜兼肝腎風毒熱氣上衝久視目疼傷肝血肝主血勤書則肝傷而目昏肝傷則目傷風而熱氣湊目昏一盛不宜專服補藥當益血鎮肝而目自明矣熟地黃兩半菊花防風光明硃砂羌活桂心沒藥各五錢決明子黃連各一兩右為末煉蜜為丸每服二十丸食後熱水服日三涎晉范寧嘗苦目痛就張湛求方湛戲之曰古宋陽子少得其術以授魯東門伯涎授左丘明遂世世相傳以及漢杜子夏晉左大沖凡此諸賢並有目疾得此方云省讀書一減思慮二專內視三簡外觀四日一起晚五夜早眠六凡六物熬以神火下以氣飾藴於胸出七日然後納諸方寸修之一時近視數其目睫逺視尺箠之餘長服不已非但明目及亦延年審如是而行非可謂之嘲戲亦有方也菊花散治肝受風毒眼目昏朦漸生翳膜甘菊花四兩蟬退去足白蒺藜炒焦去刺木賊童便浸宿晒乾羌活各三兩荆芥甘草各二兩右為細末每服二錢食後清茶調下湯泡散治肝虛風熱攻眼赤腫羞明漸生翳膜杏仁防風黃連赤芍藥歸尾各五錢銅青一錢薄荷三錢右銼碎每服二錢極沸湯泡乘熱先燻後洗冷則再換熱用日兩三涎一方入白鹽少許開目沃沸洗鹽亦散血雷巖丸治男子婦人肝經不足風邪內乘上攻眼睛淚出羞明怕日多見黑花翳膜遮睛臉生風粟或癢或痛隱澀難開兼人患偏正頭風牽引兩目漸覺細小視物不明皆因腎水不能既濟肝木此藥久服大修腎臟能添目力於人服藥多不知根源往往不效枸杞子菊花各二兩巴戟酒浸一宿去皮心肉蓯蓉牛膝各一兩川椒三兩去目黑附子青鹽二錢以泔水同煮未浸去皮根右為細末浸藥水煮麵糊為丸每服十丸空心溫酒下又方治肝虛或當風眼淚鎮肝明目右用臘月犍牛膽盛黑豆不論多少浸候百日開取食後夜間吞三七粒神效萬夀地芝丸治目能近視不能逺視食之能治風熱天門冬去心生薑焙各四兩甘菊花二兩枳殼炒三兩右為末每服一百丸食後茶清或酒下洗肝散治肝實眼人參黃芩去黑心赤茯苓梔子仁川芎柴胡地骨皮菊花桔梗黃連甘草右每服入苦竹葉七片食後服羚羊角散治肝臟實熱眼目昏暗時多熱淚黃芩梔子瓜蔞胡黃連菊花細辛右每服加竹葉煎之竹葉湯治肝臟實熱眼赤疼痛淡竹葉黃芩升麻木通黃連車前子玄參芒硝梔子大黃炒右食後服龍膽飲治肝臟實熱眼赤腫痛龍膽草梔子防風山茵蔯川芎玄參荆芥穗菊花楮實甘草右食後服決明子湯治肝臟實熱目眥生赤肉澀痛決明子炒柴胡黃連竹葉防風升麻細辛菊花甘草右水煎服瀉肝散治肝熱赤眼腫痛梔子仁荆芥大黃甘草羊肝丸治肝經有熱目赤睛痛視物昏澀及治障翳青盲之眼羯羊肝五兩切片生用黃連研為末右先將羊肝去筋膜於砂盆內擂入黃連末杵和為丸每服五十丸不拘時熱水送下忌豬肉及冷水一運作五劑瘥昔唐崔承元內障喪明夜坐聞有聲問誰答曰營蒙出活今特來謝授此方依方修合服之眼復明朗助陽活血湯治眼發之後熱壅甚白睛紅多眵淚無疼痛而隱澀難開此因服苦寒藥過多真氣不能通九竅也故眼花不明宜助陽和血補氣眼中自然明朗不必點丹柴胡白芷升麻當歸黃茋防風蔓荆子甘草右水煎臨臥熱服避風寒忌食冷物甘菊花散治肝氣壅塞翳障遮睛隱澀難開菊花木賊防風蒺藜甘草木香右為末每服一錢七分不拘時沸湯點服甘菊花湯治內外障翳一切眼疾菊花升麻旋覆花石決明川芎大黃炒各五錢石膏羌活地骨皮木賊炒青箱子黃芩防風梔子仁荆芥草決明黃連甘草右為細末每服五錢水一碗蜜一盞