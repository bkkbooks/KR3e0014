右二香不過火煎出藥後將此二味香磨與藥同服若經脈月流不斷或因氣脹沖眼眼珠腫痛翳膜不退服天麻散天麻退翳散治垂簾翳障昏暗失明當歸一兩好酒浸焙乾熟地黃一兩酒浸焙乾赤芍藥二兩五錢熱水泡川芎一兩五錢白薑蠶一兩熱水泡洗去絲薑汁炒蟬退五十隻水泡洗去頭足羌活防風荆芥木賊各一兩去根節石決明一兩燒過存性白蒺藜一兩五錢白芷一兩五錢甘草七錢麥門冬二兩黃芩尾羊角天麻炒存性厚枳殼炒蔓荆子各一兩打少碎菊花一兩蜜蒙花七錢共二十一味每服蓮子三箇燈心七根水一鍾半煎至八分食後溫服若眼紅加黃連酒煎散治眼赤色有氣熱宜服此方痛治婦人赤腫下垂初服此起漢防己防風甘草荆芥當歸赤芍藥牛旁子右酒煎食後服大黃當歸散治眼壅腫瘀血凝滯攻沖生翳宜服當歸菊花大黃炒黃芩紅花炒蘇木梔子炒右煎服當歸薄梗湯治眼生翳淚出羞明發久不愈薄荷桔梗知母黑參黃芩酒炒赤芍藥生地黃菊花茺蔚子當歸桑白皮防風川芎白芷甘草右淨水一鍾煎服黃芩白芷散治眼血翳淚出羞明發久不愈當歸黃芩防己防風川芎白芷蒺藜石決明桔梗青箱草決明蒙花茺蔚子菊花木賊知母赤芍藥右為細末食後清茶下防風菊花湯治初起努肉攀睛急宜服之防風黃連桑白皮赤茯芩瞿麥車前子梔子大黃黃芩細辛桔梗連翹右水煎半飢溫服加減當歸菊連湯治膜下垂初服初發此方致效如久病此方收功當歸白芷赤茯苓黃芩赤芍知母桑螵蛸生地黃木通連翹麥門冬菊花防風川芎石膏茺蔚覆盆子甘草右水煎食後服蒼术散治小兒痘瘡入眼生翳膜羞明怕日蒼术槐花防風乾葛藁本川芎蛇退枸杞子蒺藜黃芩酒炒乳香不見火藥前成方下白菊花家産蟬退木賊石膏谷精草甘草沒藥不見火煎成藥傾碗內同乳香一齊下服右為末水煎食後服大人水煎小兒為末服之此治小兒疳眼其症泄後眼不開宜服此進賢方當歸菊花黃連各五錢右為末水一鍾入蜜一匙煎三沸食後服之小兒班瘡入眼柴胡湯又用茶調洗肝散如赤眼用四物湯四物湯赤芍藥羌活蟬退木賊黃芩大黃蒙花粉草桔梗蒺藜鬱金當歸防風龍膽草川芎獨活石膏川椒菊花草決明黃連荆芥蒼术車前子谷精草右每服燈心十根溫服六一丸治熱淚蛤粉黃連木賊香附米右為末糊丸茶送下通草散治風淚障翳川芎羌活赤芍藥甘草當歸麝香右為末搜勻為丸如皂角子大百沸湯泡淚眼神效治眼赤腫大黃荆芥鬱金薄荷朴硝痛加沒藥右為末用薑汁調或赤加蔥根捶爛和藥貼太陽二穴治小兒眼不開用葶藶子為末取豬膽調貼額上小撥雲散治男婦目澀痛爛淚出羞明怕日血灌瞳人黃芩甘草梔子大黃芍藥龍膽草鬱金羌活蟬退木賊當歸蒙花蒺藜洗心散治眼目腫痛難開澀淚大黃炒黃芩梔子甘草黃柏木通菊花赤芍藥防風荆芥蜜蒙花散治久患內外障翳羞明怕日迎風灑淚腫痛難開努肉攀睛風熱氣障等病皆治之蒙花威靈仙草決明羌活大黃黑附子石膏川椒炒木賊甘草蟬退獨活楮實子川芎荆芥車前子防風菊花黃連蒼术右燈心煎服消風散治一切風毒上攻頭目拘急鼻澀男婦宜服藿香白芷全蝎甘草防風青風藤又方治前症外感風邪頭痛鼻塞流涕眼目赤腫荆芥甘草羌活防風陳皮川芎蘇葉蟬退附米升麻麻黃右薑三片蔥三根熱服取汗為度治爛弦風不問逺年近日洗藥黃連五倍子𬎼仁當歸明礬焙銅青右為細末將小鍾張水入藥於內飯上蒸過藥水點洗爛處為妙治時行熱眼防風川芎生地黃赤芍藥梔子龍膽草蒼术浸炒甘草荆芥黃柏右煎服爛弦風用白礬光醋飛過取無病婦人乳汁調雞毛點搽之爛弦風赤眼水銀一錢銀硃五分銅青三分右薑包煨過共為末篩過點眼弦如神眼目頭痛消風散藿香川芎甘草白茯苓人參荆芥逢州豆甘草蠶陳皮蟬退羌活獨活防風加細辛白芷薄荷名川芎茶調散點藥冷眼用火硝二錢水飛過晒乾蘆甘石煉過二分不開流淚風癢一切治之熱眼朋砂一錢研細片腦二釐入前藥暴赤眼雞子一箇去黃用白黃連研細末一錢入雞子白內紙封放爛泥中埋一日一夜涎早取出濾過點之五臟要論心熱眼紅者血熱則可用黃連當歸尾蘇木紅花赤芍藥癢痛之類虛者本方若虛此數味除之加人參細辛沒藥歸尾熟地黃茯苓之類肺熱火旺者則可用山梔子桑白皮地骨皮黃芩防風天麥二門冬之類虛則可加人參沉香黃茋門石五味子之類實者用葶藶子連翹肝氣盛火旺者則可用柴胡羌活青箱子白芍藥羚羊角虛則除之加熟地黃當歸川芎楮實子枸杞子之類脾胃實者則可用石膏朴硝黃芩黃柏虛則除之可加白术蒼术枳殼陳皮半夏人參之類腎熱相火旺者則可用黃柏知母車前子木通滑石瞿麥匾蓄大黃朴硝之類虛則大忌之可加肉蓯蓉五味子磁石兔絲子乳香川椒青鹽枸杞子之類夫審瞳人之法瞳人開大者忌辛辣之藥瞳人焦小者宜寒涼辛辣則可也開大者以酸藥收之焦小者以辛藥散之久注不開者宜發之久積宜行氣血為主養肝血還睛丸亦可用之末成症主方祕要服表裏不退疼痛愈甚用細辛湯明目細辛湯治眼赤痛眉攢腫悶鼻塞涕唾稠粘大便祕結羞明怕日隱澀難開睫成紉多眵粘助陽和血湯治隂陽不升降作痛不時隱澀有淚眵蠧紅淚糊或時發赤眼涼藥不退者用當苦湯眼暴發熱火旺苦疼不住服利藥未效有熱火退可用當歸龍膽湯治眼中黃仁生黃白翳從下而上此候多是火旺也人若患此此藥能瀉火退熱又能退翳消紅腫桑螵蛸酒調散治風熱裏病雙解散實熱裏病此藥治傷風頭疼及眼珠腫痛或偏正此是傷風寒眼腫雖甚其眼皮帶浮而軟人多鼻塞聲重眼羞明怕日白仁雖虛壅而不蠧紅如此狀者用前二散表裏之腫消痛止用生地黃散撥雲湯變用又變前方不可久服鬱金酒裏熱無表症治一切實熱其眼腫起如桃有不近人手之怕羞明怕日或內壅突起蠧紅淚出如湯鼻涕溏流內生淡赤虛翳如此狀者其翳不能為害熱去退翳即消此藥通解之痛止後用救苦湯當歸龍膽收功酒調洗肝散經驗洗肝散治一切熱眼及赤眼難開眼珠痛白仁赤而痛不虛可用止痛生地黃散後用功亦同當歸活血湯治羞明怕日者頭痛雖甚內不蠧紅此樣眼多虛或眼上珠生白陷翳者此方可與蟬花散蜜蒙花散相間服之效蜜蒙花散治一切體虛之人無疼有羞明者服涼藥不得其眼羞明而內痛白仁內隱紅常流清涕淚視物蒙蒙此藥可用日進二三服決明子散蟬花散此三方功亦同效省風湯治一切肝氣有餘瞳人鎖緊或成乾缺視物不能明繚亂白仁淡紅瞳人焦小黃色夜見五色燈光者此方能除肝膽極熱久仙飲治年老之人眼赤不退帶紫紅白色若然有蠧紅者以暴發客熱類推之洗肝散治眼肝氣有餘風輪變色焦枯或疼痛外生赤翳此方能除火退肝熱紫金丸治外障生雲膜血翳服涼藥不退而不多痛者可用夜光栁紅丸治風毒上攻眼虛腫頗有紅紫或癢或痛生翳年久服諸藥不效可用修肝散治暴發眼及發不時疼痛甚者熱服肝氣上升淚出汪汪內有鮮紅可用至如痛止血散不用補肝重明丸治諸眼服涼藥表裏愈後失神光者其眼無羞明用之能補養肝血還睛丸亦可用之當歸龍膽湯治眼中黃仁生白翳從下而上此候多是火旺也人有此患此藥瀉火退熱用能退翳消紅腫審症應驗口訣如男子婦人患偏正頭痛者先審熱甚用雙解散二三貼大通之後服川芎茶調散加涼劑點用九一丹冷痛者用桑螵蛸酒調散大通之後用川芎散神清散主之點用清涼散少加腦入些薑粉無不效矣烏輪赤暈刺痛浮漿此肝熱也治法宜用酒調洗肝散加麻黃赤芍或瀉肝散修肝散收功生地黃散點用清涼散一九丹膽生清淚枯黃繞睛此肝虛也治法用止淚補肝散點用九一丹後服補腎丸此乃滋母益子也瞳人開大淡白偏斜者此腎虛也治方服補腎丸補腎明目丸駐景丸點用九一丹多服少點瞳人焦小或帶微黃此腎熱也治法先服五瀉湯著風之類後收功用補腎明目丸久服甚效瞳青胞白癢而清淚不赤不疼是謂之風眼治法服羌活除風湯點九一丹間二八丹入些薑粉效烏輪突起胞硬瞳紅眵淚濕漿裏熱則痛是謂之熱眼治方用雙解散加涼大通之劑瞳痛止用生地黃散點用清涼散間九一丹點之隨人治法用之眼渾如淚胞腫而軟上壅濛濛酸渣微赤是謂之氣眼服桑螵蛸酒調散後服明目流氣飲當歸湯主之其或風與熱并則癢而浮赤風與氣摶則癢澀昏沉點用九一丹間二八丹服羌活除風湯血熱交聚故生淫膚粟肉紅縷偷針之類服用瀉脾湯瀉心湯主之點用清涼散有淫膚粟肉可􅡏洗至平洗上眼熱經久復有風冷所乘則赤爛點用清涼散服用瀉心湯洗肝散主之洗用綿裹散其效甚速眼中不痛而赤但為痰飲所注則作痛服用半夏二陳湯三四貼後服明目流氣飲不用點藥肝氣不順而挾熱所以羞明服用洗肝散二三貼加麻黃後服蜜蒙花散五七貼補腎主之點用九一丹加清涼散初不可重藥白睛帶赤或紅筋者其熱在肺服洗肺湯除熱飲洗肝散點用清涼藥九一丹上胞下臉或目唇間如疥點者其熱在脾治先服瀉脾湯瀉脾除熱飲三黃丸主之可􅡏可洗用清涼散點有淚翳者九一丹點之因風則散之用九一丹入些薑粉熱則清涼散點之氣結則調順之將前藥間點因風者可用防風通聖散即名雙解散後服羌活除風湯熱者洗肝散修肝散氣結者服流氣飲黃茋湯主之白陷魚鱗之症多因肝腎俱實血衰成陷治法服酒調散二貼後服蟬花散蜜蒙花散相間服之效點用二八丹調乳汁點間九一丹點之突起睛高旋螺尖起嶮峻利害之症也又有一法與他取平之效將鋒針針入三分以鳯屎點針口所以毒攻毒或隂丹醮點亦可先服鬱金酒調散四五貼後可動針此乃平之法無光之效也又有一症遞年月眼內癢極祕曰諸痛為實諸癢為虛人之患眼虛腫及眼眶骨此痰飲為患治法用明目流氣飲加半夏陳皮厚朴三味用薑二片同煎連服四五貼其痛即除另將二陳湯丹藥亦可點用治之隨輕重所施治法在人意耳頭風冷痛熱痛風痛痰厥痛係偏風陽明頭痛眼淚熱淚冷淚虛淚風淚濕淚審症祕論暴發眼者審他是熱甚用雙解救苦湯當歸龍膽湯修肝散洗肝散瀉肝散鬱金酒調散有是風熱火病服涼藥不退者用明目細辛湯助陽活血湯紫金川芎茶調散明目流氣飲桑螵蛸酒調散有是久病血滯風甚用當歸和血煎神清散沒藥散捲雲湯發歇無時用生地黃散破血紅花散有是風毒為病用蟬花散如聖散川芎茶調散神清散夜光抑紅丸痰病用清熱半夏二陳湯之類老痰用四生湯有是久病無表病裏病眼內淨了用蟬花散蜜蒙花散決明子散十味還睛丸若內病俱無但是外病可涎第依法不需服藥有翳只是去翳藥加減療之辨眼經脈交傳病症論有人問於豫曰人之眼目乃五臟六腑之精苟有患傷於內腑其理何哉然則又有左病而不傳右右病而不傳左左右俱病未審其詳請而言之豫應之曰噫非精於岐黃龍木之奧者莫明乎此也夫眼者乃五腑之專精也目者乃心之竅也瞳人者腎之精也宗精之水所以不出行血裹之氣輔之共湊於目頭者諸陽之所聚也足太陽膀胱之脈起於目之鋭背通頂入腦正屬目本名曰眼係督脈陽柔之會首循風府而出則入係腦則為目風厥肝脈上出額督會於巔頂其别交者從目係風相摶故目䐠􅀈無所見頂中風府兩筋之間乃别隂陽交於目內鋭皆隂氣盛則目膜陽氣盛則目瞑病而不得臥者衛氣不得入於隂故陽氣滿而隂氣虛故目不瞑而不得拋者衛氣流於隂不得於陽陽氣虛故目閉故病猶有偏勝之理且飲食之中有五味天地之氣有六淫人身之中有七情皆能生病更有賊微正邪之别氣與味也皆無形之物能傷於有形之質何患不生於病況眼科之中又有與大方之不同治之各有異亦宜審其受病之因視其內外淺深之症假若一槩治療不無抱薪之患良可惜哉豫因幼耽疾苦求翳療逮今數年於是熟玩諸家之書治之玄妙之旨訪尋師友寶博方書採集百端推原其本凡有疑難之間不恥下問務究奧旨子能潛心注意雖不登岐黃龍木之岸亦可謂醫中魁者也凡看眼法先審瞳人神光涎看風輪再察白仁四辨胞臉二眥此四者眼科之大要看眼之時令其平身正立緩緩舉手輕撑開眼皮先審瞳人若有神光則開合猛烈涎看風輪若展縮雄健則魂魄無病三察氣輪無病則澤潤光滑四辨其肉輪若好則開合有力二眥不蠧赤矣凡審翳法若久年翳膜能去者其翳浮虛爛紅其眼不張若近年發歇眼其翳紅白色浮厚者有些紅未退其淚者易散看其中多有死釘不能去若散翳如紅霞色者易退若因頭痛起因有死白翳者難退又有一樣厚翳去盡其眼全痊黑睛有些微雲薄薄帶淡白色不能去名曰冷翳凡烙去將烙時可安心定志將眼撑開用濕紙將四眥好肉處以濕紙敷定只留要烙處許大將匙燒紅於細綿上開過即烙之不可傷四弦烙乾用和解藥外敷之使且拔出火氣用夾法夾時先審轉看上下胞臉有瘀血處可􅡏􅡏至平血盡方止方可夾上夾子其夾不可高大只在重弦上仔細看其睫毛轉又要平正方可著力扯緊其夾肉處用小艾團灸三箇不可多灸灸多恐潰夾次日夾肉若未乾可再催用淡淡丹藥去其餘翳此眼縱有厚翳不可用重藥用金針撥光子之時將蓉花葉末調水護之一日一換宜服謹翳丸等方凡撥金針看人老瘦就手撥之肥壯者先宜服退氣散血和其五臟後可撥之退氣散血大黃末二錢五分當歸末二錢五分川山甲一分二釐連翹二分二釐白芷一分二釐乳香一分二釐沒藥一分二釐開金針法凡開金針需擇吉日風靜日暖需待日午之時焚香請呼龍樹醫王觀音菩薩然後方靜坐片時定自已之氣息令人取木凳一條以綿被帖軟同患者坐於凳被上騎馬對坐面與我對平毋俟高低緩緩以銅簪腳於開縫處點計之次看鋒針口與瞳人三分之下要憑口訣使高低逺近與將鋒針令其入眼轉看數遍足了方按鋒針三四下看透了即取起有些血出用綿紙拭乾其血後方用地方令針緩緩撚訊若透此針取出然後依法用天字針再進取翳其翳若好撒開裹針緩緩收下停針畢方落在後去紙舉物與他看之即見不可與他人久視即用濕紙重重封固太陽用水膏塗之至次早方開看再換濕紙再封如此七日斜臥不可憑他畨身轉側七日後方開封與起無妨矣念觀音呪七遍方取出金針看其翳不浮起即用濕紙封片時方去紙舉手動之觀音呪願眼紫金燈灑灑水離易黃沙滿藏經千眼千首千龍王文殊大士騎獅子普賢菩薩乘象王日裏雲膜盡翳膜消磨強中強吉中吉眼中常願得光明清淨般若波羅密眼科用藥涎第法夫眼疾之醫雖分症類而其中病源不可不深思而熟視哉夫疾有久新證有輕重需分表裏風熱氣熱濕熱實熱而新病者皆因內積熱毒之輕循經絡而上頭目遇外風寒所觸而發者必需先發表風邪後乃逺其火熱黃連黃芩以瀉火防風薄荷以踈風兼以麻黃蒼术之類如無風寒所逼惟血壅上宜用當歸大黃防己墜下之劑久眼昏蒙所曉宜用當歸地黃防風羌活之類有翳膜加木賊蒺藜蟬退決明等劑如胞合眼皮不開此乃寒邪之氣傷胞宜行氣之藥青皮黃茋香附兼以風藥佐之血滯者宜調血赤芍歸尾鼠粘如頭痛者羌活白芷蔓荆藁本川烏之類佐以風藥防風荆芥玄參柴胡細辛用之必當也如眼眩暈昏潰十分作痛但虛腫痛及眼眶此乃痰飲所患宜二陳湯兼佐以風藥如腫脹暗痛熱淚難禁者苦寒之藥宜然但視人之形氣虛實體之盛衰務究其內外淺深不可專書全在人之活法方書者乃前人立法之規使後無失其序如歸於症者則緩可以尋方儻暴發者變動於頃刻茍不明於藥性寒溫病勢之緩急而使之療非徒無益而反害之矣豫掇拾諸家之方贅成歌括六十餘首此平昔應驗之神方若用意熟記則不思忖而了然矣若能知抽添之工夫加減之意趣真可謂眼科中之至寶哉後之學者當以豫之用心珍之重之俾術不輕而身不賤矣內障一書乃心授之法故不形於紙筆如若泛泛豈仁人君子哉金針眼科經驗方藥詩括酒調散歸及麻蒼赤芍菊甘羌大黃茺蔚桑螵共十味暴風腫痛用之良酒煎散內歸芎苓赤芍木通山梔仁龍膽大黃鬱金入防風加上效如神酒調洗肝有黑參知母大黃芩桔梗梔子朴硝共七味睛痛淚出用之痊四順當歸與大黃更兼甘草赤芍良不拘疾眼經年久一服交君便可康八正車前與瞿麥匾芎滑石山梔仁大黃木通同甘草燈心竹葉效如神雙解防風將軍芍薄荷芎歸草朴硝梔翹梗芩膏麻黃荆芥白术滑石良當歸活血煎黃茋薄荷蒼术麻黃宜川芎羌活菊花等熟黃荆芥沒藥醫大黃當歸散菊花薄荷黃芩川芎佳壅腫血凝生赤翳頻頻服藥再連渣七寶洗心當歸芍黃連荆芥及麻黃梔子大黃共七味眼疼赤痛正相當九仙飲治眼通紅赤芍當歸與木通白芷黃芩同甘草菊花荆芥與川芎治時散有蜜蒙花歸菊荆蟬梔子加木賊防風甘草配更兼赤白芍無差蒼术散能止昏淚夏枯木賊甘草附蒺藜白芷芎防風蟬退天蠶蔓荆助修肝散有當歸芩薄荷連翹山梔仁甘草防風加蜜烹肝虛目暗用之靈瀉肝散內有桔梗大黃知母與黑參朴硝黃芩連十味眼痛暴發霎時