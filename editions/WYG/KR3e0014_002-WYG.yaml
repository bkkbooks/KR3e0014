右二香不過火煎出藥後將此二味香磨與藥同服若經脉月流不斷或因氣脹冲眼眼珠腫痛翳膜不退服天麻散天麻退翳散治垂簾翳障昏暗失明當歸一兩好酒浸焙乾熟地黄一兩酒浸焙乾赤芍藥二兩五錢熱水泡川芎一兩五錢白姜蠶一兩熱水泡洗去絲姜汁炒蟬退五十隻水泡洗去頭足羗活防風荆芥木賊各一兩去根節石決明一兩燒過存性白蒺藜一兩五錢白芷一兩五錢甘草七錢麥門冬二兩黄芩尾羊角天麻炒存性厚枳殻炒蔓荆子各一兩打少碎菊花一兩蜜䝉花七錢共二十一味每服蓮子三箇燈心七根水一鍾半煎至八分食後温服若眼紅加黄連酒煎散治眼赤色有氣熱宜服此方痛治婦人赤腫下垂初服此起漢防己防風甘草荆芥當歸赤芍藥牛旁子右酒煎食後服大黄當歸散治眼壅腫瘀血凝滯攻冲生翳宜服當歸菊花大黄炒黄芩紅花炒蘓木梔子炒右煎服當歸薄梗湯治眼生翳涙出羞明發乆不愈薄荷桔梗知母黒參黄芩酒炒赤芍藥生地黄菊花茺蔚子當歸桑白皮防風川芎白芷甘草右浄水一鍾􅋩服黄芩白芷散治眼血翳淚出羞明發乆不愈當歸黄芩防己防風川芎白芷蒺藜石決明桔梗青箱草決明蒙花茺蔚子菊花木賊知母赤芍藥右為細末食後清茶下防風菊花湯治初起努肉攀睛急宜服之防風黄連桑白皮赤茯芩瞿麥車前子梔子大黄黄芩細辛桔梗連翹右水煎半飢温服加減當歸菊連湯治膜下垂初服初發此方致效如乆病此方收功當歸白芷赤茯苓黄芩赤芍知母桑螵蛸生地黄木通連翹麥門冬菊花防風川芎石膏茺蔚覆盆子甘草右水煎食後服蒼术散治小兒痘瘡入眼生翳膜羞明怕日蒼术槐花防風乾葛藁本川芎蛇退枸杞子蒺藜黄芩酒炒乳香不見火藥前成方下白菊花家産蟬退木賊石膏谷精草甘草没藥不見火煎成藥傾碗内同乳香一齊下服右為末水煎食後服大人水煎小兒為末服之此治小兒疳眼其症泄後眼不開宜服此進賢方當歸菊花黄連各五錢右為末水一鍾入蜜一匙煎三沸食後服之小兒班瘡入眼柴胡湯又用茶調洗肝散如赤眼用四物湯四物湯赤芍藥羗活蟬退木賊黄芩大黄䝉花粉草桔梗蒺藜鬱金當歸防風龍膽草川芎獨活石膏川椒菊花草決明黄連荆芥蒼术車前子谷精草右每服燈心十根温服六一丸治熱淚蛤粉黄連木賊香附米右為末糊丸茶送下通草散治風淚障翳川芎羗活赤芍藥甘草當歸麝香右為末捜匀為丸如皂角子大百沸湯泡淚眼神效治眼赤腫大黄荆芥鬱金薄荷朴硝痛加没藥右為末用姜汁調或赤加葱根搥爛和藥貼太陽二穴治小兒眼不開用葶藶子為末取猪膽調貼額上小撥雲散治男婦目澁痛爛淚出羞明怕日血灌瞳人黄芩甘草梔子大黄芍藥龍膽草鬱金羗活蟬退木賊當歸䝉花蒺藜洗心散治眼目腫痛難開澁淚大黄炒黄芩梔子甘草黄栢木通菊花赤芍藥防風荆芥蜜蒙花散治乆患内外障翳羞明怕日迎風洒淚腫痛難開努肉攀睛風􅉯氣障等病皆治之䝉花威靈仙草決明羗活大黄黒附子石膏川椒炒木賊甘草蟬退獨活楮實子川芎荆芥車前子防風菊花黄連蒼术右燈心煎服消風散治一切風毒上攻頭目拘急鼻澁男婦宜服藿香白芷全蝎甘草防風青風藤又方治前症外感風邪頭痛鼻塞流涕眼目赤腫荆芥甘草羗活防風陳皮川芎蘓葉蟬退附米升麻麻黄右姜三片葱三根􅉯服取汗為度治爛弦風不問逺年近日洗藥黄連五倍子􅅋仁當歸明礬焙銅青右為細末將小鍾張水入藥於内飯上蒸過藥水㸃洗爛處為妙治時行􅉯眼防風川芎生地黄赤芍藥梔子龍膽草蒼术浸炒甘草荆芥黄栢右煎服爛弦風用白礬光醋飛過取無病婦人乳汁調雞毛㸃搽之爛弦風赤眼水銀一錢銀硃五分銅青三分右姜包煨過共為末篩過㸃眼弦如神眼目頭痛消風散藿香川芎甘草白茯苓人參荆芥逢州豆甘草蚕陳皮蟬退羗活獨活防風加細辛白芷薄荷名川芎茶調散㸃藥冷眼用火硝二錢水飛過晒乾蘆甘石煉過二分不開流淚風痒一切治之􅉯眼朋砂一錢研細片腦二釐入前藥暴赤眼雞子一箇去黄用白黄連研細末一錢入雞子白内紙封放爛泥中埋一日一夜㳄早取出濾過㸃之五臟要論心􅉯眼紅者血􅉯則可用黄連當歸尾蘇木紅花赤芍藥痒痛之類虚者本方若虚此數味除之加人參細辛沒藥歸尾熟地黄茯苓之類肺􅉯火旺者則可用山梔子桑白皮地骨皮黄芩防風天麥二門冬之類虚則可加人參沉香黄茋門石五味子之類實者用葶藶子連翹肝氣盛火旺者則可用柴胡羗活青箱子白芍藥羚羊角虚則除之加熟地黄當歸川芎楮實子枸杞子之類脾胃實者則可用石膏朴硝黄芩黄栢虚則除之可加白术蒼术枳殻陳皮半夏人參之類腎􅉯相火旺者則可用黄栢知母車前子木通滑石瞿麥匾蓄大黄朴硝之類虚則大忌之可加肉蓯蓉五味子磁石兔絲子乳香川椒青鹽枸杞子之類夫審瞳人之法瞳人開大者忌辛辣之藥瞳人焦小者宜寒涼辛辣則可也開大者以酸藥收之焦小者以辛藥散之乆注不開者宜發之乆積宜行氣血為主養肝血還睛丸亦可用之末成症主方秘要服表裏不退疼痛愈甚用細辛湯明目細辛湯治眼赤痛眉攢腫悶鼻塞涕涶稠粘大便秘結羞明怕日隠澁難開睫成紉多眵粘助陽和血湯治隂陽不升降作痛不時隠澁有淚眵蠧紅淚糊或時發赤眼涼藥不退者用當苦湯眼暴發􅉯火旺苦疼不住服利藥未效有熱火退可用當歸龍膽湯治眼中黄仁生黄白翳從下而上此候多是火旺也人若患此此藥能瀉火退􅉯又能退翳消紅腫桑螵蛸酒調散治風􅉯裏病雙解散實熱裏病此藥治傷風頭疼及眼珠腫痛或偏正此是傷風寒眼腫雖甚其眼皮帯浮而軟人多鼻塞聲重眼羞明怕日白仁雖虚壅而不蠧紅如此狀者用前二散表裏之腫消痛止用生地黄散撥雲湯變用又變前方不可乆服鬱金酒裏熱無表症治一切實熱其眼腫起如桃有不近人手之怕羞明怕日或内壅突起蠧紅淚出如湯鼻涕溏流内生淡赤虚翳如此狀者其翳不能為害􅉯去退翳即消此藥通解之痛止後用救苦湯當歸龍膽收功酒調洗肝散經驗洗肝散治一切􅉯眼及赤眼難開眼珠痛白仁赤而痛不虚可用止痛生地黄散後用功亦同當歸活血湯治羞明怕日者頭痛雖甚内不蠧紅此樣眼多虚或眼上珠生白䧟翳者此方可與蟬花散蜜䝉花散相間服之效蜜䝉花散治一切體虚之人無疼有羞明者服涼藥不得其眼羞明而内痛白仁内隠紅常流清涕涙視物蒙䝉此藥可用日進二三服決明子散蟬花散此三方功亦同效省風湯治一切肝氣有餘瞳人鎻𦂳或成乾缺視物不能明繚亂白仁淡紅瞳人焦小黄色夜見五色燈光者此方能除肝膽極􅉯乆仙飲治年老之人眼赤不退帶紫紅白色若然有蠧紅者以暴發客􅉯類推之洗肝散治眼肝氣有餘風輪變色焦枯或疼痛外生赤翳此方能除火退肝􅉯紫金丸治外障生雲膜血翳服涼藥不退而不多痛者可用夜光栁紅丸治風毒上攻眼虚腫頗有紅紫或痒或痛生翳年乆服諸藥不效可用修肝散治暴發眼及發不時疼痛甚者􅉯服肝氣上升淚出汪汪内有鮮紅可用至如痛止血散不用補肝重明丸治諸眼服涼藥表裏愈後失神光者其眼無羞明用之能補養肝血還睛丸亦可用之當歸龍膽湯治眼中黄仁生白翳從下而上此候多是火旺也人有此患此藥瀉火退􅉯用能退翳消紅腫審症應驗口訣如男子婦人患偏正頭痛者先審熱甚用雙解散二三貼大通之後服川芎茶調散加涼劑㸃用九一丹冷痛者用桑螵蛸酒調散大通之後用川芎散神清散主之㸃用清涼散少加腦入些姜粉無不效矣烏輪赤暈刺痛浮漿此肝􅉯也治法宜用酒調洗肝散加麻黄赤芍或瀉肝散修肝散收功生地黄散㸃用清涼散一九丹膽生清淚枯黄遶睛此肝虚也治法用止淚補肝散㸃用九一丹後服補腎丸此乃滋母益子也瞳人開大淡白偏斜者此腎虚也治方服補腎丸補腎明目丸駐景丸㸃用九一丹多服少㸃瞳人焦小或帶微黄此腎􅉯也治法先服五瀉湯著風之類後收功用補腎明目丸乆服甚效瞳青胞白痒而清淚不赤不疼是謂之風眼治法服羗活除風湯㸃九一丹間二八丹入些姜粉效烏輪突起胞硬瞳紅眵淚濕漿裏􅉯則痛是謂之􅉯眼治方用雙解散加涼大通之劑瞳痛止用生地黄散㸃用清涼散間九一丹㸃之隨人治法用之眼渾如淚胞腫而軟上壅濛濛酸渣微赤是謂之氣眼服桑螵蛸酒調散後服明目流氣飲當歸湯主之其或風與􅉯并則痒而浮赤風與氣摶則痒澁昏沉㸃用九一丹間二八丹服羗活除風湯血􅉯交聚故生淫膚粟肉紅縷偷針之類服用瀉脾湯瀉心湯主之㸃用清涼散有淫膚粟肉可􅡏洗至平洗上眼􅉯經乆復有風冷所乘則赤爛㸃用清涼散服用瀉心湯洗肝散主之洗用綿裹散其效甚速眼中不痛而赤但為痰飲所注則作痛服用半夏二陳湯三四貼後服明目流氣飲不用㸃藥肝氣不順而挾􅉯所以羞明服用洗肝散二三貼加麻黄後服蜜䝉花散五七貼補腎主之㸃用九一丹加清涼散初不可重藥白睛帶赤或紅筋者其熱在肺服洗肺湯除熱飲洗肝散㸃用清涼藥九一丹上胞下臉或目唇間如疥㸃者其熱在脾治先服瀉脾湯瀉脾除熱飲三黄丸主之可􅡏可洗用清涼散㸃有淚翳者九一丹㸃之因風則散之用九一丹入些姜粉熱則清涼散㸃之氣結則調順之將前藥間㸃因風者可用防風通聖散即名雙解散後服羗活除風湯熱者洗肝散修肝散氣結者服流氣飲黄茋湯主之白䧟魚鱗之症多因肝腎俱實血衰成䧟治法服酒調散二貼後服蟬花散蜜蒙花散相間服之效㸃用二八丹調乳汁㸃間九一丹㸃之突起睛高旋螺尖起嶮峻利害之症也又有一法與他取平之效將鋒針針入三分以鳯屎㸃針口所以毒攻毒或隂丹醮㸃亦可先服鬱金酒調散四五貼後可動針此乃平之法無光之效也又有一症逓年月眼内痒極秘曰諸痛為實諸痒為虚人之患眼虚腫及眼眶骨此痰飲為患治法用明目流氣飲加半夏陳皮厚朴三味用姜二片同煎連服四五貼其痛即除另將二陳湯丹藥亦可㸃用治之隨輕重所施治法在人意耳頭風冷痛􅉯痛風痛痰厥痛係偏風陽明頭痛眼涙熱淚冷淚虚淚風淚濕淚審症秘論暴發眼者審他是􅉯甚用雙解救苦湯當歸龍膽湯修肝散洗肝散瀉肝散鬱金酒調散有是風熱火病服涼藥不退者用明目細辛湯助陽活血湯紫金川芎茶調散明目流氣飲桑螵蛸酒調散有是乆病血滯風甚用當歸和血煎神清散没藥散捲雲湯發歇無時用生地黄散破血紅花散有是風毒為病用蟬花散如聖散川芎茶調散神清散夜光抑紅丸痰病用清熱半夏二陳湯之類老痰用四生湯有是乆病無表病裏病眼内浄了用蟬花散蜜䝉花散決明子散十味還睛丸若内病俱無但是外病可㳄第依法不需服藥有翳只是去翳藥加減療之辯眼經脉交傳病症論有人問於予曰人之眼目乃五臟六腑之精苟有患傷於内腑其理何哉然則又有左病而不傳右右病而不傳左左右俱病未審其詳請而言之予應之曰噫非精於岐黄龍木之奥者莫明乎此也夫眼者乃五腑之專精也目者乃心之竅也瞳人者腎之精也宗精之水所以不出行血裹之氣輔之共凑於目頭者諸陽之所聚也足太陽膀胱之脉起於目之鋭背通頂入腦正屬目本名曰眼係督脉陽柔之㑹首循風府而出則入係腦則為目風厥肝脉上出額督㑹於巔頂其别交者從目係風相摶故目䐠􅀈無所見頂中風府兩筋之間乃别隂陽交於目内鋭皆隂氣盛則目膜陽氣盛則目瞑病而不得臥者衛氣不得入於隂故陽氣滿而隂氣虚故目不瞑而不得抛者衛氣流於隂不得於陽陽氣虚故目閉故病猶有偏勝之理且飲食之中有五味天地之氣有六淫人身之中有七情皆能生病更有賊微正邪之别氣與味也皆無形之物能傷於有形之質何患不生於病況眼科之中又有與大方之不同治之各有異亦宜審其受病之因視其内外淺深之症假若一槩治療不無抱薪之患良可惜哉予因幼躭疾苦求翳療迨今數年於是熟玩諸家之書治之𤣥妙之㫖訪尋師友寳博方書採集百端推原其本凡有疑難之間不恥下問務究奥㫖子能潛心注意雖不登岐黄龍木之岸亦可謂醫中魁者也凡看眼法先審瞳人神光㳄看風輪再察白仁四辨胞臉二眥此四者眼科之大要看眼之時令其平身正立緩緩舉手輕撑開眼皮先審瞳人若有神光則開合猛烈㳄看風輪若展縮雄徤則魂魄無病三察氣輪無病則澤潤光滑四辨其肉輪若好則開合有力二眥不蠧赤矣凡審翳法若乆年翳膜能去者其翳浮虚爛紅其眼不張若近年發歇眼其翳紅白色浮厚者有些紅未退其淚者易散看其中多有死釘不能去若散翳如紅霞色者易退若因頭痛起因有死白翳者難退又有一樣厚翳去盡其眼全痊黑睛有些微雲薄薄帶淡白色不能去名曰冷翳凡烙去將烙時可安心定志將眼撑開用濕紙將四眥好肉處以濕紙敷定只留要烙處許大將匙燒紅於細綿上開過即烙之不可傷四弦烙乾用和解藥外敷之使且抜出火氣用夾法夾時先審轉看上下胞臉有瘀血處可􅡏􅡏至平血盡方止方可夾上夾子其夾不可高大只在重弦上仔細看其睫毛轉又要平正方可著力扯𦂳其夾肉處用小艾團灸三箇不可多灸灸多恐潰夾次日夾肉若未乾可再催用淡淡丹藥去其餘翳此眼縱有厚翳不可用重藥用金針撥光子之時將蓉花葉末調水䕶之一日一換宜服謹翳丸等方凡撥金針看人老瘦就手撥之肥壯者先宜服退氣散血和其五臟後可撥之退氣散血大黄末二錢五分當歸末二錢五分川山甲一分二釐連翹二分二釐白芷一分二釐乳香一分二釐没藥一分二釐開金針法凡開金針需擇吉日風静日煖需待日午之時焚香請呼龍樹醫王觀音菩薩然後方静坐片時定自已之氣息令人取木凳一條以綿被帖軟仝患者坐於凳被上騎馬對坐面與我對平毋俟高低緩緩以銅簪脚於開縫處㸃計之次看鋒針口與瞳人三分之下要憑口訣使高低逺近與將鋒針令其入眼轉看數遍足了方按鋒針三四下看透了即取起有些血出用綿紙拭乾其血後方用地方令針緩緩撚訊若透此針取出然後依法用天字針再進取翳其翳若好撒開裹針緩緩收下停針畢方落在後去紙舉物與他看之即見不可與他人乆視即用濕紙重重封固太陽用水膏塗之至次早方開看再換濕紙再封如此七日斜臥不可憑他畨身轉側七日後方開封與起無妨矣念觀音呪七遍方取出金針看其翳不浮起即用濕紙封片時方去紙舉手動之觀音呪願眼紫金燈洒洒水离易黄沙滿藏經千眼千首千龍王文殊大士騎獅子普賢菩薩乘象王日裏雲膜盡翳膜消磨強中強吉中吉眼中常願得光明清浄般若波羅宻眼科用藥㳄第法夫眼疾之醫雖分症類而其中病源不可不深思而熟視哉夫疾有乆新証有輕重需分表裏風熱氣熱濕熱實熱而新病者皆因内積熱毒之輕循經絡而上頭目遇外風寒所觸而發者必需先發表風邪後乃逺其火熱黄連黄芩以瀉火防風薄荷以踈風兼以麻黄蒼术之類如無風寒所逼惟血壅上宜用當歸大黄防己墜下之劑乆眼昏䝉所曉宜用當歸地黄防風羗活之類有翳膜加木賊蒺藜蟬退決明等劑如胞合眼皮不開此乃寒邪之氣傷胞宜行氣之藥青皮黄茋香附兼以風藥佐之血滯者宜調血赤芍歸尾鼠粘如頭痛者羗活白芷蔓荆藁本川烏之類佐以風藥防風荆芥𤣥參柴胡細辛用之必當也如眼眩暈昏潰十分作痛但虚腫痛及眼眶此乃痰飲所患宜二陳湯兼佐以風藥如腫脹暗痛􅉯涙難禁者苦寒之藥宜然但視人之形氣虚實體之盛衰務究其内外淺深不可專書全在人之活法方書者乃前人立法之規使後無失其序如歸於症者則緩可以尋方儻暴發者變動於頃刻茍不明於藥性寒温病勢之緩急而使之療非徒無益而反害之矣予掇拾諸家之方贅成歌括六十餘首此平昔應驗之神方若用意熟記則不思忖而了然矣若能知抽添之工夫加減之意趣真可謂眼科中之至寳哉後之學者當以予之用心珍之重之俾術不輕而身不賤矣内障一書乃心授之法故不形於紙筆如若泛泛豈仁人君子哉金針眼科經驗方藥詩括酒調散歸及麻蒼赤芍菊甘羗大黄茺蔚桑螵共十味暴風腫痛用之良酒煎散内歸芎苓赤芍木通山梔仁龍膽大黄鬱金入防風加上效如神酒調洗肝有黑參知母大黄芩桔梗梔子朴硝共七味睛痛淚出用之痊四順當歸與大黄更兼甘草赤芍良不拘疾眼經年乆一服交君便可康八正車前與瞿麥匾芎滑石山梔仁大黄木通同甘草燈心竹葉效如神雙解防風將軍芍薄荷芎歸草朴硝梔翹梗芩膏麻黄荆芥白术滑石良當歸活血煎黄茋薄荷蒼术麻黄宜川芎羗活菊花等熟黄荆芥没藥醫大黄當歸散菊花薄荷黄芩川芎佳壅腫血凝生赤翳頻頻服藥再連渣七寳洗心當歸芍黄連荆芥及麻黄梔子大黄共七味眼疼赤痛正相當九仙飲治眼通紅赤芍當歸與木通白芷黄芩同甘草菊花荆芥與川芎治時散有蜜蒙花歸菊荆蟬梔子加木賊防風甘草配更兼赤白芍無差蒼术散能止昏淚夏枯木賊甘草附蒺藜白芷芎防風蟬退天蚕蔓荆助修肝散有當歸芩薄荷連翹山梔仁甘草防風加蜜烹肝虚目暗用之靈瀉肝散内有桔梗大黄知母與黑參朴硝黄芩連十味眼痛暴發霎時平加味修肝散芥歸菊花羗活甘蒺藜大黄連翹薄荷梗赤芍防風莫改移涼膈連翹梔子仁大黄甘薄朴硝芩更加黄連赤芍藥服之􅉯毒化為塵茶調散内菊薄荷羗活川芎荆芥和石決石膏甘草少防風木賊去流疴眼中流出如何得四物補肝加木賊蒼术防風白蒺藜川芎羗活甘草炙明目細辛藁本芎紅花歸蔓荆防風生黄椒茯麻根入羗活䝉花共凑功救苦湯内桔翹辛羗活川藁柴歸身龍膽知母荆防草黄芩連栢生地升撥雲菊花及蟬退白蒺川芎荆芥配羗活防風桑白皮掃除熱翳真無偽肝風衝眼涙昏䝉羗活黄茋及撫芎甘草蒺藜荆芥穗何愁翳膜障雙睛蜜蒙花散有菊花木賊石決明莫差白芍甘草白蒺藜細研為末用清茶連翹散内有黄芩羗活菊花草決明白蒺蜜䝉龍膽草更兼甘草去羞明川芎羗活治頭疼藁本細辛白芷増更有蔓荆防風佐教君一服便安寧煖肝湯内有防風茺蔚藁甘及川芎五味細辛知母等黄芩若治最多功省味修肝用當歸赤芍防風白蒺藜蟬退大黄川芎使更加木賊是其宜復明散内石決明茺蔚青箱甘蔓荆木賊人參夏枯草白芷芎蒺草決明人參羗活散獨活甘草茯苓桔梗芍枳殻天麻地骨皮柴胡前胡川芎藥洗心散内七般藥甘草當歸同芍藥荆芥蒼木麻大黄眼腫服之如捻却退赤散内有大黄黄連白芷赤芍詳當歸白蒺葱去白何愁淚出白如湯小菊花散只五味蒺藜木賊五味是羗活為末用茶調專治羞明并澁淚防風湯内用蟬蟲薄荷當歸及川芎羗活大黄梔子草熱衝眼目并頭風蟬花散内菊芩風羗活山梔白蒺芎木賊蔓荆決明子谷精荆芥草蜜䝉省風湯内有羚羊羗活黑參麻大黄知母當歸升桔梗蜜蒙甘草是奇方補血當歸熟地黄白术白芍芎芷防車菊辛羗甘白茯桔梗茺蔚蒺大黄活血當歸散木通黄芩生地與撫芎白蒺當歸生梔子赤芍甘草菊花同碗血當歸劉奇菊𤣥明赤芍紅蘇木夫芩歸尾羗連翹木賊甘草生地熟菩薩散藥只五味甘草防風白蒺藜蒼术荆芥治羞明效若靈丹故名是明目流氣飲牛旁荆𤣥梔藜細防風甘草大黄再添入眼中赤澁不來攻蔓荆散内有黄茋甘草人參白芍宜黄栢倍加將酒炒昏䝉虚氣用之宜川芎茶調散薄荷白芷防風甘草和更有細辛兼羗活荆茶同煎用者多助陽和血補氣湯甘草當歸白芷防蔓荆升麻柴胡使黄茋加上水煎嘗省風百解荆芥參甘草陳皮白茯苓姜蚕芎藭防風藿蟬退厚朴羗活葶散熱飲子用黄連防風羗活黄芩兼大黄當歸生地入腫痛暴發即時痊龍膽散有乾菊花川芎香附木賊加草決明中加甘草迎風冷淚却無些芎藭散内荆芥多甘草菊花及薄荷蒼术一味米泔浸研為細末任調和神仙退翳羗活歸甘草䝉花荆賊藜地骨𤓰蔞蔓枳實椒連蟬菊薄蛇皮當歸龍膽升麻草赤芍柴胡五味藁羗活石膏同黄茋黄栢連翹酒炒好洗心眼散治退紅羗活升麻草木通梔子大黄赤芍藥黄芩九味凑防風偏正頭痛用清空黄連酒炒及川芎柴胡羗活黄芩草細辛少使配防風菊花茶調散川芎荆芥細辛草防風白芷薄荷羗活劑姜蚕蟬退治頭風打撲疹痘紅花散升麻生地羗活草大黄連翹赤芍藥更加當歸尾國老小防風湯梔子仁羗活甘草當歸身赤芍大黄水煎服小兒熱毒用之神小承氣湯薄荷蟬甘草杏仁及防風羗活天麻當歸是大黄赤芍水煎同菊花膏内用大黄荆芥黄芩术草蒼羗活防風黄連佐細辛為末蜜調嘗糖煎散有龍膽草防己防風同甘草赤芍川芎荆芥歸服之奇效如神好蟬花無比有茯苓羗活防風當歸身赤芍蒺藜同甘草川芎蒼术草決明退翳撥雲黄連芩菊花龍膽羗活荆大黄石膏甘白芷石決防風草決明以上六十一方隨手作效丹藥和論對交丹四六丹可吹乆年翳膜虚厚未堅實者不見人物者可三日一㳄九一丹解之其翳即消散如水厚薄至效如是對交四六不可用也後可用珍珠散間九一丹㸃之三七丹施於年乆眼凡經曰翳不拘下生上上生下厚極者可二日一㳄以淡淡丹和解之二八丹理三五年發歇眼有紅絲畧有疼痛痒澁其翳帶紅白色可一夜一㳄輕藥和之九一丹治眼時嘗發歇眼目生翳或疼痛可㸃若無疼痛只用清涼散間九一丹㸃之若有淡翳似飛雲霧者只用碧雲丹清涼散吹㸃又有一切冷眼不受寒藥者只用清涼散少加片腦入些姜粉時時㸃之效又有一切眼不受納藥者看其翳若去得將各樣丹膏少少調乳汁時時少少㸃之更不受者用浄三黄陽丹不用腦㸃亦能消翳吹雲膏亦可主之又有一樣受不得煎藥只將陽丹不用腦麝朋砂㸃之又有一樣眼諸丹藥㸃不服將雞子檳榔磨冷水將雞翎㸃亦能退翳又有一樣眼不用丹藥將青鹽及食鹽火燒過冷水調雞毛㸃亦能退翳又有一樣眼人丢刺在眼不得出者將葱搥碎敷之又將五倍子搥碎敷刺亦出又將􅎙螂即噴屎蟲研碎敷之刺亦出煉蘆甘石浸藥水方防風黄芩大黄當歸龍膽草黄栢各一兩羗活生地黄川芎白芷細辛菊花各八錢麻黄赤芍藥蒼术木賊各六錢黄連一兩五錢荆芥五錢薄荷山梔子各七錢草烏此以下三味新増栢子仁柴胡蜜蒙花右將二十四味俱選新鮮的細切如麻豆一咀用冷水四五碗銅盆内浸三四夜若春夏浸二宿秋五冬七日常以手擦過使其味出用細布濾過之煉蘆甘石法其甘石需選帶隔又要輕或帶淡天青色可也打碎用燒過銀鍋内貯滿一仰一葢頓丹爐内煉至及紅透鈐出淬藥水内其喫過藥傾撇仍將甘石置火内依前淬如此者三凡一㳄需煉及紅不透恐甘石變色黒淬三㳄已定將甘石通打碎又用新藥水浸一宿去火毒㳄日傾盡藥水晒乾研末有石者作一處無石者作一處異研又可將藥水再濕過晒過研極細紬絹篩過即為陽丹修合隂丹法煉過甘石四兩銅青七錢五分硇砂白的二錢半青鹽二錢半彌陀僧一錢右將此五味用龍膽草及黄連二件浸過的水通將五味和均濕過􅀈碗内研得如泥至膩方可晒乾再研方入别藥又入六味黄連二錢五分浄末細辛末二錢去葉草烏末二錢薄荷葉八分乳香製過錢半没藥製過一錢合乳香製法在後右將此六味研至極細膩方入别諸藥後藥味朋砂明者一錢五分胆礬三分雄黄七分要黄明者輕粉七分黄丹五分以水淘去硝砂沉丹用晒乾硃砂五分牙硝五分海螵蛸七分火煆味淡白色者不煆血竭五分白丁香五分即小雀屎立歆者明礬一錢火枯姜粉七分姜汁沉濾細晒乾片腦少許麝香少許除片腦及麝香隨時加減外其餘藥二十三味通共一處併研至細膩細絹篩過貯作一礶謂之捲雲丹即隂丹也惟此一料捲雲丹以隂陽動静用之或可加可減斟酌膜之厚薄翳之逺近假如年乆翳膜厚者加以隂丹減陽丹若使翳膜薄者或乍發不乆者又加以陽丹減以隂丹外障諸症不出此藥百試百騐無不效真乃濟世之靈寳也珍珠散治一切膜障眼乳香製過没藥製過珍珠製過以上各一錢五分朋砂枯過各一錢輕粉一分半麝香七釐牙硝二分半銅青五分硃砂一錢五分片腦二分血竭五分胆礬二分半明礬枯二分半白丁香二分􅅋仁二錢新竹筒盛了文武火煨去壳油筒兩頭亦要紙封固取出去白皮方去油研用琥珀八分買時以一㸃研將簮脚㸃放火上燒化為清烟者氣做松香其色蠧紅乃為真也右精製為極細末配童子小便浸三黄水煑甘石為陽丹聽用怕日羞明多淚並皆治之却將黄連末熊膽牛黄􅅋仁四件用長流水一大碗於磁器内熬至半碗用重綿布濾去渣量意入蜜二兩文武火熬至紫色蘸起牽絲為度不可太過不及方將朋砂龍腦收貯在磁器封固土埋七日出火毒用時將銅簪蘸㸃於眼内少許日㸃三㳄忌動風之物靈妙應痛膏此膏治眼疼痛暴發不可忍者􅅋仁一百粒去皮油硃砂飛一錢片腦一乳香如棗核大朋砂一錢右將前藥俱為細末用蜂蜜為膏子以銅簪㸃之一二㳄其痛即止神仙碧霞丹銅緑一兩當歸二錢没藥二分製過馬牙硝五分麝香二分乳香五分製過黄連末二錢片腦二分白丁香二分一方加此三味右將前藥俱研為末熬黄連膏子為丸如龍圎核大用時將一丸涼水化開日㸃二㳄六㳄效吹雲丹治目中淚及迎風並羞明怕日常欲閉目在暗室塞其户牖翳成嵗乆遮睛此藥多㸃神效細辛升麻􅅋仁各二分青皮連翹防風各四兩柴胡五分甘草當歸各六錢荆芥蕙一錢絞取濃汁揀黄連三錢生地黄一錢五分右將㕮咀隂連翹外用浄水二碗先熬餘藥僅半碗入連翹同熬至大盞許去渣入銀石器内文武火熬至滴水内成珠不散為度煉熟蜜少許熬用之搐鼻散三黄黄栢黄芩黄連煉煑礶内三黄同便以乾為度取出又以龍膽草水洗浸一宿晒乾甘石即三黄丹聽用以前珍珠散藥末為極細末再不必用製配合三黄聽用珍珠散此能退翳翳厚者㸃之合此藥朋砂要枯過用一倍三黄丹一倍珍珠散腦麝朋砂臨時放量度下如要輕些一倍三黄丹一倍珍珠散腦麝朋砂如前再要輕些陽丹一倍三黄丹一倍珍珠散一倍上三樣共合腦麝朋砂亦要合丹功要法其合丹之日要天晴日朗更擂諸藥要細篩而又篩方妙九一丹九匙陽丹一匙隂丹二八丹八匙陽丹二匙隂丹三七丹七匙陽丹三匙隂丹四六丹六匙陽丹四匙隂丹已上丹藥俱腦麝朋砂枯煆過臨時量度加減放假如二八丹陽丹八匙隂丹二匙用片腦三釐枯過朋砂四釐麝香二釐九一丹陽丹九匙隂丹一匙枯過朋砂五釐片腦三釐麝香一釐能止淚去翳清涼散即陽丹十匙朋砂六釐生用片腦三四釐麝香三釐其腦麝朋砂㸃時合丹量度下碧雲丹即清涼散加銅録亦要腦麝或加枯礬少許能去翳膜用捲雲丹即隂丹如遇眼勾煎大小眥頭暈可將藥調液㸃退血又有一丹㸃能退翳捲雲丹一匙陽丹半匙姜粉三分飛礬半分燒過鹽一分半共合㸃之七寳散琥珀珍珠各三錢朋砂五分珊瑚一錢半硃砂碙砂各五分􅅋仁三十粒片腦麝香各一分玉屑一錢右將前藥俱細研􅀈如塵埃方入麝香片腦􅅋仁三件再研熟官絹篩過於礶内夜間臨臥以銅簪挑一米大許㸃於有翳膜處撥雲散蘆甘石煉過各二兩黄丹製過二兩川烏一兩五錢犀角一兩乳香没藥碙砂青鹽各二錢五分朋砂血竭輕粉鷹屎各二錢片腦五分麝香五分􅅋仁去壳一錢半右將前藥如法精製共研和均極膩以羊角罐收貯但有翳膜者以銅簪每夜臨臥㸃二㳄極厚者亦能去也治諸眼一切㸃貼膏藥千金勝極膏蘆甘石煉過各一兩黄連末六錢川烏炮去皮六錢銅青好的二錢川姜煨去皮六錢鷹屎二錢没藥製過黄丹各一錢乳香製過一錢血竭一錢朋砂五分龍腦五分麝香二分􅅋仁去皮油浄六錢右將前藥俱為末冬蜜一斤砂鍋内溶開生絹濾過去蠟煎熬用棍棒不住手攪熬至紫色滴水不散將前藥末入内攪匀取出於青石上鐵鎚可打千餘下或為錠子或為丸子不拘作法逺年近日疼痛風濕難開諸症將一丸温水化開或㸃眼或作錠子磨水㸃之極效又或為膏於紙上貼兩太陽穴散血尤妙熊膽膏熊膽一錢真者其色如砂糖様帶潤濕色喫在口内味苦又涼即真者牛黄一錢龍腦五分即蘇州薄荷其葉三四指大如羊葉相􅅋仁去油一錢硼砂一錢黄連為末二兩此膏治男女逺年近日内外障膜赤爛天行時氣暴發赤腫治眼腫紅痛澀難開若用􅡏洗之後可吹鼻中先含水一口然後吹之以通其氣散其風邪鵝不吃草二兩川芎白芷石菖蒲蔓荆子各三錢細辛牙皁全蝎各錢鬱金三錢右為細末礶内收貯勿令泄氣以備後用五黄膏治目腫澀痛欲以冷洗應驗好黄連黄芩黄栢大黄黄丹右為末以芙蓉葉用冷水或煎茶調貼兩太陽穴白斂膏好白芨小白芷白斂右為末牛脂熬成膏如前敷貼四生散治眼目被物刺傷或摸損生地黄生薄荷生艾葉生當歸朴硝右共搗爛貼眼眶并患處神仙散治頭目昏眩偏風痛極甜𤓰蒂燄硝雄黄蒼耳子川芎薄荷藜蘆鬱金右將前為末口含水吹一字入鼻中令患者含水一口方吹藥入患者鼻中碧天丹專治逺年近日爛弦風眼銅青五錢明礬四錢五倍子一錢白墡土一錢海螵蛸一錢薄荷葉五分右將此六味俱為末用老姜汁攪和為丸如圓眼核大要用時將一丸淡姜湯一盞泡散洗眼弦㳄日再洗依此洗三四㳄即愈八仙丹治爛眼弦風有蟲痒甚效當歸七分銅緑一錢薄荷七分白礬一錢黄連五倍燄硝各五分輕粉一分右為末極細以絹篩用絹包約龍眼核大泡洗日三五㳄藥性論當歸味甘性温入心肝二經尾能破血頭養血全用活血熱者不可用製用酒洗川芎味辛性温入肝經上行頭角助陽氣止痛下行血海能養血如氣旺者不可用赤芍藥味苦辛性寒入肝經能破血行血去赤膚止痛白芍藥味苦酸性寒入肝經能補脾損肝氣能養肝血㵼肝火如肝虚火衰者不可用熟地黄味甘性温入心經肝經補血如熱者不可用用酒蒸杵爛為餅晒亁研為末作丸如不作丸勿蒸黄栢味苦寒入腎經補腎降相火如火衰不可用龍膽草味苦性涼入肝經益肝膽氣治目赤腫除胃家伏熱半夏除濕化痰和胃氣利胸膈治太隂頭痛製用姜汁炒羗活入膀胱經治頭痛去風邪降肝氣肝虚不用防風味甘辛性熱入膀胱經以體用通療諸風以氣味能瀉肺經黄連味苦寒入心經能瀉心火涼血去中焦熱厚腸胃大黄味苦寒入胃經有推牆倒壁之功能消腫去其皮膚之熱實者生用虚者酒蒸乆患虚腫者勿用生地黄入心經治血熱生新血散瘀血涼心血寒者勿用麻黄入肺經去風寒退邪熱開九竅發表白芷味辛性熱入大膓經去風止痛泊足陽明頭痛去肺肝二經發熱細辛味辛性熱入心經能去風止淚頭痛益肝膽通竅去葉用山梔子味苦入肺經瀉肺火除五臟熱目熱赤腫宜用要炒木賊味甘入肺經去目翳益肝膽明目去風通竅止淚蒼术味辛性温入胃經平胃氣去風邪去濕止淚發散用米泔水浸一日一換水浸炒亁用瞿麥味苦入小腸經去膀胱熱養腎氣明目利小便黄連味甘性温入脾經行氣固表虚血滯不行宜用蜜浸火炙研為末作丸如不做丸勿如此滑石入小腸經能降上炎之火通九竅利小便車前子味甘鹹性寒入小腸經清利小便去肝經風熱石決明入肝經去目障明目有沉墜之功肝虚者不用火煆極紅為度青箱子性微寒入肝經瀉熱上衝去赤障肝虚不用製用酒洗草烏明入肝經治肝熱熱痛淚出明目肝虚不用白蒺藜不入湯藥宜丸入肝經明目去風止痒炒杵去刺用牡丹皮味苦寒入腎經瀉隂火陽火能涼心血能行滯血止痛地骨皮味苦寒入腎經退熱除蒸瀉肺熱宜用桑白皮味甘入肺經除肺熱瀉肺氣肺寒不用麥門冬味甘寒入肺經治肺熱去肺腑火又清心竅蜜䝉花味甘入肝經去目中赤脉眵淚能明目烏藥入肝經能順氣行氣去風胡黄連味苦寒入肝經退骨熱潮熱補肝膽明目能治小兒疳傷不下食霍亂熱痢疾小兒藥多用之蔓荆子味苦寒入三焦治頭疼眼睛痛能明目開鬱降火枸杞子味甘入腎經補腎明目去目中赤膜遮睛酒洗用何首烏味苦入心經袪風寒治陽明頭疼蟬退入肝經去風解毒脱目翳止淚散寒邪白术味苦温入脾胃經能徤脾胃生津液去胞臉濕熱氣喘者勿用又能助氣香附米味苦辛能行氣助胃氣止淚去濕用之炒去毛杵浄夏枯草禀純陽之氣得隂氣則枯能止淚去風以陽補隂之理千里光入心經去風解毒熱明目亦能行氣即夜明砂水淘去屎留砂一種草藥名千里光採其嫩葉浄洗槝汁熬成膏單用㸃眼退翳明目恐即此也前註恐非逺志味苦氣温入心經定心益志利竅安魂魄犀角入心經涼血解心熱清頭目鐵剉剉碎用或水磨服羚羊角入肝經清肺肝火清心明目肝虚不用石膏入胃經瀉胃火伏熱有鎮之功胃虚不用乾葛味甘平入胃經解肌發表退熱升提胃氣藁本味辛入膀胱經去顛頭痛引藥上行史君子味甘入胃經殺疳䖝利小便薄荷味辛寒入肝經去賊風發表利關節止痛菊花味苦甘微寒入肝經明目清頭風去目翳發表茺蔚子味辛甘入眼經除血熱明目去風甘草味甘生寒熟温入脾經生用能瀉火解毒炙者能助胃和平桑螵蛸補腎去風通五淋利小便明目散翳槐花味苦寒入心經去心赤瀉血瀉大腸熱鬱金味苦寒入心經治血鬱於目能涼能破心下氣開鬱黑參味苦醎入腎經補腎氣明目得黄芩瀉肝火除肝熱知母味苦寒入腎經補腎水瀉腎火三焦火桔梗味苦温入肺經治肺熱為諸藥之舟楫乃肺部之引經芒硝治積聚熱疾利大便不通漢防己味辛苦寒通行諸經去風寒有走逹之功蒲黄味甘性平入心經能消瘀血破血消腫炒用連翹瀉心火解脾胃濕熱除心經客熱五味子味酸性温入腎經肺經補腎滋肺益肝獨活味苦温走諸經去外受賊風無分新舊楮實子味苦寒入肺經升陽上行能去風治頭痛肉蓯蓉味酸醎性温入腎經補腎生精用酒洗相火旺不用川椒味辛熱用之於上退六腑之沉寒用之於下去目中障肓去目炒去汗用人參味甘氣温無毒入肺經補氣不足安魂魄生精開心竅通血肺寒可用肺熱傷肺白茯苓味甘温入肺經安魂定魄補心虚養神利小便旋覆花味甘入肺經清痰明目治頭風兔絲子味辛甘入腎經補腎明目能去目黑花酒洗蒸餅晒乾為丸不做丸勿製澤瀉味甘寒入膀胱利水通淋補隂不足明目黑附子味辛大熱入三焦主陽散風去寒邪火旺者不用即大附子去粗皮木香味苦性温入心經主治心痛泄胞腹中滯寒冷氣不必過火磨入藥中服牛膝能引諸藥下行丸用土牛膝春夏用葉冬用根惟葉之效尤速能益精又治竹木刺入肉敷之即出石斛味甘性温入腎經去胃熱補隂血益精壯筋骨紅花味甘苦入心經能破血行滯血少用養血天門冬味苦氣寒入肺經瀉肺火定肺氣利小便涼血去心杵為餅晒乾為丸如不做分研石菖蒲味辛性熱入腎經補腎能開心竅明目柴胡味苦寒入肝經能除往來結熱積於胸中除肝熱又得黄芩能瀉肝火黄芩味苦寒入肺經枯者瀉肝火實者退膀胱熱巴㦸能補腎益精療隂痿引氣上行陳皮去白者消痰利氣留白者補胃和中葶藶味苦寒入肺經瀉肝喘利水下肺氣炒用芎藭入腦治頭痛血虚者去頭風養血白附子一名兩頭尖去風痰止頭痛去粗皮用天麻主頭風去風疾利四肢濕痺枳殻寛腸下氣袪風化痰治風邪作痛𤓰蔞根即天花粉入肺經去痰火解熱毒又能除酒毒肺寒者不用冷痰者不可過用有熱藥此宜可亦用之匾蓄利小腸經熱閉小茴香味辛氣平開胃行氣止嘔吐膀胱冷氣腫痛入藥妙南星去風痰消腫毒用姜汁煑過草烏走筋骨敗血去風止痛姜汁煮用川烏去風寒作痛助陽荆芥去皮風邪發雄黄解熱毒散血止痛乳香調血氣利諸經之痛製用厚箬三片夾藥在中熨斗火熨去油研末用没藥破血止痛去目翳暈同前製法血竭破積血止痛去赤膚木通利小腸經結熱降心火牛旁子去風明目行血蛤粉能消痰火涼血解肌表極􅉯蛇退即蛇皮去風毒止淚痒痛全蝎消風毒破風痰尾更佳去四足藿香開胃氣結痰利之蠶退去風消痰明目去翳膜即晚蠶砂龍腦即薄荷性􅉯能通利寒􅉯去風消目赤甘松味甘性温去風下氣治心腹痛辟惡氣硃砂鎮心安魂魄涼血肉桂引太陽經止頭痛去寒邪利肝膽氣白歛散結氣除目赤􅉯藜蘆吐氣風痰快膈去蘆用根有大毒用宜斟酌白芨去賊風解中風熱閉猪牙皂角去風痰解表利氣炙去皮弦香白芷去皮膚風熱瘡痒杏仁潤肺氣去痰行血紫蘓消痰解表利氣夜明砂明目去風山茱茰入腎經除頭暈補虚生精去核天麻子去風補腎明目研碎入煎藥熊膽退熱降火去目赤熱試真假用水一碗撒灰在内將熊膽放水中分灰水各開兩邊為真者其色潤黑山藥補腎不足生精牛黄去熱痰能安魂魄涼血清心石燕通血利小便治淋􅅋仁去目中赤痛風痒去翳製法去殻用仁以竹筒盛在内於紅火煨藥紙乾取出打去油聽用珍珠清心明目去目翳製法用豆腐一塊入珠於腐内蒸過取出用洗浄無漿白綿布二三重包珠石上杵爛用細末𤣥精石安魂魄有壯氣之功沙魚皮解風毒止淚威靈僊去風邪青皮能下氣快膈消痰濁氣升於至高者而能下氣虚者不用青鹽補腎引至下部水磨化銅鍋熬成鹽聽用川練子明目退熱補腎去核用沉香補右尺命門脉壯元陽散滯血一方㸃藥撥翳膏􅅋仁去皮殻麝香四分另研琥珀一錢另研珍珠一錢放豆腐上蒸過石蟹一錢煨片腦五分另研硼砂一錢另研青鹽八分另研白丁香五分水燉紅珊瑚石燕煆滴乳香灸辰砂熊膽畧灸乾血竭金精石滚水泡銀精石滚水泡各一錢蘆甘石火煆黄連水淬淬次用五錢或七錢碙砂一錢明者將紙七重包煨另研包起遇有翳厚者加入無翳者不用右為細末和匀用磁器礶秉起一半乾㸃一半入後藥内為膏子㸃當歸尾生地黄赤芍藥蔓荆子防風羗活連翹黄芩薄荷各用五錢剉細用雪水或臘月水兩大盞石器内煑藥至一盞去渣用真正好白蜜三兩再用文武熬三四沸以新綿濾出收入磁礶内却將前藥末共作一處攪匀用清油紙縳住常常旋取㸃用此藥收八九年亦好不壊此仙傳方也銀海精微卷下
