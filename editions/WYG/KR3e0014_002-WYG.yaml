body:
  text: 銀海精微卷下問曰人之患眼赤澁腫痛年深有紅翳於烏睛上濃淚如紅霞映日者何也答曰此乃三焦積熱肝膈風熱上攻致然也治之須用去風散血清涼之藥修肝散治肝氣不順防風羗活當歸生地黄黄芩梔子赤芍藥甘草藁本大黄白蒺藜右各等分水􅋩服撥雲散黄芩甘草藁本梔子防風菊花宻蒙花連翹桔梗薄荷赤芍藥白蒺藜右水煎食後服加味修肝散方在小兒眼生翳内問曰早晨痛至午者何也答曰早晨至午皆陽旺是虚陽攻上頭風攻注為諸陽之首早晨人動則血運赤陽轉於首與風氣相攻早晨疼痛兩眥宜服川芎散白蒺藜散川芎散石膏二兩川芎五錢白附子一兩甘草羗活菊花地骨皮右等分水煎服白蒺藜散方在肝風目暗症内問曰人之患眼午後至夜漸加疼痛者何也腦虚陽毒勝也人身之血午後行於隂道至夜歸於肝之司況腦虚隂毒勝故午後漸疼痛昏花也治之須用囬陽湯㳄以夜光栁紅丸宜服囬陽湯治眼珠淡紅羞澁難開宜服附子人參當歸川芎赤芍藥茯苓五味子細辛車前子甘草右每服棗子一枚姜三片水煎半饑服夜光栁紅丸方在風牽出臉症内治風濕傷肝問曰人之患眼痛而増寒者何也答曰此乃氣衰血盛經曰血榮氣衛足厥隂主血榮隂也衛為陽今氣衰血旺乃陽不盛隂故痛極而惡寒也宜服附子猪苓湯白术湯附子猪苓湯白芍藥甘草羗活各一兩附子猪苓加黄芩柴胡右每服五錢水煎服之白术湯白术川芎蔓荆子没藥白蒺藜去刺黄芩防風五味子菊花甘草右各等分水煎服問曰人之患眼痛而體熱者何也答曰衛屬陽而發熱榮屬隂而發寒榮衛為隂陽之道也在上屬心肺在下屬肝腎今乃氣旺而血衰是陽多隂少故痛而體熱是熱邪歸于心也宜服洗心散解明散洗心散大黄赤芍藥荆芥黄連當歸連翹薄荷甘草解明散當歸赤芍藥黄芩菊花柴胡地骨皮車前子桔梗生地黄梔子連翹各一兩右各等分水煎服問曰人之患眼臉停瘀血者何也答曰此乃肝氣凝滯脾胃停風濕也或因天行赤眼之後起之太早不能調養則使血凝於胞臉之間名曰瘀血治之須番上下胞臉􅡏洗瘀血至盡宜服退赤散當歸散退赤散大黄黄芩黄連白芷當歸赤芍藥梔子桑白皮右各等分水煎服當歸散當歸生地黄赤芍藥川芎甘草菊花木賊黄芩大黄蒺藜木通梔子右各等分水煎服問曰人之患眼不痒不赤而痛者何也答曰氣腦虚也榮衛不和血氣凝滯亦有也七情欝結肝風冲上腦中風氣相攻故不痒不赤而痛初患急服藥恐變為五風内障難治宜服透紅匀氣散川芎散助陽和血湯透紅匀氣散當歸細辛白芷没藥澤蘭甘草茴香天仙藤厚朴乳香肉桂黒牽牛生地黄羗活各一兩右為末每服三錢熱酒調下川芎散川芎菊花細辛鼠粘子石膏姜蠶蒺藜各一兩右為末每服二錢米湯下助陽和血湯方在傷寒熱病後症内問曰人之患眼赤而不痛者何也答曰肝熱也膀胱澁而不利心火炎也人身之血若河澤之流比若川澤䟽通以歸於海若膀胱壅塞則洪水妄流人之血順則經絡流利上下相接週而復始逆則散漫妄行上注於目故赤而不痛也今膀胱不利心火上炎肝經實熱豈不若川澤之壅塞也治之須用八正散𨗳赤散順肝丸服之八正散𨗳赤散二方俱在大眥赤脉條下順肝丸黄連黄芩當歸􅅋仁三十粒右共為末煉宻為丸問曰左赤傳右何也答曰此隂經火熱也陽中行隂也肝也隂中行陽心也邪熱攻積於肝也肝邪交於心傳於目也左目屬太陽右目屬太隂故左赤傳右太陽經旺也宜服三黄丸洗心散三黄丸方在大眥赤脉症内熱甚加黄栢洗心散大黄當歸赤芍藥甘草荆芥麻黄梔子各一兩右各等分水煎服問曰右赤傳左何也答曰此隂經火旺脉有隂經及陽絡皆屬於肺氣者肺之精也故右赤傳左乃肺經邪熱隂絡火旺宜服瀉肺散一曰隂虚命門火旺也㵼肺散方在膜入水輪症内桑白散治肺氣壅塞邪熱上攻眼目白睛腫脹日夜痛心煩悶桑白皮𤣥參升麻杏仁旋覆花赤芍藥菊花葶􅐗防風黄芩枳殻甘草灸各一兩右每服水一鍾半姜三片煎至八分食逺温服問曰人之患眼胞臉壅腫如桃者何也答曰此乃脾肺之壅熱邪客於腠理致上下胞腫如桃痛澁淚出不絶之注桃目治之用桃葉烘熱熨其腫處宜服此散清涼散羗活除風湯蟬花散主之此散清涼散升麻赤芍藥川芎柴胡各三兩𤣥參黄芩荆芥甘草白术梔子赤茯苓乾葛草決明右為末毎服六錢水煎服羗活除風湯羗活獨活川芎桔梗大黄地骨皮黄芩各一兩麻黄蒼术甘草菊花木賊右水煎服蟬花散方在花翳白䧟症内問曰人之患眼視物不明如紗遮睛何也答曰此血衰氣旺血為榮氣為衛衛為陽而氣清榮為隂而氣濁素問曰清氣為天濁氣為地清陽發腠理濁隂走五臟者心肝脾肺腎也眼有五輪内五臟腎屬於木輪為瞳人腎水衰不能濟於肝木使肝木血衰不榮於眼目故睛少短不能乆視腎衰不為心火交濟故心火上炎眼目必熱則看物不凖今腎水衰乃虚陽攻上肝血衰故目不得血豈非血衰而氣旺也服駐景丸補腎四順涼肝散駐景丸川椒一兩去目楮實子五味子枸杞子乳香人參各一兩兔絲子肉蓯蓉各五錢右煉蜜為丸鹽湯下四順涼肝散荆芥川芎當歸防風赤芍藥甘草漢防己右各等分水煎温服問曰人之患眼女子逆經血灌瞳人滿眼赤澁者何也答曰此乃室女或肥壯婦人血熱經閉過期不行則血逆行於上注於目灌於睛外皆紅色或烏睛上起如努肉治之切不可鈎割只用下氣破血通經之藥其血翳自退宜服調經散破血紅花散順經湯𨗳赤散調經散香附米當歸尾各一兩大黄五錢蒸黄芩二兩黄連生地黄赤芍藥川芎羗活梔子薄荷木賊蘓木紅花甘草以上各一兩破血紅花散方在血翳包睛症内治室女逆經眼疼痛生血翳包睛順經湯能通經行血止痛當歸尾川芎枳殻小茴香柴胡陳皮𤣥胡索白芍藥青皮香附子桃仁紅花肉桂熱甚加黄連黄芩右各等分水煎食後温服𨗳赤散方在大眥赤脉症内沒藥散方在胞肉生瘡症内問曰婦人遇行經之際眼目澁痛者何也答曰肝虚也凡婦人稟受虚者眼中原有病根若遇行經之際去血過多肝經愈加虚損故使眼目轉加疼痛腫澁難開頭痛眩暈生翳於黑睛上或如粟米或如花翳白䧟皆因肝衰虚也宜服當歸補血散㸃以九一丹當歸補血散當歸川芎白芍藥防風細辛菊花甘草車前子蒺藜白术羗活茺蔚子薄荷各一兩大黄五錢右每服八錢水煎入酒三盞温服八物湯治虚損血枯上攻眼目黄茋茯苓熟地黄川芎當歸人參菊花白芍藥右每服半饑温服問曰白睛漸漸黄赤者何也答曰酒毒也酒能發陽過飲無度脾經受濕傷肝膽助火火傷於肺經白仁屬肺故白仁黄赤者酒之過也引血傷於肝肝受其血熱自上朝於目目受其酒之熱毒灌注睛輪黄赤宜服黄連解毒散服數貼之後㸃以清涼散黄連解毒散黄連黄芩黒參龍膽草荆芥天花粉梔子茵蔯生地黄桔梗車前子連翹右每服水煎加童便三盞温服清金涼肝散黄連黄芩梔子連翹葶􅐗桑白皮麥門冬天花粉赤芍藥乾葛荆芥杏仁青皮甘草右水煎加蜜一盞入内煎一沸食後温服問曰人之患眼偏正頭痛者何也答曰風毒甚也頭風在右者屬痰屬熱用蒼术半夏熱用酒製黄芩在左屬風及血虛風用荆芥薄荷血虚者用芎歸芍藥酒製黄栢此三症看而用之有驗治法痛甚者酒調散表之熱痛者石膏散清空散川芎茶調散冷痛者酒調散川芎散神清散主之風毒作痛菊花散如神散主之不必㸃丹酒調散下桑螵蛸的方在暴風客熱症内灸穴百㑹一穴神牕四穴臨泣二穴聽㑹二穴耳尖二穴風池二穴光明二穴太陽二穴率骨二穴定髮際并㸃各穴法則南筠參入偏則灸一邊痛處前眉心平以墨㸃記以草比同身寸三寸自眉心比至草盡處是前髮際亦以墨㸃記又大抒骨上一㸃以前草三寸盡處亦㸃記是後髮際又將草自前髮際比至後髮際平摺摘去一節又將草均分作六摺摘一摺止存五摺以此草自前髮際比至草盡處是百㑹穴又以百㑹穴為中四邊各開二寸半乃神牕穴也灸耳尖穴即率骨穴將耳摺轉尖上比寸半盡是率骨穴考過同臨泣穴以童人對眉尖上㸃為記以草自㸃比上三寸半是臨泣穴光明穴對童人上眉中是光明穴攅竹穴眉頭兩䧟中是攅竹穴睛明穴在目内大眥外畔肉上䧟宛中頰車穴在耳下曲頰端䧟中風池穴在後髮際䧟中肝腧穴在第九骨下各開寸半天府穴在胸兩腋下三寸宛宛中聽㑹穴在耳下前䧟中開口取之耳門穴在上耳前起肉當耳缺魚尾穴在小眥横紋盡處太陽穴在外眥五分是石膏散石膏五錢麻黄一兩何首烏五錢乾葛八錢右用水煎食後服清空散川芎五錢柴胡七錢黄連炒防風去蘆甘草炙羗活各一兩梔子兩半黄芩三兩半炒一半酒製一半右為細末每服一錢熱酒内入茶少許調如膏臨臥抹口内少用白湯下如頭疼每服加細辛二錢如太隂脉緩有疾名痰厥頭疼加羗活防風川芎甘草半夏一兩五錢如偏正頭痛服之不愈減羗活防風川芎一半加柴胡一倍如發熱惡寒熱兩渴此陽明頭痛只服白虎湯加香白芷白虎湯知母石膏甘草加吳白芷右各等分入粳米三十粒水煎服川芎茶調散治諸風上攻頭目偏正頭痛熱頭風薄荷八錢防風一兩五錢細辛一兩羗活白芷甘草各二兩川芎荆芥各四兩右為末每服三錢葱白茶調湯温服常服清頭目芎藭散治冷頭風石膏二錢五分草烏一分五厘芎藭二分薄荷二分甘草一分白附子二分白芷三分細辛一分仙靈脾二分清神散方在兩臉粘睛症内治冷頭風枳殻白芷石膏甘草細辛麻黄菊花散方在迎風灑淚症内如聖散白芷川烏防風各一兩細辛二分半雄黄二分草烏炮過去皮兩頭尖右為末温酒調下二日服一㳄通頂散治一切頭風川芎白芷谷精草藜蘆防風薄荷牙皂蔓荆子細辛蒲黄右為末口含水㗜之吹入鼻内亦可雄黄丸治偏正頭風全蝎雄黄各二錢盆硝一錢五分乳香没藥各二錢薄荷川芎各一錢片腦一分右為末口噙水搐吹鼻内日二㳄貼諸般疼痛眼方赤芍蒲黄與欝金芙蓉研末拌均匀硃缺土螺緊姜汁若然常痛只擦睛痛甚加白芷南星無名異血見熱乆不開加生川烏等分為末熱水調搽眼眶四圍乾了再換羗活除風湯方在前問曰能逺視不能近視者何也答曰氣旺血衰也經云近視不明是無水也治宜六味地黄丸加補腎丸諸補隂藥皆可主之六味地黄丸治腎虚眼不奈視神光不足熟地黄白茯苓牡丹皮澤㵼山茱茰山藥一方加川芎當歸蔓荆子右為末煉蜜為丸如梧桐子大每服三十丸空心服不必㸃丹問曰能近視不能逺視者何也答曰血虚氣不足也經云逺視不明是無火也治宜初起者服地芝丸千里光散菊花散隨人氣血虚實加减諸補藥皆可用地芝丸甘菊花枳殻各一兩生地黄四兩天門冬四兩又加麥門冬亦可用右為末煉蜜為丸每服三十丸空心鹽湯下千里光散菊花千里光甘草各等分右為末每服三錢夜後臨臥用茶清調下菊花散菊花四兩甘草五錢生地黄四兩白蒺藜二兩炒去刺右為末每服二錢食後米泔水下小兒疳傷問曰小兒三五嵗身加癆瘵面色痿黄眼内紅腫或突者何也答曰脾胃受傷五臟火旺名曰疳傷也治宜退熱用寒涼劑潮熱用胡宣二連湯有蟲史君子湯收功用五疳丸㸃用清涼散若至胃氣下䧟泄瀉頻頻無治法眼珠或突起變白者廢人耳二連湯胡黄連五分宣黄連一錢成童子者焙之右為末用蜜水調服或成貼服亦妙熱甚加銀柴胡史君子湯能殺疳䖝史君子三箇輕粉一分葱珠幾顆右史君子輕粉二味為細末入鷄蛋一箇攪均用濕紙包七重煨熟蛋息火氣空心與吃連吃四五箇蛋止不可多用五疳丸方在小兒疳傷症内猪肝散方在小兒疹痘症内駐景補腎明目丸治肝腎俱虚瞳人内有淡白色昏暗漸成内障服能安魂定魄補血氣虚散五味子熟地黄酒蒸妙枸杞子楮實子酒浸肉蓯蓉酒蒸焙車前子酒洗石斛去根各一兩青鹽另研一兩沉香另研五錢磁石火煨醋水飛過兔絲子酒浸另研各一兩右為細末煉蜜為丸如梧子大每服七十丸空心鹽湯下救苦湯治熱症用裹不得能退熱亦赤桔梗連翹紅花細莘甘草灸當歸身蒼术龍膽草羗活升麻柴胡防風藁本黄連黄芩生地黄知母川芎赤芍藥右薑三片葱三根食後温服決明子散黄芩甘菊木賊草決明石膏赤芍藥川芎羗活蔓荆子甘草石決明右各等分為末每服三錢水一盞姜三片煎至七分食後服貼諸般赤眼治眼赤腫不開者黄栢姜黄南星草烏黄連右等分為末姜自然汁調貼兩太陽穴一二㳄痛止如有赤障起亦可貼打傷赤腫不開如芙蓉葉菉豆粉調貼同葱搗貼亦妙清涼消毒膏敷諸熱眼薄荷葉芒硝大黄細辛雄黄黄栢右等分為末水調塗之效經驗洗眼散洗時眼熱眼大黄山梔子防風薄荷川芎羗活甘草右等分用水煎薫洗洗眼湯泡散當歸稍赤芍藥黄連杏仁右為細末每日二次用水湯泡洗酒煎散治眼有風熱赤澁痛宜服防風防己甘草荆芥當歸赤芍藥牛旁子右等分用好酒煎食後服酒調散治白仁腫痛可服槐花梔子牛旁子防風蛤粉右等分為末水煎食後入酒少調服大黄當歸散治眼壅腫瘀血凝滯不散攻冲生翳宜服歸尾酒浸川芎各一兩菊花三兩大黄酒炒五錢黄芩蘇木梔子酒炒各一兩紅花五錢右等分照加減用水煎食後服加味湯泡散洗眼方歸尾赤芍藥黄連杏仁加防風各一兩銅青二錢薄荷葉三錢三淚一曰冷淚二曰熱淚三曰眵淚一冷淚不赤不痛無翳無膜凡早出迎風有淚或至秋迎風有淚其淚自出病在肝也二熱淚如糊粘下與上臉皮有紅有腫眼㒺不見日夜見燈火淚湧出病在心也三眵淚如糊粘兩眼弦赤腫生努肉病在肺也冷淚用肝經止淚方當歸青鹽地黄木賊熱淚用此方荆芥梔子黄芩黄連木賊地黄夏枯草眵淚方桑白皮夏枯草川芎木賊葶􅐗麥門冬梔子治上實下虚血貫瞳睛防風二錢羗活白芍藥各兩半荆芥二錢生熟地黄各兩半粉草五錢當歸二錢川芎四錢菊花二錢加茯苓右為末水一鍾入當土地黄同煎温服忌一切毒物川芎丸治頭風冷涙川芎細辛白术甘菊白芷右為細末蠟丸如黍米大夜臥一丸日中一時辰換一丸荀收仲嘗謂予曰有人視一物作兩物醫者作所氣有餘故見一為二教服補肝氣藥皆不驗此何疾也予曰孫真人云目之絲上屬腦後出於頂中邪中於頭逢身之虚其人沉則隨目絲入於腦轉轉則目絲急急則目眩以轉邪中其睛所中不相比則睛散睛散則岐故見一物為兩物也後令服驅風入腦藥則愈加减駐景丸治肝腎氣虚視物􅍃􅍃血少氣多車前子略炒二兩當歸去尾熟地黄洗各五錢枸杞子川椒楮實子無翳不用五味子各一兩兔絲子酒煑焙半斤右為細末蜜水煑糊丸如梧桐子大每服三十丸空心或酒或鹽湯下撥雲散能散風毒退翳障及赤爛弦者羗活防風川芎白蒺藜荆芥蟬退甘菊花各一兩右為細末每服二錢食後桑白皮煎湯調服瀉膽散治瞳人乾缺内障𤣥參黄芩地骨皮麥門冬知母各一兩黄茋茺蔚子右每服水煎食後温服天門冬飲子治轆轤轉則外障天門冬茺尉子知母各二兩五味子防風各一兩人參茯苓羗活各兩半右每服水煎食後温服補言方所著法最奇云眼淚痒或生翳或赤痛並皆治之右用宣州黄連稿碎末􅅋核仁去皮研為膏等分和合取無所病乾棗頭三枚割頭少許留之却去核以二物滿模於中却將割下棗頭依前合定以少綿裹之惟薄羔則以茶甌量水半碗於銀礶器内文武火煎取一雞子大以綿濾待冷㸃眼前後試數人皆應食翳家用赤多得効故附之萬不失其驗補陽湯治陽不盛其隂乃隂盛陽虚則九竅不通今青白翳見於大背及足太陽少隂經中欝遏足厥隂肝經氣不得上通故目青白翳内阻也當於太陽少隂經中九原之下以監府中陽氣衝天上行此乃先補其陽後於太陽標中標者頭也㵼足厥隂肝經火也上下伏於陽中乃隂治也内經云隂盛陽虚則當先補其陽後瀉其隂此法是也每日清晨以腹中無宿食服補陽湯臨臥服益隂丸若天色變大寒大熱并勞役預日飲食不調精神不足乃先補其陽氣上升通於肝經之末利矣人參熟地黄黄茋白术甘草白芍藥羗活獨活各一兩澤瀉陳皮陳風各五錢知母炒當歸身去蘆酒製白茯苓去皮生地黄炒各三錢柴胡去苗三兩肉桂右同為粗末每服半兩水三盞煎至一盞去渣空心宿食盡消服知母飲子治花翳多年不退知母茺蔚子各三兩防風細辛桔梗茯苓大黄芒硝各一兩右每服水一碗煎至五分食後温服開明丸治逺年近日翳障昏盲寂無所見一切目疾熟地黄一兩半酒浸兔絲子車前子􅅋仁去皮麥門冬決明子地膚子茺蔚子黄芩枸杞子去心五味子防風去蘆澤瀉細辛杏仁炒去皮尖青箱子葶􅐗官桂羊肝需用白羊者肝薄切片焙乾作末或只以肝煑研爛為末作丸或少則以蜜漬之右為細末糊丸如梧桐子大每服三十丸熱水下日三服仍忌生姜糟酒炙􅏼等物磨光散治諸風攻眼磨翳障除昏暗防風羗活菊花草決明蟬退去足蛇退剪碎和麻油炒甘草灸沙苑蒺藜形如羊腎者漫火畧炒石決明揚碎研細以水飛過各五錢右為細末每服一錢半食後麥門冬煎湯調服蜜䝉花散治冷淚昏暗蜜䝉花菊花蒺藜石決明木賊去節白芍藥甘草各五錢右為細末每服一錢清茶調下服半月加至二錢決明散治眼見黑花不散決明子甘菊花各一兩防風去蘆芎藭車前子細辛梔子仁蔓荆子𤣥參白茯苓山茱茰各一兩半生地黄各三兩右為末每服二錢食後鹽湯調下羗活散治風氣攻眼昏澁多淚羗活川芎天麻旋覆花藁本防風蛇退甘菊花細辛杏仁去皮各一兩甘草炙五錢右為末水煎食後服草龍膽散治上焦風熱毒氣攻冲眼目暴赤磣痛羞明多眵迎風有淚翳膜攀睛努肉隠痛病皆治之龍膽草木賊去節草決明㣲炒甘草灸各二兩附米炒去毛川芎各四兩右為末每服二錢麥門冬熱水入沙糖少許同煎食後調服或米泔汁調亦好地黄散治黒睛或白睛先赤而後痒迎風有淚隠澁不開生地黄一兩芍藥五錢當歸甘草各五錢右每服五錢食後服㗜鼻散治目風熱腫赤難開雄黄辰砂各三兩細辛五錢麝香片腦各一分右為細末口含少許㗜鼻中瀉肝散治天行赤眼外障知母桔梗茺蔚子大黄𤣥參羗活細辛車前飲治肝經積熱上攻眼目逆順生翳血灌瞳人羞明怕日多淚宜服之車前子炒蒙花去枝草決明羗活白蒺藜炒去角龍膽草菊花粉草還睛補肝丸治肝虚兩目昏睛衝下淚白术細辛川芎人參羗活去蘆決明子㣲炒當歸切焙白茯苓去皮苦參防風去蘆官桂去粗皮地骨皮𤣥參黄芩菊花五味子車前子炒青箱子甘草灸右為細末煉蜜糊丸每服三十丸加四十丸不拘時米飲下鎮肝丸治肝經不足内受風熱上攻眼目昏暗痒澁難開多眵洒淚怕日羞明時發腫赤或生翳障澁並皆治之逺志去心三兩地膚子二兩青箱子少下白茯苓防風決明子蔓荆子人參各二兩山藥甘草甘菊花栢子仁細辛𤣥參車前子地骨皮右蜜糊丸每服三十丸食後米湯下日三服羗活散鎮肝明目暴赤眼一切内外障翳羗活川芎防風旋覆花各五錢楮葉楮實蒼术米泔浸去皮蟬退木賊菊花桑葉甘草各二兩右為細末每服二錢清茶下早晚食後臨臥時各一服合藥時不得犯鐵器及不見火忌麵及酒諸毒物青箱子丸治肝虚積熱外障箱子二兩車前子兔絲子熟地黄茺蔚子五味子細辛防風人參澤瀉茯苓各一兩右每服三十丸空心茶清下地黄丸治用力勞心肝虛風􅉯攻眼赤腫羞明漸生翳膜兼肝腎風毒􅉯氣上衝乆視目疼傷肝血肝主血勤書則肝傷而目昏肝傷則目傷風而􅉯氣凑目昏一盛不宜專服補藥當益血鎮肝而目自明矣熟地黄兩半菊花防風光明硃砂羗活桂心没藥各五錢決明子黄連各一兩右為末煉蜜為丸每服二十丸食後􅉯水服日三㳄晉范寗嘗苦目痛就張湛求方湛戲之曰古宋陽子少得其術以授魯東門伯㳄授左丘明遂世世相傳以及漢杜子夏晉左大冲凡此諸賢並有目疾得此方云省讀書一減思慮二專内視三簡外觀四日一起晚五夜早眠六凡六物熬以神火下以氣飾藴於胸出七日然後納諸方寸修之一時近視數其目睫逺視尺箠之餘長服不已非但明目及亦延年審如是而行非可謂之嘲戲亦有方也菊花散治肝受風毒眼目昏朦漸生翳膜甘菊花四兩蟬退去足白蒺藜炒焦去刺木賊童便浸宿晒乾羗活各三兩荆芥甘草各二兩右為細末每服二錢食後清茶調下湯泡散治肝虛風熱攻眼赤腫羞明漸生翳膜杏仁防風黄連赤芍藥歸尾各五錢銅青一錢薄荷三錢右剉碎每服二錢極沸湯泡乘熱先燻後洗冷則再換􅉯用日兩三㳄一方入白鹽少許開目沃沸洗鹽亦散血雷巖丸治男子婦人肝經不足風邪内乘上攻眼睛淚出羞明怕日多見黒花翳膜遮睛臉生風粟或痒或痛隠澁難開兼人患偏正頭風牽引兩目漸覺細小視物不明皆因腎水不能既濟肝木此藥乆服大修腎臟能添目力於人服藥多不知根源往往不效枸杞子菊花各二兩巴㦸酒浸一宿去皮心肉蓯蓉牛膝各一兩川椒三兩去目黑附子青鹽二錢以泔水同煑未浸去皮根右為細末浸藥水煑麵糊為丸每服十丸空心温酒下又方治肝虛或當風眼淚鎮肝明目右用臘月犍牛膽盛黑豆不論多少浸候百日開取食後夜間吞三七粒神效萬夀地芝丸治目能近視不能逺視食之能治風􅉯天門冬去心生姜焙各四兩甘菊花二兩枳殻炒三兩右為末每服一百丸食後茶清或酒下洗肝散治肝實眼人參黄芩去黒心赤茯苓梔子仁川芎柴胡地骨皮菊花桔梗黄連甘草右每服入苦竹葉七片食後服羚羊角散治肝臟實􅉯眼目昏暗時多熱涙黄芩梔子𤓰蔞胡黄連菊花細辛右每服加竹葉煎之竹葉湯治肝臟實熱眼赤疼痛淡竹葉黄芩升麻木通黄連車前子𤣥參芒硝梔子大黄炒右食後服龍膽飲治肝臟實熱眼赤腫痛龍膽草梔子防風山茵蔯川芎𤣥參荆芥穗菊花楮實甘草右食後服決明子湯治肝臟實熱目眥生赤肉澁痛決明子炒柴胡黄連竹葉防風升麻細辛菊花甘草右水煎服瀉肝散治肝熱赤眼腫痛梔子仁荆芥大黄甘草羊肝丸治肝經有􅉯目赤睛痛視物昏澁及治障翳青盲之眼羯羊肝五兩切片生用黄連研為末右先將羊肝去筋膜於砂盆内擂入黄連末杵和為丸每服五十丸不拘時􅉯水送下忌猪肉及冷水一運作五劑瘥昔唐崔承元内障喪明夜坐聞有聲問誰答曰營䝉出活今特來謝授此方依方修合服之眼復明朗助陽活血湯治眼發之後􅉯壅甚白睛紅多眵淚無疼痛而隠澁難開此因服苦寒藥過多真氣不能通九竅也故眼花不明宜助陽和血補氣眼中自然明朗不必㸃丹柴胡白芷升麻當歸黄茋防風蔓荆子甘草右水煎臨臥熱服避風寒忌食冷物甘菊花散治肝氣壅塞翳障遮睛隠澁難開菊花木賊防風蒺藜甘草木香右為末每服一錢七分不拘時沸湯㸃服甘菊花湯治内外障翳一切眼疾菊花升麻旋覆花石決明川芎大黄炒各五錢石膏羗活地骨皮木賊炒青箱子黄芩防風梔子仁荆芥草決明黄連甘草右為細末每服五錢水一碗蜜一盞