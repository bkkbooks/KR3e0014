body:
  text: 銀海精㣲卷上五輪八廓總論人有兩眼猶如天地之有兩曜視萬物察纎毫何所不至日月有一時之晦者風雲雷雨之所致也眼之失明者四氣七情之所害也大抵目為五臓之精華一身之要係故五臓分五輪八卦名八廓五輪肝屬木曰風輪在眼為烏睛心屬火曰血輪在眼為二眥脾屬土曰肉輪在眼為上下胞臉肺屬金曰氣輪在眼為白仁腎屬水曰水輪在眼為瞳人至若八廓無位有名大腸之腑為天廓脾胃之腑為地廓命門之腑為火廓腎之腑為水廓肝之腑為風廓小腸之腑為雷廓膽之腑為山廓膀胱之腑為澤廓斯為眼目之根本而又藉血為之胞絡或藴積風熱或七情之氣鬰結不散上攻眼目各隨五臓所屬而見或腫而痛羞澁多淚或生障昏暗失明其症七十有二治之須究其源因風則散之熱則清凉之氣結則調順之切不可輕用針刀鈎割偶得其愈出乎僥倖或有悞而為者則必為終身之患也又不宜通用凉藥恐氷其血凝而不流亦成痼疾用藥當量人之老少氣體之虛實又有腎虛者亦令人眼目無光或生冷翳宜補煖下元滋補腎水北方患者多是日冐風沙夜卧熱炕二氣交蒸故使之用凉藥北方之人故與南方之人用藥有不同也疹痘之後毒氣鬰結於肝而氣不能瀉攻發於眼目傷於瞳人者素無治法也五輪之圖眼中赤脉血輪心黑睛屬腎水輪深白睛屬肺氣輪應肝主風輪位亦輪更有肉輪脾臓應兩臉屬脾胞胃侵八廓之圖肝為養化之廓腎與眼疾豈無由酒色過時更惜憂莫道睛光無大故看看膜障裹雙眸膽為清浄之廓視物依稀似霧中時時手拭兩睛瞳要知冷淚頻頻出此是肝虛膽氣攻膀胱津液之廓膀胱屬水腎為夫冷淚相形本臓虛赤脉縱横輪廓内不逢妙手豈能甦胃名水谷之廓飲食相干在胃中更加積熱兩相攻臉胞漸腫生睛赤不解中宮熱不通命門抱陽之廓内抱眞陽是命門眼前花發色紛紛不能補腎調肝氣睛腫縱横似有根大腸傳送之廓傳送原因是本經肺家壅滯熱相侵只宣大腸依次第閉澁之時醫患睛小腸關泉之廓小腸腑屬關泉廓受病先從心裏傳兩眥皆赤生痒痛但調經脉自然痊腎屬㑹隂之廓視物如看霜霧多擡頭畏日事如何急宜補腎禁房室免使昏矇不得過六腑三焦膽胃大腸小腸膀胱五臓心肝脾肺腎心屬火肝屬木脾屬土肺屬金腎屬水五行生尅金生水水生木木生火火生土土生金金尅木木尅土土尅水水尅火火尅金五臓表裏心與小腸為表裏肝與膽為表裏脾與肺為表裏肺與大腸為表裏腎與膀胱為表裏三焦與命門為表裏一説命門與心胞絡為表裏三隂三陽經心是手少隂經小腸是手太陽經腎是足少隂經膀胱是足太陽經肺是手太隂經大腸是手陽明經脾是足太隂經胃是足陽明經肝是足厥隂經膽是足少陽經三焦是手少陽經命門是手厥隂經此是三隂三陽也七情喜怒憂思悲恐驚喜傷心其氣散怒傷肝其氣𦂳憂傷肺其氣聚思傷脾其氣結悲傷心胞其氣急恐傷腎其氣怯驚傷膽其氣亂此乃七情是也汗乃心之液淚乃肝之液涎乃脾之液唾乃肺之液精乃腎之液此五臟之液是也苦入心經酸入肝經甘入脾經辛入肺經鹹入腎經四氣酒色財氣風寒暑濕過度成病赤脉傳睛之症起於大眥者心之實也此心邪之侵肝也心屬火主血肝屬木主筋筋得血灌引漸至黑睛蔓延瞳人甚則看物如同隔絹是三焦相火炎上或勞心事太過或夜觀書史或能飲酒及好食五辛煎炒熱物法宜瀉火退熱老少不同治日積月累筋脉大者宜用小鋒針挑斷毒血流出赤脉斷矣若是乍發赤脉不用挑發㸃以隂二陽四藥服以四順八正當歸散凉肝之劑其病無不甦矣又有暴横之人赤脉灌睛者此生相也非比前症治之問曰人之患目大眥赤脉傳睛大眥常壅澁看物不凖者何也答曰乃心經之實熱况心或因思慮勞神或飲食太過致使三焦發熱心火愈熾故目常赤也治之雖攻少隂經心胞陽火廓先服三黄丸瀉其心火次以洗心散去其病肝連丸常鎭三黄丸㸃用清源散服用清心利小腸經降火為主用八正散八正散大黄瞿麥木通梔子滑石甘草車前子匾蓄右各等分為末毎服五錢水一鍾煎或入竹葉燈心葱頭食後服導赤散木通甘草梔子黄栢生地黄知母右毎服細末四五錢水一鍾入竹葉燈心草同煎食後服七寳洗心散當歸赤芍藥大黄各一兩麻黄二兩荆芥五錢黄連一兩梔子右為末毎服三四錢水煎食後服三黄丸黄連黄芩各一兩大黄三兩酒浸過炒右為末煉蜜為九如桐子大毎服三十丸熱水下肝連丸白羊子肝一副勿令下水以線結定總筋吊起高處濾乾血水輕輕剥去外膜可將肝置於平木板上以竹刀割下肝粉筋膜不用肝粉和為丸毎服五十丸茶送下小眥赤脉傳睛者心之虛也與大眥不同治法分貳症治之五臟之主六腑之宗且屬南方候陽象德之君火生土火乃土之母脾土實則心火虛矣治先瀉其脾少之實後補其心之虛多因夜近燈火勞傷心經致使心虛氣弱血運不行積在小眥之間故引此二者以為後之學者識然此症宜喫藥不必挑剪瀉肝散桔梗黄芩大黄芒硝梔子車前子九仙散黄芩荆芥甘草赤芍藥菊花川芎當歸木通白芷右等分為末毎服三錢用水煎食後服駐景丸治心腎俱虛血氣不足下元衰憊服楮實㣲炒枸杞子五味子人參各一兩熟地酒浸焙乾二兩乳香一兩制過肉蓯蓉酒浸焙乾四兩川椒去目炒乾一兩兎絲子淘浄去沙土酒浸三宿蒸過焙乾四兩一方加當歸右為末煉蜜為丸梧桐子大每服三十丸空心鹽湯下補勞人參丸治心神恍惚人參白茯苓白附子續斷遠志菊花甘草右為末煉蜜為丸彈子大毎服一丸細嚼食後桔梗湯下日三次補虛人參丸茯苓人參續斷遠志各一兩白附子三錢甘草白殭蠶各五錢右為末煉蜜為丸如彈子大每服一丸細嚼桔梗湯送下努肉攀睛者與大眥赤脉之症同然此症者脾胃熱毒脾受肝邪多是七情鬰結之人或夜思尋家筵無歇或飲酒樂慾致使三焦壅熱或肥壯之人血滯於大眥努肉發端之時多痒因乎擦摩努肉漸漸生侵黑睛日積月累者為實乍發乍痛者為虛治法實者小鈎為鈎鈎起剪斷些寛三五日剪㾗收滿方可㸃隂二陽四藥吹㸃餘翳漸清避風忌口齋戒可也若乍發不宜鈎剪宜服藥㸃以淡丹藥可也三焦心火俱炎亦能生此疾治之須鈎割後宜服瀉脾除熱飲瀉脾除熱飲黄茋防風充蔚子桔梗大黄黄芩黄連車前子芒硝各一兩每服六錢水煎服此症脾胃積熱相火胃火旺也若經久翳厚施實烏睛者宜鈎剪剪訖次日用退翳捲雲散調津液㸃之日一次三黄湯加寒劑常㸃用對交丹加清凉散若筋腫厚大者宜剪剪畢頭處用火烙之使其再不復生愈後仍用三黄丸收功鎭其上炎之火三黄湯治脾胃積熱致生此疾宜服加芍藥宣連黄連黄芩大黄各一兩若熱甚者脉紅盛者加黄栢石膏山梔子之類水煎食後温服金花丸黄連黄栢各四兩黄芩人參各三兩桔梗三兩半半夏二兩梔子仁二兩右為末煉蜜為丸梧桐子大毎服五十丸茶下雞冠蜆肉者心之熱酒之毒也脾胃壅滯肝臟積熱肉翳漸漸而長侵至黑睛發來高大形似雞冠蜆肉壅蔽大眥皆因相火胃火鬰結致生紅肉磣澁淚出治法初發之時用小鋒針破使惡血流出以輸其肉二三日又可針一次又法可鼻孔内剪竹葉捲作小筒彈進放血或小鋒針亦可右眼右孔左眼左孔服三黄加朴硝丸如彈子大夜卧噙化以沃上焦火正為揚湯止沸莫若去薪息火肉翳者可烙三五度其效甚速烙可用軟皮剪孔濕按眼眶烙則不傷四弦眥肉有虚有實虛切不可用剪剪則流血汪汪變為利害或壅如桃李之狀難治問曰眼肉生虛肉形似雞冠蜆肉者何也脾胃受風熱火旺脾土燥熱也治法年少者只宜瀉脾胃本臟若脾胃衰不受寒凉者宜瀉子瀉母之法瀉本臟用三黄湯加寒凉劑泄子用瀉肺湯瀉母用八正散瀉心湯主之㸃用清凉散加凉藥仍服三黄丸收功若積久大者亦宜剪剪後宜烙新發小者宜挑不用烙宜用退翳捲雲散㸃之一二次三黄丸八正散二方前症條下瀉肺湯治肺經得脾熱白仁變生雞冠蜆肉宜服桑白皮一兩去皮地骨皮一兩去土甘草七錢黄芩一兩桔梗一兩右為末每服三四錢水煎食後服瀉心湯治心熱傷脾土燥熱宜服大黄黄芩桔梗知母黑參馬兠鈴防風右等分水煎食後服兩臉粘睛者脾胃風虛冷弱邪氣聚於臉致胞臉風赤濕爛肝膈虛熱眵粘四眥夜睡上下胞臉膠凝粘𦂳血滯不散久則漸生翳膜治法宜隂一陽三吹㸃若發年久眼皮漸長雖不是拳毛倒睫亦可夾起眼皮使露黑睛消散血氣臉積有瘀血可􅡏可洗爛痒者洗以碧天丹每日侵晨用桑白皮入鹽燻洗或大寒後不落桑葉名為鐵扇子煎洗極妙或菊花葉煎湯洗亦可此乃發年乆有此症初發者無此病症耳問曰眼患年久兩臉粘而不開明者何也答曰脾胃受風冷所傷邪氣久積不散致血氣凝滯久注不開時自眵淚含糊治法年久宜當歸活血煎神清散主之近患蟬花散宻䝉花散主之若經久不愈久注不開眼皮長者雖不是拳毛倒睫亦可夾起眼皮㸃用重藥片腦不用久患虛冷當歸活血煎治風冷久積兩臉粘眼服之當歸黄茋没藥川芎血氣旺者勿用蒼术荆芥薄荷熟地黄羗活菊花麻黄右等分為末煉蜜為丸如彈子大每食後細嚼一丸清茶送下日進三次久受風邪神清散治風毒傷胞臉眼生翳膜日漸細小服之川芎薄荷羗活附米藁本防風荆芥川烏枳殻石膏白芷甘草細辛麻黄各分等右為末毎服三四錢食後清茶葱白湯送下無時疼痛蟬花散治肝經藴積熱毒傷肝上攻於目赤腫多淚羞明一切風毒傷肝並皆治之穀精草菊花蟬蜕羗活甘草蔓荆子蒺藜草决明防風川芎梔子仁宻蒙花黄芩荆芥穗木賊右各等分為末毎服二錢食後用清茶調服或荆芥湯調服無痛有羞明時服宻䝉花散治眼羞明怕日肝膽虛損瞳人不清服之宻䝉花羗活菊花蔓荆子青箱子木賊石决明蒺藜枸杞子右各等分為末毎服三錢食後清茶送下脾胃虚者加白术五分問曰眵淚粘濃出而不絕者何也答曰此肺之虚也肺受心火之邪熱所尅金得心火而衰故眵淚而不絕也宜先服艾煎丸以去肺與大腸經天廓之邪熱後用阿膠散而補之艾煎丸好艾葉醋蒸焙乾薄荷當歸地骨皮晚蚕沙即蚕屎糯米秦芁黄栢桔梗綿黄茋右為末煉蜜為丸毎服十五丸食後服桑白皮湯下或薄荷湯下阿膠散阿膠蛤粉炒一兩鼠粘子炒一兩甘草五錢糯米一兩馬兠鈴欵冬花紫菀各一兩右為末每服六錢水煎服問曰人患眼白仁常淚紅壅熱眵淚出而不絕者何也答曰此肺之實熱也肺屬金金生水金旺則水溢淚本通肝亦是肺之精華肺經實熱故目眵淚出而不絕也治之須用瀉肺湯泄肺經之實熱後用省味金花丸治其肺火則與大腸傳道流利而天廓目經於度無上炎之火眵淚浄明矣瀉肺湯地骨皮大黄芒硝桔梗甘草各一兩右每服五錢水煎省味金花丸川黄栢二兩黄芩知母桔梗連翹各一兩薄荷五錢地骨皮右煉蜜為丸毎服五十丸桑白皮湯下或薄荷湯下問曰人之患眼目有黑花茫茫如蠅翅者何也答曰此腎水衰腎乃肝之母腎水不能濟於肝木則虛熱膽乃生於肝之侵肝木焦枯膽氣不足故行動舉止則眼中神水之中蕩漾有黑影如蠅翅者治之須用猪苓散順其肝腎之邪熱次用黑參湯以凉其肝則膽經清浄之廓無邪熱之所侵後用補腎丸黑花自消猪苓散木猪苓一兩車前子五錢木通大黄梔子滑石黑狗眷匾蓄各一兩蒼术右為末毎服三錢鹽湯下黑參湯黑參黄芩生地黄赤芍藥菊花青箱子白蒺藜右為末毎服四錢水煎服補腎丸石菖蒲枸杞子白茯苓人參山藥澤瀉兎絲子肉蓯蓉各一兩右煉蜜為丸毎服五十丸鹽湯下目暗生花不能久視者何也此乃腎之虛也眼雖屬於竅門乃歸腎而為主腎虚則眼昏或貪淫樂慾酒色過度使腎臟衰憊禀受天眞不全精神短少致瞳人神水不清眼目無力故目生花不能久視治之須用還精補腎丸使隂水足無不還矣還精補腎丸人參白术茯苓蒺藜羗活木賊菊花防風甘草川芎山藥肉蓯蓉宻䝉花青箱子牛膝各一兩兎絲子右為細末煉蜜為丸或煎服亦妙眼目熱極珠磣淚出者也此隂陽不和五臟壅熱肝膈毒風上充忽然腫痛難忍五輪振起乃五臟熱極致使也宜服救睛散次用凉膈連翹散先㸃清凉散用九一丹救睛散川芎防風羗活甘草木賊石膏薄荷菊花石决明右為末每服三錢清茶下凉膈連翹散連翹大黄黄連各二兩薄荷梔子甘草黄芩朴硝各一兩右水煎服胞肉膠凝與兩臉粘睛頗同兩臉粘睛臉之病此症胞之病臉熱則眵粘病之淺胞熱則膠粘病之深故分作兩症治之脾胃壅熱肝膈風充胞臉内蠧肉壅起爛濕眵粘膠凝氣血壅滯不能疏散積之年久黑睛生翳朦昧不明羞明怕日治法以隂二陽四吹㸃有瘀血可􅡏洗以桑白皮鐵扇子菊花當歸防風荆芥木賊薄荷鹽花之類胞肉積久堅硬厚實者畨轉烙二三度而實其肉可也問曰眼久注不開内生虛肉眵淚膠凝者何也答曰胃中有伏熱鬰於内也治宜通脾瀉胃湯加寒劑降火凉血去風宜㸃堅藥内肉結原實者宜􅡏洗至肉平淨方止堅厚者亦烙無妨烙後清凉消毒膏敷之通脾瀉胃湯麥門冬茺蔚子防風大黄知母天門冬黄芩熱甚者加黄栢石膏朴硝梔仁一方又加黑參右等分為末每服五錢水煎食前服胞肉生瘡與胞肉膠凝臉生風粟兩臉粘睛四症大同小異此皆上胞下臉之病然中間分折治法各有輕重深淺􅡏洗針烙不同胞肉生瘡者此脾胃熱毒胞肉疙􅜀或風粟變而為瘡血熱化膿腐爛腥臊流汁流膿浸漬黒睛生翳眼如珠砂之色此症雖少不可不知治用隂二陽十藥日月桑白皮煎湯入枯礬鹽化畨轉眼皮以鴨翎刷洗有瘡處以血竭乳香没藥輕粉彌佗僧或有瘡處烙二三下無妨問曰胞肉生瘡碍澁睛珠者何也答曰胃得心熱也治宜瀉心火解胃熱用八正散三黄湯之類痛者用没藥散有瘡處仍用􅡏洗㸃以清凉及重藥肉虛者宜烙外用清凉消毒膏敷之八正散在前大眥赤脉條下三黄湯在前努肉條下血滯疼甚服没藥散治心脾胃得熱致胞肉生瘡宜服大黄多用眞血竭破積血止痛去赤没藥少朴硝多右照多少加減為末每服二三錢食後用茶清調下臉生風粟者臉間積血年久致生風粟與眵粘症同眵粘者無風粟故又作一症胞者上胞也臉者下臉也此脾胃壅熱致令胞臉之間漸生風粟如米甚如楊梅之狀摩擦瞳人黑睛有翳治法畨轉臉風粟逐箇用鋒針宻針三五度亦烙更妙睛有翳者用隂三陽五藥吹㸃二三夜吹一次忌口動風動血之物莫喫可也問曰下臉生風粟如楊梅之狀者何也答曰脾得邪熱血滯不行致生風粟紅蠧不平宜􅡏洗脾熱用瀉脾湯久患宜烙㸃用清凉可也瀉脾湯人參黄芩大黄桔梗白茯苓芒硝茺蔚子二兩白芍藥一兩黑參兩半細辛白芷各一兩右各等分加減每服四五錢水煎服天行赤眼者謂天地流行毒氣能傳染於人一人害眼傳於一家不約大小皆傳一遍是謂天行赤眼腫痛沙澁難開或五日而愈此一候之氣其病安矣治法此症再不可􅡏洗只用童子小便煎黄連露宿温洗日進五遍以解惡毒之氣更用胡宣二連礬雄黄共研細調姜汁㸃二眥通其惡淚其痛立止或酒調散服之二三貼無妨此症只氣候瘴毒之染雖腫痛之重終不傷黑睛瞳人也問曰一人患眼傳於一家者何也答曰天時流行瘴毒之氣相染治宜解毒凉血清熱痛甚者服用洗肝散七寳洗心散㸃用清凉散加解毒但此症與内無損極甚者二七不療自愈切不可􅡏洗去血七寳洗心散方在大眥赤脉條下洗肝散治暴發赤腫天行赤眼時常眼痛宜服大黃梔子防風薄荷當歸川芎羗活甘草右一兩為末食後熱水調二三錢服大患後生翳者與天行赤眼同一症也何分兩症治之天行赤眼只一候或七日愈矣雖同無生翳之患大患者初起陡然而起腫痛發來甚重沙澁難忍増寒作熱坐卧不安或通夜行至達旦羞明怕日淚出如湯鼻涕溏流兩眼腫起如桃日夜呻唫飲食無味二七不愈遂生翳如黃膿疥瘡占在風輪其腦牽痛治宜治胡宣二連藥照前研細調姜汁㸃用苦桃葉側栢葉菊葉柳葉薰洗服宜四順八正導赤散雖療痊可赤昏昧三個月方得復舊失於調治喪明必矣問曰天行赤眼後生白翳者何也答曰邪氣甚傷經絡也外邪甚則傷肝肝受傷則生翳治宜四順散細辛湯㸃用熊膽膏翳厚者用九一丹㸃四順湯治經絡得熱大患後生翳宜服大黃當歸甘草赤芍藥右各等分每服四五錢水煎食後服細辛湯治風邪傷肝致眼生翳茺蔚子黑參黄芩桔梗大黃車前子木通生地黃甘草右各等分水煎食後服暴露赤眼生翳者與天行赤眼同理天行赤眼者能傳染於人暴露赤眼但患於一人而無傳染之症天行者雖痛腫而無翳暴露者痛而生翳故此有别治法即其所因量其老少虛實熱則清凉之氣結則調順之此眼縱有瘀血切不可􅡏洗亦不可峻補藥宜酒煎散發散内有麻黄蒼术或大黄當歸散疏通血氣㸃以淡藥九一丹如翳厚珍珠散㸃之洗以黄連當歸防風菊花側栢葉赤芍藥薄荷荆芥之類酒煎散漢防己防風甘草荆芥當歸赤芍藥牛旁子乾菊花右各等分酒煎食後温服大黄當歸散治眼壅腫瘀血凝滯不散攻發生翳服當歸酒浸二錢菊花三錢大黄酒蒸黄芩各一兩紅花灸用蘇木梔子酒炒木賊右水煎食後服暴風客熱與暴露赤眼同也暴露者肝心二經病也故赤而痛致黑暗生翳暴風客熱者肝肺二經病故曰仁生虛翳四圍壅遶朝伏黑暗凹入白仁紅翳壅起痛澁難開故分暴露與暴風之症有别暴者乍也驟也陡然而起治法疏通退熱凉膈瀉肝增減酒調之劑發散風熱俗云熱眼忌酒孰知酒能引血藥無酒不能及於頭目也此眼不可􅡏洗不可㸃凉藥暴客之邪來之速去之亦速耳非比五臓六腑藴積發歇不時之症同俗為傷寒眼也問曰白仁壅起包小烏暗疼痛難開者何也此時肺經受毒風不散乆則發熱攻人眼中致令白睛浮腫名曰暴風客熱宜服酒調散補肝湯用捜風煎洗服瀉肝散治眼發歇不時羗活黃芩黑參各兩半桔梗大黄芒硝地骨皮各一兩右毎服六錢水煎服補肝湯藁本一兩白芷車前子石決明天麻赤芍藥防風細辛各一兩右毎服三錢米湯調下搜風煎洗眼治眼中有黑花陳皮秦芃防風細辛各一兩黃連木香各五錢右為末水一鍾浸一宿去渣入龍腦一錢蜜四兩浸火熬成膏㸃之不用蜜煎湯薫亦可又以當歸活血煎主之腫痛甚亦用雙解散酒調散發表之㸃用重藥加姜粉以辛散之雙解散防風川芎歸尾赤芍藥大黃麻黄薄荷連翹芒硝黄芩桔梗石膏滑石荆芥甘草山梔白术實者去之右等分水煎食後温服如暴發加葱三根風甚眼痛桑螵蛸酒調散治眼紅痛痛有血翳壅腫服之當歸甘草大黄赤芍藥菊花蒼术桑螵蛸羗活麻黃茺蔚子右各等分用水煎食後加酒温服如熱甚加大黄朴硝或為末温服酒調服三錢痛如神祟舊無根基只依痛得怪異或日痛而夜愈或夜痛而日愈如艾之灸針之刺忽來忽往無踪無跡號曰痛如神祟豈有神祟為禍而害眼孰知隂陽偏勝動靜氣血攻擊使然亦有信巫之地因所禱厭㾗作福而愈者有之孰知病勢將除偶因而愈曰神祟眼非也治法痛時只將艾葱熨之服酒煎散一二貼住痛㸃以時藥洗以歸尾白芷防風芍藥川芎生地黄止痛散血可也問曰眼内不紅不赤不腫乍痛如神祟者何也答曰隂陽升降不和氣血偏勝相攻使然或有血虛者下午痛或有氣旺太甚者上晝痛下晝痛者宜服助陽和血湯上晝痛者宜服酒調洗肝散明目流氣飲㸃清凉之藥又有一樣眼時時痛如針刺此是新血與舊血相攻擊治法亦同血氣虛服助陽和血湯治血氣不調如神祟痛如針刺服之蔓荆子三分香白芷三分柴胡黄茋升麻各四兩甘草灸當歸身酒浸防風各五分右作一貼水一鍾半煎八分温服臨避風處睡可也又并渣服熱氣攻痛酒調洗肝散治眼熱氣上攻無時黑睛痛者服之黑參大黃桔梗知母朴硝梔子黄芩熱甚者加生地黄歸尾之類右為末每服二三錢温酒調下日服二次熱氣鬱結明目流氣飲治氣鬱眼目赤腫服之菊花細辛大黄牛旁子川芎蒺藜荆芥𤣥參甘草蔓荆子防風梔子黄芩木賊蒼术草決明右各等分水煎食後服眼痛如針刺者即是神祟症中如艾之炙如針之刺痛同然此症皆因心臟潜伏熱毒風壅在於膈間目眩頭痛眼絲常急夜卧澁痛淚出難開時時如針刺相似急服瀉心湯八正散之劑口含水㗜以雄黄散正其頭㸃以時藥消散血氣洗以側栢葉防風荆芥薄荷黄連生地黄之類黑睛有星如釘之釘凹進痛如針刺㸃以淡藥可也瀉心湯方在前雞冠蜆肉症内八正湯方在前胞肉生瘡症内傷寒熱病外障者葢由大病新瘥出早形骸羸瘦臟腑未實氣血尚虛隂陽偏勝未復縱口多毒五辛油膩煎炒一切熱物之類蓄積諸毒衆聚停留於内熱邪必表於外攻冲於眼眼者五臟六腑之精華其症各現於五輪此症發時赤腫淚出痛澁難開瞳人闊大黑花繚亂不能遠視此血虛也治法㸃以時藥洗以散風前證活血之藥不宜􅡏洗只平補臟腑損其有餘益其不足是為活法也宜忌三兩月可也問曰兩目或發腫痛者何也答曰氣血不足虛陽攻上故也此症縱有疼痛切不可服瀉藥凉藥只宜和解之痛腫甚者明目細辛湯熊膽丸地黄湯之類㸃三七丹腦麝不用又不可􅡏洗風熱作痛明目細辛湯治熱病後患腫痛大便結羞明服川芎生地黃蔓荆子歸尾白茯苓藁本荆芥防風麻黄根羗活川椒細辛宻蒙花右各等分食後温服日一次熊膽丸治肝膽得熱火邪為病用清熱解毒熊膽一箇石決明車前子澤瀉細辛各一兩乾地黃茺蔚子牛膽一箇龍膽草右為細末煉蜜丸如梧桐子大每服四十九丸食後温酒送下地黃湯治眼久病昏澁因發而久不愈宜服防風羗活人參白茯苓當歸熟地黃黄連黄芩右各等分水煎温服風牽出臉者脾胃受風壅毒出胞臉之間臉受風而皮𦂳脾受風則肉壅此皮𦂳肉壅風牽出臉淚出汪汪無分四季此土陷不能隄水也水漬於臉濕爛之狀治法先用摩風膏刮散皮外風邪塗以白斂膏消散風毒畨轉臉皮烙三五度無妨此症一年半載易治若年久肉堅難治若眼有紅筋貫上黑睛有翳有膜吹以丹藥痒塌洗以碧天丹此症大抵眼弦之病也此症大風瘷􅂒之人面部所牽多受是病症難以調治故名風牽出臉問曰下臉畨出久不收淚出汪汪者何也答曰脾經受風邪所傷致土壊不能隄水也治法肉堅厚者用火烙三五度至皮轉為度服用夜光栁紅丸外用摩風膏摩擦之㸃用重藥少加凉夜光柳紅丸治風邪傷胞臉致風牽出臉不收宜服人參川芎荆芥白芷川烏火煨南星石膏各二兩石決明草烏去火濕炮少用藁本雄黃細辛當歸蒲黃蒼术浸炒防風薄荷藿香全蝎各二兩何首烏一兩羗活三兩甘松二兩右為末煉蜜為丸每服三十丸茶清下摩風膏治胞臉受風或疼痛諸痛處可摩可貼木香當歸白芷防風細辛藁本黑附子没藥骨碎補各一兩川烏赤芍藥肉桂各一兩猪脂牛酥鵞脂各四兩右為末香油八兩浸一日次一日砂鍋内熬入牛酥鵞脂同熬成以手摩擦按有瘡處或半身不遂用砂弓刮之使風氣散風牽喎斜者雖與風牽出臉同喎斜者脾胃虛房事不節脾胃有毒夜卧多痰或醉飽坐卧當風貪凉左右忽受風牽喎斜眼内赤痒時時攧動其眼血絲四起瞳人不開大視物濛濛甚至半身不遂治法急用摩風膏擦摩面部更以刮沙弓所患風一邊手臂通刮或通身一可刮一日一遍用大磁青碗搗碎入磁石多寡捜麺糊為餅烘熟貼面對鼻一邊左喎貼右右喎貼左貼至撦口眼正其藥取起又可炙夾車耳門穴開口取之太陽人中承漿喎左炙右喎右炙左近患者易治若年久難治問曰目睛斜視倒目者也答曰肝經受風邪所牽使其筋緩縮不利治法宜灸火發散風邪以加全蝎白附子南星半夏夜光柳紅丸外用摩風膏導引發散目睛必轉灸火穴太陽夾車耳門聽㑹耳尖風池各一穴夜光柳紅丸方在前症内摩風膏方亦在前症内被物撞破者並無所患而所因者三此外因也全然無事誤被物撞破或打撲或跌著或撞破傷胞臉也積血紫青撞破白仁外控硬殻此不能為害惟撞破三風輪血灌瞳人五併輪混雜最為利害之症痛惡瞳忍澁難開治法服以酒調散熨以葱艾或專以生地黄搗爛作餅烘執貼一日一換以散其血如無生地黃用芙蓉葉無葉用根去泥粗皮用白皮搗爛烘熱貼亦可若眼眶青黑搗生蘿蔔䕶貼切宜將息避風忌口動風動血之物諸般母肉莫吃新撞者易治若撞久血凝不散無痛者難治也問曰並無所患誤被物撞破或生翳者何也答曰外傷也與内無損治法初起者宜散血為主痛甚者没藥散止之若至血散變生白翳為不治之症也没藥散方在前胞肉生瘡症内被物撞刺生翳者與撞破一理然刺被竹木簽刺㾗傷授血灌溉遂生血翳磣澁淚出紅筋滿目此症外傷與患眼生翳不同患眼者五臟六腑之毒發出為有根病也刺傷者外傷與内無預治法與前症同寛一七之後㾗變成翳可用輕丹少少吹㸃忌淫慾嗔怒避風將息失於調治潰痛發腫傷於風輪釀成大患或至瞎進無治法也血灌瞳人者因毒血灌入金井瞳人水内也猶如水流入井中之狀清濁相混時痛澁紅光滿目視物濛濛如隔絹看物若烟霧中然先患一隻後乃相牽俱損此症有三肝症血熱日積月累灌入瞳人血凝入水此關乎肝腎二經病也此血難退撞破之血鮮而熱灌雖甚退之速又有開金針失手撥著黄仁亦有瘀血灌入瞳人舉此三症治法頗同亦用大黄當歸散没藥散墜血明目丸前被物刺破及撞刺生翳并血灌瞳人皆可服前三料藥其效甚大或生地黄芙蓉根搗爛母貼三症通呼用之或葱艾熨亦可或可方而或可圓活法而行不可拘執其方焉而獲功哉問曰人患眼目無内患忽因物刺着胞臉睛珠血積不散或瘀血灌入瞳人或用針悞損惡腫痛難忍或因惡拳打着睛珠脱出一二分者將何治法答曰打傷之時搗爛生地黄敷之以散其血先服止痛末藥散後服墜翳明目丸若因傷風服除風湯若打着睛珠流出者以手掌心搽進珠亦以生地黃敷之若無生地黃用乾地黃酒浸濕搗爛亦可服止痛没藥散没藥散没藥血竭大黃朴硝右為末毎服二錢酒調下茶下亦可墜翳明目丸石決明川芎五味子知母山藥各一兩人參細辛右為末煉蜜為丸清茶送下除風湯防風車前子藁本五味子細辛川芎桔梗右每服三錢白湯送下或水煎服問曰人之患血翳遮兩睛者何也答曰皆因心經發熱肝臓虛勞受邪熱致令眼中赤澁腫痛淚出漸有赤脉通睛常時舉發久則發筋結厚遮滿烏睛如赤肉之相故名曰血翳包睛宜服瀉心湯次以修肝活血湯瀉心湯黄連黄芩大黄連翹荆芥赤芍藥車前子薄荷菊花各一兩右㕮咀每服四五錢水煎服修肝活血湯當歸生地黄赤芍各兩半川芎羗活各七錢黄茋防風黄連大黄薄荷連翹菊花白蒺藜各一兩右每服四五錢水煎入酒二盞温服問曰血翳包睛者何也答曰心熱血旺也此病初患易治若至血散盡難消痛時用破血紅花散當歸龍膽湯㸃用清凉散當歸龍膽湯防風石膏柴胡羗活五味子升麻甘草黄連酒洗黃茋黃芩酒洗黄栢酒洗當歸龍膽草赤芍藥各五錢右㕮咀毎服五錢水煎至二碗去杳入酒少許臨卧熱服忌言語破血紅花散當歸稍川芎赤芍藥枳殻蘇枼連翹黄連黃茋梔子大黄蘇木紅花白芷薄荷升麻右各等分水煎加酒三盞温服問曰人之患目臉生小節俗名偷針者何也答曰陽明胃經之熱毒也或因食壅熱之物或飲酒大過使胃經上充於眼目故臉眥之間時發瘡毒俗名偷針此症畨轉臉皮􅡏洗瘀血㸃用清凉散先宜服退赤散後用通精散瀉脾飲退赤散黄芩黄連白芷當歸赤芍藥梔子桑白皮木通桔梗連翹每服水煎食後服通精散防風川芎當歸赤芍藥大黄芒硝蒺藜石膏黄芩甘草桔梗牙硝黄連羗活滑石荆芥右用姜三片食後服瀉脾飲茺蔚子防風黄芩𤣥參梔子石膏大黃灸知母黄栢黑睛如珠者腎肝俱勞七情鬱結之人毒風攻充熱極淚出難開疼痛甚至水輪突起黑翳如豆如珠大小不定撐起䀶胞磣澁礙人眼睛難以運動寢食不安先患一隻后乃相牽俱損治法用小鋒針逐箇横穿破其黑翳中有惡水流出即平勢若拾芥瞬息痊安眼即能開設若不諳此療服凉劑㸃凉藥靡有其功小兒如此患者多是疳眼其翳起來或如小香菰之狀不宜針其治法載小兒疳眼條下其針破翳根處宜淡丹藥吹㸃消磨翳根問曰風輪生翳如珠如蠅頭如蠏眼者何也答曰肝腎二經風熱氣鬱也治法久積黑翳高者宜挑破珠頭疼者宜撥雲湯明目細辛湯主之熱甚者當歸龍膽湯主之㸃用二八丹調乳汁用未成此症以暴發推之撥雲湯治眼黑翳如珠蠏睛疼痛風氣傷肝腎二經宜服之黄茋蜜灸細辛生薑乾葛川芎熱者除之柴胡荆芥藁本甘草升麻當歸知母羗活防風黄栢右為末每服六七錢水煎服明目細辛湯方在傷寒熱病後症内當歸龍膽湯方在前血翳包睛症内蠏睛疼痛者如黑翳同症起於瞳人肝腎之病焉其翳如豆如珠蠏睛者其翳起占瞳人翳根小而苗大此乃膽膈之病膈中壅毒膽氣伏熱赤澁淚出疼痛難開羞明怕日其翳發起尖高如蟹睛一般形狀治法與前症同用小鋒針針出惡水流盡即平吹㸃以淡淡丹藥消其翳根其服藥不同前症宜用瀉肝補腎之劑服之空心服補腎之藥飯後服瀉肝散瀉肝散補腎散蟬蛻防風蒺藜炒當歸宻蒙花木賊川芎菊花荆芥茯苓石決明煆過枸杞子知母黄栢青鹽右各等分水煎空心服旋螺尖起者熱積於肝膽毒壅於膈門充攻睛珠疼痛中央瞳人漸變青白色忽然凸起血絲纒遶此乃是膜入水輪二家併熱旋起尖來狀若螺尾遂號旋螺尖證治法宜隂二陽四丹吹㸃或調鱔魚血㸃尖處若年久須有鋒針對瞳人中央針入半分放出惡水此乃取平之就紙封將息避風忌口十數日可也服用雙解散鬱金酒調鬱金酒調散黄芩鬱金大黄防風梔子當歸川芎赤芍藥龍膽草右為末每服三錢温酒調下食後服二次突起睛高險峻利害之症也同前旋螺尖大不祥矣皆因五臓毒風所藴熱極充眼者内屬五臓外屬五輪五臓之氣毒攻五輪之瞳初起麻木疼痛汪汪淚出病勢洶湧卒暴之變莫測非精於龍木之奥㫖不能措手全諺云眼不醫不瞎正此也苟非其人殆有甚焉非徒無益而反害之治法揚湯止沸莫若去薪息火急投酒調散酒煎散宣退五臓之毒熱搗葱艾熨五輪之突起消除疼痛洗以白芷細辛當歸蒼术麻黃防風羗活未可與㸃藥宜忌口葷腥將息避風治若稍遲或控膿或突出一寸高者至此之際須鋒針針出惡水疼痛方止睛高取平耳無尤之效也當歸甘草赤芍藥菊花羗活桑螵蛸茺蔚子防風荆芥木賊右各等分水煎食後加酒三盞温服硬臉硬睛者胞臉睛珠俱木痛濕難運膈間積熱肝風上壅氣血凝滯睛臉堅硬血旺氣虛膩之人或飲酒大腸堅結多受是症先患一眼後乃相牽俱損漸生翳膜治法初發時宜摩風膏摩去風邪散運血氣或煎生地黃當歸川芎赤芍白芷羗活薫洗日三度宜瀉肝膈之熱㸃以時藥若積年久臉有瘀血宜􅡏洗黑睛有翳有膜可吹可㸃問曰眼患經久臉胞睛珠俱木不運者何也答曰血氣受邪凝閉不行故也治法宜􅡏洗服用當歸活血煎助陽和血湯㸃用重藥加辛熱姜粉之類當歸活血煎方在前兩臉粘睛症内助陽和血湯方在前傷寒熱病症内白陷魚鱗者肝肺二經積熱充壅攻上致黑睛遂生白翳如魚鱗鋪砌之狀或人棗花中有白陷發歇不時或發或聚疼痛淚出然婦人多生此病何也苦樂不由己出七情鬱結不舒毒藴於肝肺者血之室也婦人以血為主血傷則肝風黑仁風輪多生是翳甚至白陷釘入黃仁引血相授漸成大患額頭兼痛用摩頂膏摩擦封貼於額頭處用隂二陽四丹吹㸃或用青鹽黄泥固濟包煨熟研末以鴨毛蘸㸃於魚鱗中日一次又能除此翳耳問曰黑睛生白翳凹入不平成陷者何也答曰肝虛血衰也故肝虛則受風風甚則作痛血衰則成陷治法㸃用珍珠二八丹之類痛甚宜服酒調散方在前突起睛高症内没藥散方在血灌瞳人症内羞明而不痛者宜服蟬花散宻䝉花散二方在兩臉粘睛症内桑螵蛸酒調散方在暴風客熱症内人之患眼生翳如蘿蔔花或魚鱗子入陷如碎米者此肝經熱毒入腦致眼中忽然腫痛赤澁淚出不明頭痛鼻塞乃是肝風熱極腦中風熱極致使然也宜服瀉肝散加味修肝散主之瀉肝散黑參大黃黄芩知母桔梗車前子各一兩羗活龍膽草當歸芒硝右為末等分水煎服加味修肝散羗活防風桑螵蛸梔子薄荷當歸赤芍藥甘草麻黃加連翹菊花木賊川芎白蒺藜大黄黄芩荆芥各一兩右為末各等水煎入酒温服蟬花散蟬蛻菊花蒺藜蔓荆子草決明車前子防風黄芩甘草右等温水煎服補腎明目丸方在前蠅翅黑花症内宻蒙花散方在前兩臉粘睛症内氷蝦翳深者黑睛上生翳如氷蝦形狀因而名曰氷蝦也大抵與魚鱗白陷同也亦因肝經有熱㣲㣲小小占在眼之風輪黑睛含糊清眵填粘於翳之低處乍時赤澁淚出眵滿矇蔽瞳人一重如鼻涕或黃或白看則如膜遮障一般蘸却又生日久能致損眼發歇來往治法宜隂二陽四二夜吹一次稍退宜㸃侵晨用菊花側栢葉黄連歸鬚桑白皮之類煎湯日洗二三次服撥雲退翳散撥雲退翳散楮實子薄荷各五錢川芎一兩五錢黄連菊花蟬蛻各五錢𤓰蔞根生用三錢蔓荆子宻䝉花蛇退各五錢荆芥穗香白芷木賊防風甘草各五錢右為末煉蜜為丸如櫻桃大每一兩作十丸每服二丸一日二服治眼引子於後氣障木香煎湯下眼當昏暗菊花好茶下眼睛無神懶視當歸湯送下婦人血暈當歸湯下虛弱之人十全大補湯下玉翳者風充入腦積熱肝膈發歇疼痛失於調治日久積累血凝不散結成白翳遮瞞瞳人如玉色相似立名玉翳遮瞞如此之狀有進有退有紅有淚發歇未定治法用隂三陽二藥次㸃一次眼淚𢃄藥汪汪流出如此之狀甚翳膜必能漸漸收捲渾如磨鏡塵埃去淨明必復矣若發年久無進無退不紅不痛縱有丹藥之驗刀針之利終無措手之處撥雲墜翳服藥之聖功效不能施為縱然公侯王孫若受此疾為廢人矣雖有千金之貴天下之醫熟近草能其出手也問曰人之患眼翳如玉色遮瞞烏睛者何也答曰此同肝風攻充入腦積熱在於肝膈之間久乃腎虛致眼中常發熱或赤痛初則紅腫赤脉穿睛漸漸生白翳膜初起如碎米久則成片遮瞞烏睛凝結如玉色名曰玉翳遮睛治之宜服瀉肝散明目菊花散通明補腎丸瀉肝散治胃中熱歸尾大黃黃芩桔梗知母茺蔚子芒硝車前子防風赤芍藥枝子連翹薄荷右各等分每服六錢水煎服明目菊花散菊花車前子熟地黃木賊蒙花薄荷連翹白蒺藜防風川芎荆芥穗甘草右各等分水煎服通明補腎丸楮實子五味子枸杞子各一兩人參絲子肉蓯蓉菊花熟地黃當歸牛膝知母黄栢青鹽各一兩右煉蜜為丸每服五十丸空心鹽湯下膜入氷輪者肝臟積熱邪在肺經此金尅木之候也故黃仁乍時生瘡白色可後又發日往日來致膜漸入氷輪此翳之根也如水之得土變化異常遂生瘡不退日積月累久成大患謂之膜入氷輪流汁流膿痛澁難開右患傳左左患傳右治法宜明藥之類加以葱艾吹以丹藥服以湯散無有不效若傷日久不痛不疼不淚不紅如釘入木如玉之有瑕玷如玳環之有黑㸃此黃仁與氷輪變白定矣雖使岐黄龍木再世亦不能為也問曰風輪生瘡或突起愈後變成白翳久不散者何也答曰肝木衰金氣甚也此病初患時有疼有淚治宜退血瀉肺金修肝活血無疼無淚淡白色者宜服補煖活血之劑治之瀉肺散當歸黃芩各一兩桔梗麻黃枳殻各半兩秦皮葶藶菊花旋覆花生地黃防風白芷甘草𤣥參梔子各一兩地骨皮各八錢右為末毎服三錢桑白皮煎湯下修肝活血湯歸尾赤芍各一兩五錢川芎羗活各七錢黄芪防風黃連大黃各三錢薄荷連翹白蒺藜菊花各一兩右每服四錢水煎服釘翳根深者與膜入氷輪同也此乃勞傷肝經或性燥急促之人啼哭含情之婦欲强制鬱傷於肝赤澁難開痛牽頭腦淚出羞明怕日釘翳日深接引黄仁根深血援終不移治法宜用退熱飲去風散血之劑或痛甚服酒調散一二貼頭痛熨以葱艾洗以防風川芎菊花歸尾白芷麻黃羗活荆芥之類量翳大小輕重吹以丹藥將息避風大忌淫慾嗔怒不疼不痛亦為不治之症也問曰風輪生翳如針如麻米者何也答曰肝虚火動也此症多是性燥之人或思慮太過所致治法疼痛甚者宜服洗肝散糖煎散㸃用珍珠散加凉膈散俱在前修肝散梔子薄荷防風當歸甘草連翹大黃黃芩蒼术羗活菊花木賊赤芍藥麻黃右依等分為末毎服二錢食後蜜水調下或煎日進二三服糖煎散龍膽草防風防己大黃荆芥赤芍藥當歸甘草川芎右各等分為末水煎臨時服入砂糖少許同服黄膜下垂者脾胃熱風結血凝氣滯膏脂窒塞血運不能通故生是疾發歇無時痛澁淚出漸生黄膜下垂發則膜舒退則膜捲胞皮下垂羞明怕日雖舉不張黄膜漸長遮瞞瞳人也甚至滿目皆黄難辨人治法雖不是拳毛倒睫之症亦可夾些眼皮使露黑睛黄膜氣舒發歇年久可夾乍發不宜夾治宜通脾瀉胃撥雲八正之劑以對充之丹片腦少許如有淚退之速無淚退之遲忌口齋戒使衰其血易於調理也又有一症黃膜從下生上為之黃膜上充大抵治同厚者宜挑剪問曰白睛黄赤生翳如赤膜者何也答曰脾胃得肝木克土之候也治宜省味金花丸去其黄膜後用針砂平胃丸收功㸃用重藥腦不可用少下針砂平胃丸久服平胃氣去肝邪蒼术厚朴陳皮甘草針砂右各等分㕮咀為末煉蜜為丸如菉豆大每服五十丸空心米湯下省味金花丸治脾胃積熱致生黃膜梔子黄芩黄栢桑白皮地骨皮桔梗知母甘草右為細末煉蜜為丸茶清送下眼胞下生赤膜垂下遮於黑睛疼痛者乃胃熱也治法紅痛甚者服鬱金酒調散大黃當歸散微退後用撥雲湯生地黄散㸃用重藥加清凉散藥以上方俱在前大黃當歸散治胃中有熱生膜疼痛當歸赤芍藥川芎菊花大黃黃芩杏仁薄荷右各等分㕮咀食後水煎温服生地黃散治眼下赤膜發歇無時久服則不發生地黃黃栢知母防風荆芥升麻亁葛天花粉黃芩甘草桑白皮白茯芩赤芍藥右㕮咀每服七八錢重水煎食後服逆順生翳與赤膜下垂與黃膜下垂上充之症頗同然此順逆者五臟虛勞風熱冲於肝膈上胞陽明經毒壅血氣凝滯故生赤膜垂下謂之垂簾翳此為順下臉太隂肝經毒壅故翳膜下生向上謂之逆翳治法宜服瀉脾胃之劑大抵去翳之藥隨其輕重增減用之宜忌口諸毒問曰眼上下逆順上翳者何也答曰肝經虛損積毒熱甚至主翳四起侵黑睛治宜明目流氣飲蟬花無比散㸃用珍珠散次用三七丹腫者亦可􅡏洗明目流氣飲方在前傷寒熱病症内治脾得邪熱或逆順生翳蟬花無比散治風毒傷目昏暗漸生白翳遮睛白茯苓甘草灸助胃防風各四兩川芎赤芍藥各二兩石決明鹽水煑研極細白蒺藜炒去尖四兩蛇退炙兩蟬蛻去頭足四兩蒼术一兩當歸酒浸二兩右為末毎服三錢食後米汁調服茶亦可忌食毒物漏眼膿血者有甚於釘翳并膜入氷輪二症之利害也此症未發之時其頭先覺昏悶四肢如勞五臟多積風熱壅毒攻充於黑睛黃仁生出毒瘡灌溉水輪控血潰爛流膿治法宜葱艾入白芷鍋内炒熱以綿裹熨於眼胞上屢換熱的散其惡血消其敗膿止其惡痛生地黄搗爛煨熨於有瘡處更妙用隂二陽四丹對於有瘡處吹或單用枯礬輕粉血竭乳香研細對着瘡處吹㸃亦可洗以桑白皮入塩花明礬燻洗服以墜血明目丸没藥散忌動風動血之物墜翳明目丸方在前血灌瞳人症内没藥散没藥大黄蒸少用朴硝右為末每服三錢酒調下茶亦可飛塵入眼者此症全然無事誤被物或飛塵飛絲入眼者此外傷也只為塵物粘在胞臉之間粘定不出痛澁難開磣澁淚出致生障膜初患之時治法用絲線纒耳環脚畨轉上下胞臉撥出塵物即可若初時不諳此法少療日久必生翳膜遮瞞瞳人須有丹藥吹㸃胞臉内仔細畨看有物粘處必定有血積成塊或肉疙瘩此是病之發蹤處宜小鋒針挑撥或有刺塵處針毒血出可此為病之根也曰外病也初起宜將絲線捲銅匙脚撚撥出塵物久者宜畨轉看上下有積處􅡏洗至平㸃用清凉散服以散血退熱之劑酒調散當歸甘草大黃赤芍藥菊花桔梗蒼术桑螵蛸麻黃羗活茺蔚子連翹各一兩右為末每服三錢酒調下修肝散防風羗活當歸生地黃黃芩梔子赤芍藥大黃甘草蒺藜各一兩右水煎服拳毛倒睫者此脾與肺二經之得風熱也肺為五臟之華葢主一身之皮毛肺虚損則皮驟而毛落也脾家多壅濕熱致令上胞常腫大抵肝家受熱不時淚出痛痒羞明怕日赤澁難開常以手摩引致令上下胞臉皮漸長眼漸𦂳故睫毛畨倒裡面刺眼碍澁瞳人漸生翳膜欹頭側視不能正觀治法先宜􅡏洗瘀血後用竹夾夾起眼皮灸四五壯為妙使毛生向外其疾瘳耳睛中有翳用隂二陽五丹吹㸃翳即消磨其夾須依口訣務令𦂳夾不可滋水恐潰有疤痕若脱下㾗處用光粉調香油遂早搽抹久則肉色一般眼目光明如舊細辛湯治脾經腫得風熱宜服細辛防風知母茺蔚子大黃桔梗羚羊角黑參右㕮咀毎服四錢用水煎食後温服防風飲子黃連一兩細辛蔓荆子各三錢葛根防風各五錢當歸身七錢甘草灸人參右水煎食遠服避風忌口除濕壓熱飲細辛蒼术各一兩防風知母茺蔚子各兩半桔梗二兩大黄黄芩梔子仁朴硝右水煎服阿膠丸阿膠蛤粉炒䑕粘子炒甘草糯米炒各一兩馬兠鈴欵冬花紫菀桔梗右為末煉蜜為丸如彈子大毎服一丸食後細嚼薄荷湯下宻䝉花散宻䝉花羗活菊花石決明木賊黃栢白蒺藜黃芩蔓荆子青箱子枸杞子右每服三錢茶送下水煎亦可充風淚出者症非一也有腎虛不生肝木肝經受風而虛損故木動也迎風而淚出也肝經虛者宜服止淚補肝散止之大止淚之法㸃用重藥熱淚者服川芎茶調散㸃用清凉散肝風者宜蒼术止之不赤不疼淚出是謂之風淚腫痛赤澁淚出者此熱淚也若迎風而出汪汪冬月多夏月少拭却還生又不分四季皆有此冷淚也冷淚者乳香川烏丸川烏一箇草烏二箇去皮明礬一錢白麵塊一箇為末䝋猪膽汁為丸如黍米大每用一丸夜卧時放在眼之大眥頭淚止即止或炙止之又有肺臟久冷大眥有竅名為淚堂淚堂通肺腑此淚難治久流則能令目昏暗血氣虚弱之人不腫不赤但淡紫紅者澁痛淚出是虚淚灸法久流冷淚灸上迎香二穴天府二穴肝腧二穴第九骨開各對寸止淚補肝散治肝虚迎風淚出不止宜灸睛明二穴係大眥頭風池二穴臨泣二穴蒺藜當歸熟地黃川芎白芍藥木賊防風夏枯草血虚者不用右各等分為末毎服二三錢茶酒任下蒼术散治風濕傷肝濕淚昏花蒼术木賊香附米夏枯草蟬蛻甘草蒺藜白芷防風蔓荆子川芎姜蚕右依各等分為末毎服二三錢茶清下酒亦可川芎茶調散治一切熱淚眼弦濕爛川芎防風羗活甘草木賊石膏炒石決明荆芥薄荷葉菊花各一兩右為末毎服二三錢食後茶下肝風積熱者肝家勞苦七情鬱結二三年間來來往往一發一歇遂生翳膜或聚或散赤澁淚出此症多是夜勤燈光觀書史或雕畵打銀細巧之人久累肝家積熱成風肝若受風必有腦痛不覺漸漸昏䝉治法有翳者吹以丹藥内服瀉肝省風之劑除肝家之風熱忌口將息一年半載病根除矣其洗眼照依疼痛腫澁眼之方載在前症條下問曰眼目逓年舉發無時者何也答曰肝經積熱也經云肝勞則氣逆肝寧則氣順氣急則發氣順則歇治宜發時痛甚者服洗肝散省風湯之類常服此數方則能除此病也㸃用清凉散洗肝散方在天行赤眼症内瀉肝散治肝經積熱黑參大黄黃芩知母桔梗芒硝右等分為末毎服二三錢食後熱水調下日二次省風湯治肝熱大旺瞳人不清或細小宜服防風犀角大黃知母𤣥參黄芩羚羊角肝虚不用桔梗右為末毎服二錢水煎入燈心竹葉食後服坐起生花者此是内障此症肝血衰膽腎二經虛也六陽不舉故久坐傷血起則頭暈眼花或前常見花發數般或赤或黑或白繚亂昏暗不明良久乃定瞳人開大不清此症宜補肝腎或明目固本丸不治恐久變為青肓内障變為五風難治之症也固本丸只生熟二地黄天門二冬加人參也問曰人之坐起眼前見花數般茫茫如蠅翅者何也肝腎二經氣乏也經云肝腎之氣充則精彩光明肝經之氣乏則昏䝉眩暈治法宜補腎丸補肝重光散還睛丸明目固本丸補腎明目丸隨人氣體虚實加減用之補腎丸治血氣虚弱變成内障宜服磁石火煆醋淬七次水飛過三兩肉蓯蓉酒浸焙五味子熟地黃酒蒸焙枸杞子絲子淗淨酒浸蒸另研各二兩楮實子覆盆子酒浸車前子酒浸石斛去根各一兩沉香另研五錢黃栢各二兩青鹽另研五錢或加知母右煉蜜丸如桐子大毎服五十丸空心鹽湯下補腎明目丸治肝腎血虛視物不明諸眼服凉藥表裏愈後少神光羚羊角生地黃肉蓯蓉枸杞子防風草決明各一兩楮實子五錢亁菊花羗活當歸各二兩羊子肝四兩煮焙右為末煉蜜丸如梧桐子大毎服三十丸空心鹽湯送下日午清茶下臨卧酒下不飲酒人參當歸湯下明目固本丸治心熱腎水不足用少睛光久服生精清心生地黃熟地黃天門冬麥門冬枸杞子乾菊花右各研末煉蜜為丸如梧桐子大每服三十丸空心鹽湯下人之兩目至日落西之時漸漸不見亦係内障俗謂之雞毛眼也此乃腎之虛也眼雖屬於竅門乃歸腎而為主腎虛則眼目昏或貪淫樂慾酒色過度使腎臟衰憊禀受天眞不全精神短少致瞳人神腎水不清故目之無光也治之須有還睛補腎看人老少虛實斟酌藥餌以平之飲食以補之戒色斷怒使㑹隂水自然明矣還睛補腎丸治内障方在目暗生花症内補腎明目丸治諸内障欲變五風變化視物不明川芎當歸熟地黄菊花山藥知母石菖蒲黄栢青鹽遠志白蒺藜川巴㦸五味子白芍藥桑螵蛸茺蔚子絲子青箱子宻䝉花枸杞子肉蓯蓉石決明右為末煉蜜為丸如梧桐子大毎服四十丸空心鹽湯下十味還睛丸治下元虛憊一切内障防風羗活宻䝉花青箱子川芎蒺藜甘草白术木賊絲子酒浸三宿生用焙乾右為末煉蜜為丸如梧桐子大每服二十丸空心鹽湯下瞳人乾缺者亦係内障與外障無預但因頭疼痛而起故列外障條中按此症因夜卧不得肝藏魂肺藏魄魂魄不安精神不定而少卧勞傷於肝故金井不圓上下東西如鋸齒匾缺參差久則漸漸細小視物濛濛難辨人物相牽俱損治法宜瀉膽補腎之劑一本無眥鴻飛内有肝腎俱虛火旺也用猪肝煑熟露宿侵晨切薄蘸夜明沙細嚼此藥能通明益膽之功瞳人小者肝之實瞳人大者肝之虛此症失於醫治久久瞳多鎖𦂳如小針眼大内結有雲翳或黄或青或白隂看不大陽看不小遂成瞽疾耳初起時眼珠墜痛大眥㣲紅猶見三光者宜服五瀉湯省風湯同補腎丸及補腎明目丸久服效方俱在前五瀉湯治瞳人乾缺肝火旺及五臟虚火旺動此藥能瀉火黃栢知母木通梔子生地黃甘草黑參桔梗黃芩防風熱甚加羚羊角犀角黃連右㕮咀每服六七錢用水煎食後服痒極難忍者肝經受熱膽因虛熱風邪攻充肝含熱極肝受風之燥動木摇風動其痒發焉故諸痒屬虚虛則痒諸痛為實實則痛黑珠痒者有眼弦痒者㸃以丹藥或煨姜摩擦淚通痒止或濕痒用碧天丹洗侵晨洗以鹽湯或入桑白皮防風荆芥薄荷之類問曰眼迎風受痒者何也答曰脾肝二經受風邪也治法痒時用三霜丸撥雲散綿裹散洗用去風藥三霜丸治痒極難忍用此丸即愈姜粉枯礬白硼砂右為末口津液調和如粟大要用時將一丸放於大眥止之綿裹散治眼濕淚爛弦眼目當歸黃連各一錢銅青七分枯礬四分朴硝右各為細末用細絹色綿縛𦂳每一箇約龍眼核大要用時將一箇用白湯半盞泡洗之一日二次問曰人之患眼遇風痒極者何也答曰此因肝虚合畜風熱膽經風毒上充入眼遂遇風受痒宜􅡏洗服藁本烏蛇湯補膽湯藁本烏蛇湯藁本烏蛇防風白芍藥羗活川芎細辛右浸酒煎服亦可補膽湯前胡馬兠苓茯苓各一兩柴胡人參桔梗細辛黑參右煉蜜為丸每服三錢水煎服亦可問曰人之患眼生翳如珠垂簾遮睛者何也答曰此因心火虚炎肝經風熱上攻入腦中熱毒流下住於風輪故眼赤澁淚出腫痛無時年久烏睛白紅色故名曰垂簾翳宜服洗心散加味修肝散洗心散荆芥薄荷連翹麻黄赤芍藥梔子黄連大黃各一兩右毎服五錢水煎服加味修肝散梔子薄荷各三兩羗活一兩當歸大黄連翹各五錢黄芩赤芍藥菊花木賊白蒺藜川芎各一兩麻黃甘草右為末毎服三錢用酒調下痛用酒不痛水煎服鶻眼凝睛此驟然所感非久患之症因五臓皆受熱毒致五輪振起堅硬不能轉運氣血凝滯睜然如鶻烏之眼凝視不運之貌難辨人物因形而名曰鶻眼凝睛治法宜用香油調姜粉汁於額臉部摩擦及面上或摩風膏摩擦更好服以酒煎散以被葢出汗其眼即活動面面用燈火燒之斷其風路此症多是小兒急慢驚風之症大人少有此患桑螵蛸酒調散方在前暴風客熱内眼障初服導痰消風散陳皮半夏甘草白芷全蝎羗活防風荆芥升麻細辛蘆香右㕮咀各等分水煎姜三片温服轆轤展開者與鶻眼凝睛症同鶻眼凝睛者睛凝不運之貌轆轤展開而大者此膽腎之水散焉瞳人之大小隨黄仁之展縮黄仁展則瞳人小黄仁縮則瞳人大人不知瞳人能大小者非也此乃肝受風而不展轆轤則瞳人圜圓也隨肝輪而縮覺見瞳人大不收號曰轆轤展開症風充入腦眼帯弔起此症小兒急慢驚風受之治法若前姜汁調香油摩風膏摩擦藥用蚌殻頻頻灌下乳母忌口問曰瞳人開大不收而展縮者何也答曰肝受風痰盛也治法僻㢲錠子牛黄丸石楠散初起者宜發表小兒如此患治法亦同僻㢲錠子治肝膽受風變成前症小兒通睛瞳人闊大並皆治之牛膽南星七錢防風乾姜各三錢白附子五錢牛黄三分川烏白芷薄荷木香白术白茯苓人參各五錢硃砂一錢麝香五分白姜蚕二十箇生用片腦五分右將前藥俱研為細末冬用蜜二斤甘草半斤煎作膏稀稠得宜將次藥末和作錠子金泊為衣小兒急慢驚風手足搐搦金銀箔磨湯化下一錠大人破傷風酒化下三四錠子約一錢一箇或七分一箇舉此麻黃一斤甘草半斤用水三四碗砂鍋内煎至一鍾之時入蜜一斤緩緩熬煉滴水内成珠方將前藥捜和為丸即作錠子也牛黃丸能去風痰牛黃二分白附子全蝎肉桂川芎石膏各一兩白芷三分藿香五錢麝香少許硃砂二錢右為細末煉蜜為丸如梧桐子大毎服二三丸臨卧薄荷湯下通頂石楠散能利膈開風痰石楠蕂藜蘆各一兩𤓰蒂七分右為末米湯下一匙日一二度灌入口内去風痰小兒通睛與鶻眼凝睛轆轤展開此三症頗同然此症或因外物打着頭額或被諸般人物驚心遂成驚風之症風熱傷肝魂不應目風邪上壅黃仁不成關鎖瞳人開惟直視不辨人物致眼通睛通者黄仁氷輪皆黑似無黃仁瞳人水散似無瞳人此黃仁與瞳人通混不分號曰通瞳亦風藥摩擦二法發散風邪宜服牛黃丸不須㸃藥只服藥然前症牛黃丸通頂石楠散亦可用也牛黄丸通頂石楠散二方俱在前症條下五七犀角飲犀角人參茯苓甘草遠志各一兩麝香少許龍膽草黄芩各五錢右㕮咀水煎服小兒疹痘者名為百歳瘡也不論大小俱患一度疹痘入眼疹有兩分痘瘡初上皮膚之際眼閉不開眼上即有痘瘡㸃在黑睛上易治急取益母草煎湯燻洗日三度更以隂一陽五丹調鱔魚血㸃忌口及夜啼乳母亦忌口須疹痘痊可其眼漸開眼中之痘小隨而痊矣又有一症疹痘之後瘡痂落盡肌體肥壯眼中忽然紅澁此乃餘毒鬱結於肝而發出此症十分利害失治多能害目只用車前草檑水頻與吃下洗却肝經之熱毒洗以益母草㸃以鱔魚血調藥經曰疹痘之後毒氣鬱結發肝而氣不能泄攻發於眼傷於瞳人者素無治法也問曰小兒此症入眼者何也答曰小兒痘瘡之發五臓皆熱毒之氣壅塞停留熱氣在肝膈充入眼使疼痛淚出怕日羞明難開遂生瘡於眼内久發變為白膜初覺瘡入眼中赤澁之時急將藥泄其毒外以退翳之藥若不能為終身之患也先將秦皮湯洗目眼紅花退翳散服之効秦皮湯洗服秦皮秦芃防風細辛各一兩甘草一錢右將水二盞煎至一半熱洗紅花散紅花連翹當歸生地黃紫草大黃甘草赤芍藥右燈心竹葉水煎服退翳散即猪肝散眞蛤粉谷精草夜明砂右為細末用猪肝二兩切開摻藥於内以麻扎定煮水冷將肝同藥細嚼煮肝本汁嚥諸般毒物莫吃小兒眼生翳者脾胃實熱所致或是胎中受毒或因乳母好食熱物皆能令小兒患眼量兒之大小疾之遠近輕重一週半載者其藥須令母吃或蛤殻灌入小兒吃可也二三歳者此是胎毒也離母之後患眼者此是小兒自受之症與母無預此藥須令小兒吃忌以油膩煎炒糖甜菓子之類不獨患眼所忌不忌多生驚症變為疳傷亦能害目甚至不治之症其疳眼别有餘條欵此乃小兒生翳症也黑睛如麻豆大如蘿蔔花與疳眼大不侔矣一倍三黄丹一倍珍珠散㸃用加味修肝散梔子薄荷連翹麻黄赤芍藥羗活當歸大黃黄芩菊花木賊白蒺藜川芎甘草右水煎食後服問曰小兒疹痘入眼者何也答曰小兒於母胎中受其毒必發疹痘出之時五臟俱有熱相攻或肝臟熱甚必有痘生於目内宜服凉肝散草決明天花粉甘草赤芍藥緑豆皮谷精草右為末毎服六錢蜜水調下問曰小兒痘疹傷眼者何也答曰内臟虛熱上攻也治法經云切不可瀉餘毒宜用㣲凉劑和解此症初起睛上紅紫澁痛可用通神散或車前草擂蜜水頭頻與吃洗去肝中火邪若至喪明睛中有翳或凹入者經云疹痘之後毒氣鬱結於肝傷於瞳人素無治法也通神散治小兒疹痘用此能解毒白菊花菉豆皮谷精草石決明煆過右各等分為末每服二錢乾柿一箇米汁水一盞同煎候水乾不拘時服能服湯藥只將本方煎服亦可救苦觀音散桔梗當歸連翹藁本細辛蒼术龍膽草羗活黃連知母黃芩黃栢川芎柴胡防風升麻生地黃紅花右各等分煉蜜為丸能吞者每四五十丸服小者量服之通神散菊花谷精草宻䝉花菉豆皮蒼术石決明甘草黄芩蟬退木賊右各等分水煎食後温服問曰大人小兒雀目至申酉時不見物者何也答曰肝虛受邪熱所傷經絡凝滯不和隂陽不和榮衞不通夜至昏也治法宜服五膽丸蝙蝠肝散又宜服蒼蠅散猪肝散主之不用㸃藥虚極者諸補藥亦可增減用之蒼蠅散用蒼蠅翅草及花為細末用白水煮猪肝露一宿空心煎丸又可服猪肝散猪肝散即退翳散方在前小兒疹痘症内五膽丸熊膽一箇黃牛膽二箇青魚膽一箇鯉魚膽二箇青羊膽一箇石決明二兩夜明砂一兩麝香少許右為末將前膽和為丸如菉豆大每服三十丸空心茶下蝙蝠散蝙蝠肝一箇石膏一兩黄丹石決明煆白蒺藜炒各二兩若無蝠肝用羊肝加夜明砂右將前藥研細末每服二錢米湯調下無蝙蝠肝用羊肝一塊切作四塊以藥一二錢糝肝内以麻縛定用米汁水水礶内煮熟次早取出羊肝藥細嚼以煮肝汁同食効如體虚弱之人亦可服補藥為丸尤妙胎風赤爛者其症有三初時血露入眼洗不亁淨而生是疾遂至赤爛又有在母胎中其母不知忌口多食壅毒之物酒麵五辛之類至産生三四箇月兩眼雙赤眵粘四眥紅赤濕爛此是胎毒所致此小兒在腹中飲母血血毒於兒生出方發此症也又有乳母壯盛之人抱兒供乳之際兒口未哺乳頭汁脹滿其汁洒然射出充入兒眼亦能生此爛濕若充射面部則能生疵濕瘡痒大抵此三症通號曰胎風赤爛孰知内有三因之由血露不淨與乳充射宜碧天丹洗胎毒者須母服三黃丸忌口其兒亦用三黄湯燻洗㸃以時藥可也服宜小防風湯小承氣湯小菊花膏導赤散此數方隨冷熱用之或童子患眼者治法亦用此數方加減㸃用時藥小防風湯此數方治小兒胎風赤爛小兒眼生翳大黃梔子甘草赤芍歸尾防風羗活右等分水煎食後服小承氣湯大黃薄荷杏仁蟬退甘草羗活天麻當歸赤芍藥防風右水煎服小菊花膏丸治小兒風毒眼黃連枯黄芩大黃乾菊花羗活蒼术荆芥防風右為細末煉蜜為丸每服四五十丸或為膏小兒疳傷之症富貴之家多生是疾葢由父母速愛之由也小草如草木之萌蘖怎受風日寒露之欺且小兒五臟六腑未實氣血柔弱怎禁油膩煎炒及諸般暈腥或一週半載縱口菓子糖甜之物及鵝鴨雞猪牛羊等肉或飯方了又哺以乳或乳方飽又與其飯此出於父母至情富貴之家有是症焉貧賤之家豈有是患何也一食諸物不消不化先傷於脾致腹脹午後發熱至夜半方退日乆頭髪稀疎轉作泄瀉頻頻瀉甚則渴至傷肝膽眼之白仁鮮紅羞明怕日漸生翳膜遮瞞黑珠或突起如黑豆如香菰之狀治法先治内後治外用雞卵入輕粉一二分史君子仁一箇半葱珠幾顆濕綿包煨與吃宜空心連吃五七彈止又宜煮羊肝露宿蘸夜明砂吃或猪肝亦可切宜忌口暈腥其白膜用隂一陽七藥調乳㸃煎胡宣二連服側栢藥燻洗若疳傷肝膽眼珠突出或瞎盡為不治之症不獨瞎眼甚至喪命若聲啞口乾脚手俱腫十死八九問曰小兒疳傷眼目疼痛羞明不開烏睛上青翳如黑珠子或白膜遮睛者何也答曰此因飲乳之際好食菓子雜物油膩及熱毒物多使脾胃生疳或瀉泄不止夜聞潮熱久則疳蟲傷肝上攻眼目初覺紅澁羞明急療若烏睛上變成有黑翳如珠泄瀉不止者多是不治宜服除熱飲等方五疳丸治小兒疳眼面瘦皮黃羞明怕日食乳不消緑礬成堁浣淨彌佗僧服過夜明砂各一兩右為末用蒸棗肉搗前藥末為丸如黍米大毎服三四十丸量兒之大小空心米湯下除熱飲大黃知母防風黃芩各兩黑參茺蔚子菊花木賊各一兩半右水煎食後服三貼用雞蛋一箇史君子仁三箇輕粉二分同研末入蛋内煨熟空心服至二三箇即去疳蟲後服五疳丸五疳丸胡黃連五錢牛黃一錢彌佗僧一兩夜明砂緑礬三兩右用棗肉為丸緑豆大空心服三十丸米湯送下蕪荑丸治小兒五疳蕪荑黃連神麯麥芽炒右各等分為末麵糊為丸緑豆大毎服十丸至十五丸水湯下五疳陳皮湯寒熱往來薄荷湯下問曰人之患眼兩臉時常赤爛者何也答曰大人患者因脾土藴積濕熱脾土衰不能化濕故濕熱之氣相攻傳發於胞臉之間致使羞明淚出含在胞臉之内此淚熱毒以致眼弦赤爛治法春夏爛者為熱爛服用三黄湯洗用綿裹散金錢湯有瘀血宜􅡏洗與服瀉脾湯秋冬爛者為冷爛又曰迎風洒淚洗用碧天丹㸃用重藥臉厚􅡏洗之後宜火烙之小兒患者因母胎中受熱或落地之時惡露入目沐浴不淨拭之未乾却感外傷風邪使邪入目亦生此疾治之小兒服黄茋湯大人服茶調散熱甚洗金錢湯風甚洗碧天丹先􅡏洗後用藥黃茋湯黃茋車前子細辛黃芩五味子蒼术黄連各一兩右各等分水煎服茶調散即川芎茶調散方在前充風淚出症内三黃湯在努肉攀睛症内綿裹散在痒極難忍症内碧天丹金錢湯治久年爛弦古錢即老銅錢生銹者七箇黄連研末二錢白梅乾五箇梅自落者為白梅右將此三味用老酒二小盞於磁礶内煎至半盞至夜時冷可洗用不過三四日即愈日二次爛弦火穴法魚尾二穴睛明二穴上迎春二穴攅竹一穴太陽二穴爛弦風之症因脾胃壅熱久受風濕更加吃諸毒物日積月累致成風爛胞臉之内變成風痘動則發痒不時因手拂拭甚則連眼眶皆爛無分春夏秋冬皆如是眵淚滿腮有不近人手之怕治法畨轉眼臉利洗瘀血二三度或小鋒針針出瘀血亦可若因摩引有紅筋者宜老醋燒爐甘石淬七次加以隂丹量輕重搽㸃眼弦並搽㸃眼内無妨忌動風動血之物不食可也此症肝風目暗者乃是肝腎虚勞肝氣不足血虛故也不時疼痛舉發無時痛則惟眼珠墜疼頗有赤澁淚出看物依稀眼前多見花發數般或黃或白或黑見一物如見兩般形狀不清療治恐損眼也此症實有内外相兼病也非徒治外而不治内曷濟哉内則白蒺藜散補外則隂二陽八丹調乳汁㸃二三夜㸃一次片腦少加洗以生黄菊花赤芍側栢葉秦皮白芷川芎更加忌口五辛諸熱物莫吃補肝活血散虚者宜服藁本白芷石決明天麻防風細辛羗活黄茋菊花當歸生地黃黄連右各等分水煎服補腎丸治目暗疼痛恐變成黑風内障先宜服之澤瀉去細辛去苗絲子酒浸焙乾五味子炒各一兩茺蔚子焙二兩山藥一兩五錢熟地黃焙二兩右為末研均煉蜜為丸如梧桐子大每服二十丸空心鹽湯下白蒺藜散蒺藜菊花蔓荆子草決明甘草連翹青箱子右各等分水煎食後温服問曰迎風洒淚者何也曰肝之虚也是亦腦冷迎風淚遂出拭却還生夏月即少冬月即多後若經二三年間不以冬夏皆有此疾乃淚通於肝肝屬木目乃肝之外候為肝虚風動則淚流故迎風淚出即服補肝散治冷淚補肝散治冷淚當歸熟地黄川芎赤芍藥防風木賊右等分水煎服菊花散治熱淚菊花川芎木賊香附子夏枯草羗活各一兩草烏一錢防風甘草荆芥白芷各五錢右為末毎服三錢茶下水煎亦可又方治實淚菊花蒺藜防風羗活川芎夏枯草木賊甘草各三兩右毎服三錢湯調下水煎亦可川芎茶調散治熱淚方在前充風淚出症内蒼术止淚散木賊香附子白芷石膏菊花荆芥白蒺藜薄荷當歸白芍藥川芎蟬退夏枯草右為末毎服三錢食後茶清下冬淚酒下銀海精㣲卷上
