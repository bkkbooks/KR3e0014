body:
  text: 銀海精微醫家類提要臣等謹案銀海精微二卷舊本題唐孫思邈撰唐宋藝文志皆不著録思邈本傳亦不言有是書其曰銀海者蓋取目為銀海之義考蘇軾雪詩有凍合玉樓寒起粟光摇銀海炫生花句瀛奎律髓引王安石之説謂道書以肩為玉樓目為銀海銀海為目僅見於此然迄今無人能舉安石所引出何道書者則安石以前絶此説其為宋以後書明矣前有齊一經序稱管河北道時得於同僚李氏亦不著時代年月莫知何許人也其中辨論諸證頗為明晰其法補瀉兼施寒温互用亦無偏主一格之弊方技之家率多依托但求其術之可用無庸核其書之必真本草稱神農素問言黄帝固不能一一確鑿也此書載療目之方較為可取則亦就書論書而已乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2a559498f6190346d72bb3d81051d950ced64db1766311f9aa3ff6ad7241f868
